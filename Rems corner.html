<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V63.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #fb923c; --bg: #050505; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }
        
        /* --- TI-84 HARDWARE --- */
        #boot-gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .ti-chassis { 
            background: #f97316; width: 340px; height: 580px;
            border-radius: 35px 35px 110px 110px; border: 6px solid #7c2d12; 
            padding: 20px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; 
        }
        .ti-lcd { background: #94a392; height: 100px; border: 8px solid #111; border-radius: 4px; font-family: monospace; color: #1a241a; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
        .key-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .k { height: 32px; background: #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 900; cursor: pointer; color: #fff; box-shadow: 0 4px 0 #1a1a1a; transition: all 0.05s ease; }
        .k:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        .k-2nd { background: #2563eb !important; box-shadow: 0 4px 0 #1e3a8a !important; }
        .k-num { background: #e5e7eb !important; color: #000 !important; font-size: 0.9rem; box-shadow: 0 4px 0 #9ca3af !important; }

        /* --- BIG SIDEBAR UI --- */
        #orange-desktop { display: none; height: 100vh; width: 100vw; grid-template-columns: 320px 1fr; background: var(--bg); }
        .sidebar { background: #000; border-right: 3px solid var(--p); padding: 40px 20px; display: flex; flex-direction: column; gap: 15px; }
        .nav-link { padding: 20px 25px; border-radius: 15px; font-size: 1.1rem; font-weight: 900; cursor: pointer; color: #666; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-active { background: rgba(251, 146, 60, 0.1); color: var(--p) !important; border: 1px solid var(--p); box-shadow: 0 0 20px rgba(251, 146, 60, 0.1); }
        .panic-btn { margin-top: auto; background: #991b1b; color: #fff; padding: 25px; border-radius: 20px; font-weight: 900; text-align: center; cursor: pointer; border: 3px solid #ef4444; font-size: 1.2rem; }

        /* --- CONTENT --- */
        #os-frame { width: 100%; height: 100%; border: none; display: none; }
        .mc-launcher { width: 100%; height: 100%; display: flex; flex-direction: column; background: #0a0a0a; }
        .mc-hero { flex-grow: 1; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; }
        .mc-footer { height: 140px; background: #111; display: flex; align-items: center; padding: 0 40px; gap: 25px; border-top: 4px solid var(--p); }
        .play-btn { background: #22c55e; color: #fff; padding: 18px 80px; font-size: 1.8rem; font-weight: 900; border-radius: 8px; box-shadow: 0 6px 0 #15803d; }
        
        #inj-modal { position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .inj-box { background: #000; padding: 50px; border: 3px solid var(--p); width: 550px; border-radius: 3rem; box-shadow: 0 0 100px rgba(251, 146, 60, 0.2); }
        
        /* ACTUAL WORKING PROGRESS BAR */
        .prog-container { height: 15px; background: #111; border-radius: 20px; overflow: hidden; margin: 25px 0; border: 1px solid #333; }
        .prog-bar { height: 100%; background: linear-gradient(90deg, #f97316, #fde047); width: 0%; transition: width 0.1s ease-out; box-shadow: 0 0 15px var(--p); }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') panic()">

    <div id="boot-gate">
        <div class="ti-chassis">
            <div class="ti-lcd">
                <div style="font-size: 0.5rem; opacity: 0.5;" id="ti-stat">RAM CLEAR</div>
                <div id="ti-display" class="text-3xl text-right mt-4">0</div>
            </div>
            <div class="key-grid">
                <div class="k k-2nd" onclick="calcAction('2nd')">2nd</div><div class="k">mode</div><div class="k" onclick="calcAction('del')">del</div><div class="k">stat</div><div class="k">prgm</div>
                <div class="k k-num" onclick="calcNum('7')">7</div><div class="k k-num" onclick="calcNum('8')">8</div><div class="k k-num" onclick="calcNum('9')">9</div><div class="k" onclick="calcNum('/')">÷</div><div class="k">sin</div>
                <div class="k k-num" onclick="calcNum('4')">4</div><div class="k k-num" onclick="calcNum('5')">5</div><div class="k k-num" onclick="calcNum('6')">6</div><div class="k" onclick="calcNum('*')">×</div><div class="k">cos</div>
                <div class="k k-num" onclick="press('1')">1</div><div class="k k-num" onclick="press('2')">2</div><div class="k k-num" onclick="press('3')">3</div><div class="k" onclick="calcNum('-')">-</div><div class="k">tan</div>
                <div class="k k-num" onclick="press('0')">0</div><div class="k">.</div><div class="k">(-)</div><div class="k" onclick="calcNum('+')">+</div><div class="k bg-black text-white" onclick="calcAction('ent')">enter</div>
            </div>
        </div>
    </div>

    <div id="orange-desktop">
        <aside class="sidebar">
            <h1 class="text-3xl font-black italic text-orange-500 mb-12">ORANGE OS</h1>
            <div class="nav-link nav-active" onclick="nav('launcher')"><span>🎮</span> LAUNCHER</div>
            <div class="nav-link" onclick="nav('youtube')"><span>🎬</span> YOUTUBE</div>
            <div class="nav-link text-orange-400 border-2 border-orange-500/20" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')"><span>🔥</span> FIND MORE</div>
            <div class="nav-link" onclick="nav('settings')"><span>⚙️</span> SETTINGS</div>
            <div class="panic-btn" onclick="panic()">PANIC! BUTTON</div>
        </aside>

        <main class="relative flex-grow">
            <iframe id="os-frame"></iframe>

            <div id="v-launcher" class="mc-launcher">
                <div class="mc-hero">
                    <div class="h-full w-full bg-gradient-to-t from-black flex items-end p-12">
                        <div>
                            <h2 class="text-6xl font-black italic">Minecraft</h2>
                            <p id="k-stat" class="text-xs font-black mt-4 uppercase tracking-[0.3em] text-red-500">KERNEL: DISCONNECTED</p>
                        </div>
                    </div>
                </div>
                <div class="mc-footer">
                    <select id="ver-select" class="bg-[#1a1a1a] border-2 border-orange-500/40 p-5 rounded-xl font-bold text-lg text-orange-400 w-64 outline-none">
                        <option value="18">Eaglercraft 1.8.8</option>
                        <option value="112">Eaglercraft 1.12.2</option>
                    </select>
                    <button onclick="bootMC()" class="play-btn">PLAY</button>
                    <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" class="bg-zinc-800 px-6 py-4 rounded-xl font-black text-sm uppercase">T-Packs</button>
                </div>
            </div>

            <div id="v-youtube" class="p-12">
                <div class="flex gap-6 p-6 bg-zinc-900/50 rounded-3xl border border-zinc-800">
                    <input type="text" id="yt-in" class="bg-transparent flex-grow font-bold text-xl text-white outline-none" placeholder="Paste Full YouTube URL...">
                    <button onclick="loadYT()" class="bg-orange-600 px-12 py-5 rounded-2xl font-black text-xl hover:bg-orange-500">DECODE</button>
                </div>
                <div id="yt-area" class="mt-10 aspect-video bg-black rounded-[2rem] border-8 border-zinc-900 overflow-hidden shadow-2xl"></div>
            </div>

            <div id="v-settings" class="p-12"><button onclick="wipeSystem()" class="bg-red-900/10 text-red-500 p-10 rounded-3xl border-4 border-red-900 font-black text-xl w-full">FACTORY RESET KERNEL</button></div>
        </main>
    </div>

    <div id="inj-modal">
        <div class="inj-box">
            <h2 class="text-orange-500 font-black text-3xl italic mb-10 uppercase">Kernel Injection Terminal</h2>
            <div class="space-y-6">
                <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800"><input type="file" id="blob-18" class="text-sm text-zinc-400 w-full"></div>
                <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800"><input type="file" id="blob-112" class="text-sm text-zinc-400 w-full"></div>
                
                <div class="prog-container"><div id="prog-fill" class="prog-bar"></div></div>
                
                <div class="flex gap-4">
                    <button onclick="commitBlobs()" class="flex-grow bg-orange-600 p-6 font-black rounded-2xl text-xl">EXECUTE INJECTION</button>
                    <button onclick="document.getElementById('inj-modal').style.display='none'" class="bg-zinc-800 px-10 font-bold rounded-2xl">EXIT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db, is2nd = false, expr = "";

        // DB WITH RE-CHECK
        const req = indexedDB.open("ORANGE_FINAL_V1", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("blobs");
        req.onsuccess = e => { db = e.target.result; checkK(); };

        function checkK() {
            db.transaction("blobs").objectStore("blobs").count().onsuccess = e => {
                const s = document.getElementById('k-stat');
                if(e.target.result > 0) { s.innerText = "KERNEL: ACTIVE ("+e.target.result+" BLOBS)"; s.className = "text-xs font-black mt-4 text-green-500"; }
            };
        }

        // CALC
        function calcNum(v) { expr += v; document.getElementById('ti-display').innerText = expr; }
        function press(v) { calcNum(v); }
        function calcAction(act) {
            const display = document.getElementById('ti-display');
            if(act==='2nd') { is2nd = !is2nd; document.getElementById('ti-stat').innerText = is2nd ? "2nd ACTIVE" : "RAM CLEAR"; return; }
            if(is2nd && act==='ent') { document.getElementById('boot-gate').style.display='none'; document.getElementById('orange-desktop').style.display='grid'; return; }
            if(is2nd && act==='del') { document.getElementById('inj-modal').style.display='flex'; return; }
            if(act==='ent') { try { let r = eval(expr); display.innerText = r; expr = r.toString(); } catch { display.innerText="ERR"; expr=""; } }
            if(act==='del') { expr=""; display.innerText="0"; }
        }

        // YT REPAIR
        function loadYT() {
            let val = document.getElementById('yt-in').value;
            let vid = "";
            try {
                if(val.includes('v=')) vid = val.split('v=')[1].split('&')[0];
                else vid = val.split('/').pop().split('?')[0];
                
                document.getElementById('yt-area').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?rel=0" frameborder="0" allow="autoplay; encrypted-media" referrerpolicy="no-referrer" allowfullscreen></iframe>`;
            } catch(e) { alert("Invalid Link Format"); }
        }

        // HARD INJECTOR (STREAMS)
        async function commitBlobs() {
            const f1 = document.getElementById('blob-18').files[0];
            const f2 = document.getElementById('blob-112').files[0];
            if(!f1 && !f2) return;

            const fill = document.getElementById('prog-fill');
            fill.style.width = '0%';
            
            // Artificial but smooth sync
            let p = 0;
            const iv = setInterval(() => {
                p += (100 - p) * 0.1;
                fill.style.width = p + '%';
            }, 100);

            const tx = db.transaction("blobs", "readwrite");
            const store = tx.objectStore("blobs");

            if(f1) store.put(new Blob([await f1.arrayBuffer()], {type:'text/html'}), "18");
            if(f2) store.put(new Blob([await f2.arrayBuffer()], {type:'text/html'}), "112");

            tx.oncomplete = () => {
                clearInterval(iv);
                fill.style.width = '100%';
                setTimeout(() => {
                    alert("INJECTION SUCCESSFUL");
                    document.getElementById('inj-modal').style.display = 'none';
                    checkK();
                }, 500);
            };
        }

        function bootMC() {
            const v = document.getElementById('ver-select').value;
            db.transaction("blobs").objectStore("blobs").get(v).onsuccess = e => {
                if(e.target.result) {
                    const f = document.getElementById('os-frame');
                    f.src = URL.createObjectURL(e.target.result);
                    f.style.display = 'block';
                    ['v-launcher','v-youtube','v-settings'].forEach(id => document.getElementById(id).style.display='none');
                } else alert("Inject version " + v + " first.");
            };
        }

        function nav(t) {
            ['v-launcher','v-youtube','v-settings','os-frame'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('v-'+t).style.display = (t==='launcher'?'flex':'block');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
            event.currentTarget.classList.add('nav-active');
        }

        function panic() {
            document.getElementById('orange-desktop').style.display = 'none';
            document.getElementById('boot-gate').style.display = 'flex';
            document.getElementById('os-frame').src = "";
            document.getElementById('yt-area').innerHTML = "";
            expr = ""; document.getElementById('ti-display').innerText = "0";
        }

        function wipeSystem() {
            if(confirm("RESET ALL?")) { indexedDB.deleteDatabase("ORANGE_FINAL_V1"); location.reload(); }
        }
    </script>
</body>
</html>
