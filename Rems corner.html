<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V54.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ++++++++++++++++++++++++++++++++++++++++++++++
        +                                            +
        +         ORANGE OS MADE BY REMONE           +
        +                                            +
        ++++++++++++++++++++++++++++++++++++++++++++++
        */

        :root { 
            --p: #f97316; 
            --bg: #0a0a0b; 
            --ti-body: #f97316; /* NEW: Orange Calculator Body */
            --fruit: '🍊';
        }
        
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; }

        /* --- HARDWARE: SHORTER ORANGE TI-84 --- */
        #boot-gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .ti-chassis { 
            background: var(--ti-body); width: 360px; height: 640px; /* NEW: Shorter Height */
            border-radius: 35px 35px 110px 110px; border: 6px solid #7c2d12; 
            padding: 20px; position: relative; box-shadow: 0 0 80px rgba(249, 115, 22, 0.4); 
            display: flex; flex-direction: column; transform: scale(1); 
        }
        .ti-lcd { background: #94a392; height: 120px; border: 8px solid #111; border-radius: 4px; font-family: monospace; color: #1a241a; padding: 8px; display: flex; flex-direction: column; }
        
        /* KEYPAD */
        .key-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 15px; }
        .k { height: 32px; background: #333; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; font-weight: 900; cursor: pointer; box-shadow: 0 3px 0 #000; color: #fff; position: relative; }
        .k:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        .k-2nd { background: #2563eb !important; } 
        .k-num { background: #e5e7eb !important; color: #000 !important; font-size: 0.9rem; }
        .k::before { content: attr(data-lbl); position: absolute; top: -14px; font-size: 0.45rem; color: #2563eb; font-weight: bold; }

        /* --- OS DESKTOP --- */
        #orange-desktop { display: none; height: 100vh; width: 100vw; grid-template-columns: 260px 1fr; background: #121212; }
        .sidebar { background: #000; border-right: 1px solid #222; padding: 30px 15px; display: flex; flex-direction: column; gap: 6px; }
        .nav-link { padding: 10px 15px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: #888; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover { background: #1a1a1a; color: #fff; }
        .nav-active { background: #222; color: var(--p) !important; border-left: 3px solid var(--p); }

        /* --- MODULES --- */
        .module-pane { display: none; width: 100%; height: 100%; padding: 40px; overflow-y: auto; }
        .glass-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 25px; }
        #os-frame { width: 100%; height: 100%; border: none; display: none; }

        /* --- MODAL INJECTOR --- */
        #inj-modal { position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; }
        
        /* MOJANG FOOTER */
        .mc-footer { height: 90px; background: #313233; display: flex; align-items: center; padding: 0 30px; gap: 15px; border-top: 1px solid #444; }
        .play-btn { background: #3c8527; color: #fff; padding: 10px 50px; font-size: 1.4rem; font-weight: 900; border-radius: 2px; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="inj-modal">
        <div class="bg-zinc-900 p-10 rounded-[40px] border-4 border-orange-500 w-[500px]">
            <h2 class="text-orange-500 font-black text-2xl mb-2 italic">KERNEL INJECTOR</h2>
            <p class="text-[10px] text-zinc-500 mb-6 uppercase tracking-widest">Offline Blob Management</p>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold block mb-1">EAGLERCRAFT 1.8.8 (HTML/JS)</label>
                    <input type="file" id="blob-18" class="text-xs bg-black p-3 w-full border border-zinc-800 rounded">
                </div>
                <div>
                    <label class="text-[10px] font-bold block mb-1">EAGLERCRAFT 1.12.2 (HTML/JS)</label>
                    <input type="file" id="blob-112" class="text-xs bg-black p-3 w-full border border-zinc-800 rounded">
                </div>
                <button onclick="commitBlobs()" class="w-full bg-orange-600 p-4 font-black rounded-xl hover:bg-orange-500">INJECT TO SYSTEM</button>
            </div>
            <button onclick="document.getElementById('inj-modal').style.display='none'" class="mt-4 text-[10px] w-full text-zinc-600">CANCEL</button>
        </div>
    </div>

    <div id="boot-gate">
        <div class="ti-chassis">
            <div class="ti-lcd">
                <div style="font-size: 0.5rem">KERNEL v54.0 - READY</div>
                <div id="ti-display" class="text-3xl text-right mt-10">0</div>
            </div>
            <div class="key-grid">
                <div class="k k-2nd" data-lbl="QUIT" onclick="ti('2nd')">2nd</div><div class="k">mode</div><div class="k" data-lbl="INS" onclick="ti('del')">del</div><div class="k">stat</div><div class="k">prgm</div>
                <div class="k k-num" onclick="press('7')">7</div><div class="k k-num" onclick="press('8')">8</div><div class="k k-num" onclick="press('9')">9</div><div class="k">÷</div><div class="k"></div>
                <div class="k k-num" onclick="press('4')">4</div><div class="k k-num" onclick="press('5')">5</div><div class="k k-num" onclick="press('6')">6</div><div class="k">×</div><div class="k"></div>
                <div class="k k-num" onclick="press('1')">1</div><div class="k k-num" onclick="press('2')">2</div><div class="k k-num" onclick="press('3')">3</div><div class="k">-</div><div class="k"></div>
                <div class="k k-num" onclick="press('0')">0</div><div class="k">.</div><div class="k">(-)</div><div class="k">+</div><div class="k bg-black text-white" onclick="ti('ent')">enter</div>
            </div>
        </div>
    </div>

    <div id="orange-desktop">
        <aside class="sidebar">
            <h1 class="text-xl font-black italic text-orange-500 mb-6">ORANGE OS</h1>
            <div class="nav-link nav-active" onclick="nav('launcher')"><span>🎮</span> Minecraft</div>
            <div class="nav-link" onclick="nav('brotato')"><span>🥔</span> Brotato</div>
            <div class="nav-link" onclick="nav('youtube')"><span>🎬</span> YouTube</div>
            <div class="nav-link" onclick="nav('browser')"><span>🌐</span> Browser</div>
            <div class="nav-link mt-4 text-orange-400" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')"><span>🔥</span> Find More</div>
            <div class="mt-auto nav-link opacity-40" onclick="location.reload()"><span>❌</span> Shutdown</div>
        </aside>

        <main class="relative flex-grow">
            <iframe id="os-frame"></iframe>

            <div id="v-launcher" class="h-full flex flex-col bg-[#222]">
                <div class="flex-grow bg-[url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg')] bg-cover relative"></div>
                <div class="mc-footer">
                    <select id="ver-select" class="bg-[#1e1e1e] border border-[#444] p-3 rounded font-bold text-sm w-48"><option value="18">1.8.8</option><option value="112">1.12.2</option></select>
                    <button onclick="bootMC()" class="play-btn">PLAY</button>
                </div>
            </div>

            <div id="v-youtube" class="module-pane">
                <input type="text" id="yt-url" class="w-full bg-black p-4 rounded-full border border-zinc-800 mb-4" placeholder="YouTube Video ID...">
                <button onclick="loadYT()" class="bg-red-600 px-6 py-2 rounded-full">WATCH</button>
                <div id="yt-player" class="mt-4 aspect-video bg-black rounded-xl border border-zinc-800"></div>
            </div>
            
            <div id="v-brotato" class="module-pane text-center">
                <h2 class="text-3xl font-black mb-4">BROTATO</h2>
                <button onclick="run('PASTE_LINK_HERE')" class="bg-orange-600 px-10 py-4 rounded-xl font-black">LAUNCH</button>
            </div>
        </main>
    </div>

    <script>
        let db, is2nd = false, buf = "";

        // DB INIT
        const req = indexedDB.open("ORANGE_FINAL", 1);
        req.onupgradeneeded = e => { e.target.result.createObjectStore("blobs"); };
        req.onsuccess = e => { db = e.target.result; };

        // TI ENGINE
        function press(n) { buf += n; document.getElementById('ti-display').innerText = buf; }
        function ti(k) {
            if(k==='2nd') { is2nd = !is2nd; return; }
            if(is2nd && k==='del') { document.getElementById('inj-modal').style.display='flex'; is2nd=false; return; }
            if(is2nd && k==='ent') { document.getElementById('boot-gate').style.display = 'none'; document.getElementById('orange-desktop').style.display = 'grid'; return; }
            if(k==='ent') { buf=""; document.getElementById('ti-display').innerText="0"; }
        }

        // BLOBS
        async function commitBlobs() {
            const f18 = document.getElementById('blob-18').files[0];
            const f112 = document.getElementById('blob-112').files[0];
            const tx = db.transaction("blobs", "readwrite");
            if(f18) tx.objectStore("blobs").put(new Blob([await f18.arrayBuffer()], {type:'text/html'}), "18");
            if(f112) tx.objectStore("blobs").put(new Blob([await f112.arrayBuffer()], {type:'text/html'}), "112");
            alert("SYSTEM INJECTED");
            document.getElementById('inj-modal').style.display='none';
        }

        function bootMC() {
            const v = document.getElementById('ver-select').value;
            db.transaction("blobs").objectStore("blobs").get(v).onsuccess = e => {
                if(e.target.result) run(URL.createObjectURL(e.target.result));
                else run(v === '18' ? "https://eaglercraft.com/mc/1.8.8/" : "https://storage.googleapis.com/fernisbest/index.html");
            };
        }

        // NAV
        function nav(t) {
            ['v-launcher','v-youtube','v-brotato','os-frame'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).style.display = 'none'; });
            if(t === 'browser') run("https://storage.googleapis.com/fernisbest/index.html");
            else document.getElementById('v-'+t).style.display = (t==='launcher'?'flex':'block');
        }

        function run(url) { 
            const f = document.getElementById('os-frame'); f.src = url; f.style.display = 'block'; 
            ['v-launcher','v-youtube','v-brotato'].forEach(id => document.getElementById(id).style.display = 'none');
        }

        function loadYT() {
            const id = document.getElementById('yt-url').value;
            document.getElementById('yt-player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
