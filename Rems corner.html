<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORANGE OS | V35</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary: #ea580c; --ti-orange: #fb923c; 
            --bg: #050505; --sidebar: #131110; --neon: #ff6600;
        }
        .theme-lemon { --primary: #a3e635; --neon: #d9f99d; }
        .theme-grape { --primary: #a855f7; --neon: #ddd6fe; }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; transition: 0.5s; }

        /* --- CLEAN PULSATING GLOW (NO TV DISTORTION) --- */
        @keyframes hyperPulse { 
            0%, 100% { box-shadow: 0 0 20px var(--neon); border-color: #fff; transform: scale(1); } 
            50% { box-shadow: 0 0 50px var(--neon); border-color: var(--primary); transform: scale(1.01); } 
        }
        .glow-active { animation: hyperPulse 2s infinite ease-in-out; border: 3px solid var(--primary); }
        
        /* --- FRUIT RAIN --- */
        #fruit-rain { position: fixed; inset: 0; pointer-events: none; z-index: 100; display: none; }
        .falling-fruit { position: absolute; font-size: 2rem; animation: fall linear infinite; }
        @keyframes fall { from { transform: translateY(-10vh) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }

        /* --- TI-84 GUI --- */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; align-items: center; justify-content: center; }
        .ti-body { background: #fb923c; width: 380px; height: 740px; border-radius: 50px; padding: 30px; border: 6px solid #b45309; }
        .lcd { background: #e2e8f0; height: 180px; border-radius: 8px; padding: 15px; color: #111; font-family: monospace; font-size: 1.6rem; text-align: right; display: flex; flex-direction: column; justify-content: flex-end; border: 4px solid #333; }
        .grid-ti { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 30px; }
        .ti-btn { height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 900; cursor: pointer; box-shadow: 0 5px #222; background: #333; color: white; transition: 0.1s; }
        .ti-btn:active { transform: translateY(3px); box-shadow: 0 2px #222; }
        .btn-2nd { background: #2563eb; } .btn-num { background: #f8fafc; color: #000; font-size: 1.2rem; }

        /* --- LAYOUT --- */
        #orange-core { display: none; height: 100vh; width: 100vw; }
        .sidebar { width: 300px; background: var(--sidebar); border-right: 4px solid var(--primary); padding: 30px; display: flex; flex-direction: column; z-index: 10; }
        .nav-item { border: 2px solid var(--primary); padding: 16px; margin-bottom: 15px; cursor: pointer; font-weight: 900; display: flex; justify-content: space-between; transition: 0.2s; }
        .nav-item:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }

        /* --- MC LAUNCHER 2026 --- */
        .mc-container { background: #313233; width: 950px; height: 620px; display: flex; border: 1px solid #444; }
        .mc-sidebar { width: 220px; background: #212223; border-right: 1px solid #000; }
        .mc-tab { padding: 12px 20px; color: #aaa; cursor: pointer; font-size: 12px; font-weight: 800; }
        .mc-tab-active { border-left: 5px solid #3c8527; background: #3c3f41; color: white; }
        .mc-main { flex-grow: 1; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; display: flex; flex-direction: column; }
        .mc-bar { height: 115px; background: rgba(0,0,0,0.95); margin-top: auto; display: flex; align-items: center; padding: 0 35px; gap: 20px; }
        .play-btn { background: #3c8527; color: white; padding: 16px 80px; font-size: 28px; font-weight: 900; border-radius: 3px; transition: 0.2s; }
        .play-btn:hover { background: #47a02e; box-shadow: 0 0 25px #3c8527; }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="fruit-rain"></div>

    <div id="cloak">
        <div class="ti-body glow-active">
            <div class="lcd"><div id="calc-display">0</div></div>
            <div class="grid-ti">
                <div class="ti-btn">y=</div><div class="ti-btn">win</div><div class="ti-btn">zoom</div><div class="ti-btn">trace</div><div class="ti-btn">graph</div>
                <div class="ti-btn btn-2nd" onclick="op('2nd')">2nd</div><div class="ti-btn" onclick="op('MODE')">mode</div><div class="ti-btn" onclick="op('DEL')">del</div><div class="ti-btn">stat</div><div class="ti-btn">prgm</div>
                <div class="ti-btn btn-num" onclick="ins('7')">7</div><div class="ti-btn btn-num" onclick="ins('8')">8</div><div class="ti-btn btn-num" onclick="ins('9')">9</div><div class="ti-btn">/</div><div class="ti-btn">*</div>
                <div class="ti-btn btn-num" onclick="ins('4')">4</div><div class="ti-btn btn-num" onclick="ins('5')">5</div><div class="ti-btn btn-num" onclick="ins('6')">6</div><div class="ti-btn">-</div><div class="ti-btn">+</div>
                <div class="ti-btn btn-num" onclick="ins('1')">1</div><div class="ti-btn btn-num" onclick="ins('2')">2</div><div class="ti-btn btn-num" onclick="ins('3')">3</div><div class="col-span-2 ti-btn" style="background:black" onclick="op('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[5000] hidden items-center justify-center">
        <div class="bg-zinc-900 p-10 w-[500px] glow-active">
            <h2 class="text-orange-500 font-black text-3xl italic mb-8">CORE INJECTOR</h2>
            <input type="file" id="f12" class="w-full bg-black p-4 border border-zinc-700 text-xs mb-4">
            <input type="file" id="f8" class="w-full bg-black p-4 border border-zinc-700 text-xs mb-4">
            <button onclick="injectFiles()" class="w-full bg-orange-600 p-5 font-black text-2xl text-black hover:bg-orange-400">COMMIT BINARY</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-600 text-[10px] mt-4">CANCEL</button>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 id="os-logo" class="text-4xl font-black italic text-orange-600 mb-12 tracking-tighter">ORANGE OS</h1>
            <div class="nav-item" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="showView('yt')"><span>VIDEO HUB</span><span>📺</span></div>
            <div class="nav-item" onclick="launch('https://storage.googleapis.com/fernisbest/index.html')"><span>BROWSER</span><span>🌐</span></div>
            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            <div class="mt-auto nav-item border-white" onclick="location.reload()"><span>PURGE</span><span>❌</span></div>
        </div>

        <div class="flex-grow flex items-center justify-center p-10 bg-[#080808]">
            <div id="launcher-view" class="mc-container glow-active hidden">
                <div class="mc-sidebar">
                    <div class="mc-tab mc-tab-active">Java Edition</div>
                    <div class="mc-tab">Bedrock</div>
                    <div class="mc-tab">Installations</div>
                    <div class="mc-tab">Skins</div>
                </div>
                <div class="mc-main">
                    <div class="mc-bar">
                        <select id="v-sel" class="bg-[#313233] text-white p-3 border border-zinc-600 font-bold"><option value="mc12">1.12.2</option><option value="mc8">1.8.8</option></select>
                        <button onclick="play()" class="play-btn">PLAY</button>
                        <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" class="bg-zinc-700 px-5 py-4 text-[11px] font-black border border-zinc-500">RESOURCE PACKS</button>
                    </div>
                </div>
            </div>

            <div id="settings-view" class="bg-zinc-900 p-10 glow-active hidden w-[550px]">
                <h2 class="font-black text-2xl text-orange-600 mb-8">SYSTEM CONFIG</h2>
                <div class="space-y-6">
                    <div class="bg-black p-5 border border-zinc-800">
                        <p class="text-[10px] text-zinc-500 mb-3 font-bold">CUSTOM IFRAME LOADER</p>
                        <div class="flex gap-2">
                            <input type="text" id="iframe-url" placeholder="https://..." class="flex-grow bg-zinc-900 p-2 text-xs border border-zinc-700">
                            <button onclick="launch(document.getElementById('iframe-url').value)" class="bg-orange-600 px-4 py-2 text-xs font-bold text-black">LAUNCH</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-black p-5"><span>Fruit Rain</span> <input type="checkbox" id="rain-toggle" onchange="toggleRain(this.checked)" class="w-6 h-6"></div>
                    <div class="bg-black p-5">
                        <p class="text-[10px] text-zinc-500 mb-4 font-bold">THEME SELECTION</p>
                        <div class="flex gap-6">
                            <div class="w-12 h-12 bg-orange-600 rounded-full cursor-pointer border-2 border-white" onclick="setTheme('orange')"></div>
                            <div class="w-12 h-12 bg-lime-500 rounded-full cursor-pointer border-2 border-white" onclick="setTheme('lemon')"></div>
                            <div class="w-12 h-12 bg-purple-600 rounded-full cursor-pointer border-2 border-white" onclick="setTheme('grape')"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="yt-view" class="w-full h-full hidden overflow-y-auto p-6"><div class="grid grid-cols-3 gap-6" id="vid-list"></div></div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="bg-orange-600 p-3 flex justify-between"><span class="font-black italic px-4">ORANGE_PROC_V35</span><button onclick="closeApp()" class="bg-black px-8 font-black">X</button></div>
        <iframe id="app-frame" class="w-full h-full border-none bg-black"></iframe>
    </div>

    <script>
        let db;
        const req = indexedDB.open("OS_DATA", 2);
        req.onsuccess = e => { db = e.target.result; loadYT(); };

        function loadYT() {
            const vids = [{id:'dQw4w9WgXcQ', t:'Rickroll'}, {id:'QH2-TGUlwu4', t:'Nyan Cat'}, {id:'9bZkp7q19f0', t:'Gangnam'}, {id:'XqZ_mE_Z97U', t:'Pro Tips'}];
            vids.forEach(v => {
                let d = document.createElement('div'); d.className='bg-zinc-900 border border-zinc-800 p-2 cursor-pointer hover:border-orange-500';
                d.innerHTML = `<img src="https://img.youtube.com/vi/${v.id}/0.jpg" class="w-full mb-2"> <p class="text-[10px] font-black uppercase text-center">${v.t}</p>`;
                d.onclick = () => launch(`https://www.youtube.com/embed/${v.id}?autoplay=1`);
                document.getElementById('vid-list').appendChild(d);
            });
        }

        async function injectFiles() {
            const files = { mc12: document.getElementById('f12').files[0], mc8: document.getElementById('f8').files[0] };
            for (let [k, file] of Object.entries(files)) {
                if(!file) continue;
                const blob = new Blob([await file.arrayBuffer()], {type: 'text/html'});
                const tx = db.transaction("core", "readwrite");
                tx.objectStore("core").put(blob, k);
                await new Promise(r => tx.oncomplete = r);
            }
            alert("CORES COMMITTED");
        }

        function play() {
            const ver = document.getElementById('v-sel').value;
            db.transaction("core").objectStore("core").get(ver).onsuccess = e => {
                if(!e.target.result) return alert("CORE MISSING! USE 2nd+DEL");
                document.getElementById('app-frame').src = URL.createObjectURL(e.target.result);
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        let inputStr = "", is2nd = false, fruitIcon = '🍊';
        function op(k) {
            if(k==='2nd') { is2nd = !is2nd; document.getElementById('calc-display').style.color = is2nd ? '#2563eb' : '#111'; return; }
            if(is2nd && k==='DEL') { document.getElementById('admin-panel').style.display = 'flex'; is2nd = false; return; }
            if(is2nd && k==='EXE') { document.getElementById('cloak').style.display='none'; document.getElementById('orange-core').style.display='flex'; is2nd = false; return; }
            if(k==='EXE') inputStr = "";
            document.getElementById('calc-display').innerText = inputStr || "0";
        }
        function ins(v) { inputStr += v; document.getElementById('calc-display').innerText = inputStr; }

        function setTheme(t) {
            document.body.className = (t === 'orange') ? '' : 'theme-' + t;
            document.getElementById('os-logo').innerText = t.toUpperCase() + ' OS';
            fruitIcon = (t === 'lemon') ? '🍋' : (t === 'grape') ? '🍇' : '🍊';
        }

        function toggleRain(on) {
            const rain = document.getElementById('fruit-rain'); rain.innerHTML = ''; rain.style.display = on ? 'block' : 'none';
            if(on) {
                for(let i=0; i<30; i++) {
                    let f = document.createElement('div'); f.className='falling-fruit'; f.innerText=fruitIcon;
                    f.style.left=Math.random()*100+'vw'; f.style.animationDuration=(Math.random()*3+2)+'s';
                    rain.appendChild(f);
                }
            }
        }

        function showView(v) { ['launcher-view', 'yt-view', 'settings-view'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(v+'-view').classList.remove('hidden'); }
        function launch(u) { if(!u) return; document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }
    </script>
</body>
</html>
