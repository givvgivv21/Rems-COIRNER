<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator | TI-84 Plus CE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --orange-dark: #7c2d12; --orange-mid: #ea580c; --orange-bright: #fb923c; 
            --bg: #0c0a09; --sidebar: #1c1917; --text: #ffffff; --glass: rgba(0,0,0,0.7);
            --win-bg: #212121;
        }
        .light-mode {
            --bg: #f4f4f5; --sidebar: #ffffff; --text: #18181b; --glass: rgba(220,220,220,0.8);
            --win-bg: #e4e4e7;
        }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: var(--text); transition: 0.3s; }

        /* DECOR & ANIMATIONS */
        #orange-rain { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }
        .falling-orange { position: absolute; font-size: 2rem; animation: fall linear infinite; }
        @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }
        
        @keyframes gui-pop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-gui { animation: gui-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* TI-84 PLUS CE CLOAK VISUALS */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #fff; display: flex; align-items: center; justify-content: center; }
        .ti-shell { 
            background: #374151; width: 340px; padding: 40px 20px 30px 20px; 
            border-radius: 15px 15px 50px 50px; border: 4px solid #1f2937;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative;
        }
        .ti-shell::before { content: "TEXAS INSTRUMENTS TI-84 Plus CE"; position: absolute; top: 12px; left: 50%; transform: translateX(-50%); color: #9ca3af; font-size: 9px; font-weight: bold; width: 100%; text-align: center; }
        
        .lcd-bezel { background: #111; padding: 8px; border-radius: 4px; margin-bottom: 20px; border: 2px solid #4b5563; }
        .lcd { background: #99ad99; height: 140px; padding: 10px; color: #111; font-size: 1.6rem; text-align: right; font-family: monospace; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        
        .ti-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .k { background: #111827; border-bottom: 3px solid #000; padding: 8px 0; text-align: center; cursor: pointer; color: #fff; font-size: 10px; font-weight: bold; border-radius: 4px; }
        .k:active { transform: translateY(2px); border-bottom-width: 1px; }
        .k-2nd { background: #2563eb; } 
        .k-alpha { background: #16a34a; }
        .k-math { background: #4b5563; height: 22px; font-size: 8px; margin-bottom: 5px; }
        .k-num { background: #1f2937; height: 36px; font-size: 14px; }
        .k-exe { background: #ea580c; border-bottom: 3px solid #7c2d12; }

        /* CORE UI */
        #orange-core { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 1000; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 2px solid var(--orange-mid); padding: 20px; display: flex; flex-direction: column; z-index: 1100; }
        .nav-item { border: 2px solid var(--orange-mid); padding: 10px; margin-bottom: 8px; cursor: pointer; font-weight: 900; display: flex; justify-content: space-between; color: var(--orange-bright); background: var(--glass); backdrop-filter: blur(10px); transition: 0.2s; }
        .nav-item:hover { transform: translateX(5px); background: var(--orange-dark); color: white; }

        .mojang-window { width: 800px; height: 500px; background: var(--win-bg); border: 2px solid #000; display: flex; flex-direction: column; z-index: 1050; }
        .mojang-body { flex-grow: 1; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; }
        .mojang-play-bar { height: 80px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; padding: 0 20px; border-top: 2px solid #444; gap: 10px; color: white; }
        .play-btn { background: #3c8527; border: 2px solid #000; box-shadow: inset -3px -3px #1a3911, inset 3px 3px #5dbb3d; width: 160px; height: 40px; color: white; font-weight: 900; cursor: pointer; }

        /* ADMIN PANEL */
        #admin-panel { display:none; position:fixed; inset:0; z-index: 200000; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; }
        .admin-box { width: 420px; padding: 30px; background: #111; border: 2px solid var(--orange-mid); color: white; border-radius: 12px; }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 150000; flex-direction: column; }
    </style>
</head>
<body onkeydown="handleGlobalKeys(event)">

    <div id="orange-rain"></div>

    <div id="cloak">
        <div class="ti-shell animate-gui">
            <div class="lcd-bezel">
                <div id="lcd" class="lcd">0</div>
            </div>
            <div class="ti-grid">
                <div class="k k-math">y=</div><div class="k k-math">window</div><div class="k k-math">zoom</div><div class="k k-math">trace</div><div class="k k-math">graph</div>
                <div class="k k-2nd" onclick="op('2nd')">2nd</div>
                <div class="k">mode</div>
                <div class="k" onclick="op('DEL')">del</div>
                <div class="k" onclick="ins('/')">/</div>
                <div class="k" onclick="ins('*')">X</div>
                <div class="k k-alpha">alpha</div>
                <div class="k k-num" onclick="ins('7')">7</div>
                <div class="k k-num" onclick="ins('8')">8</div>
                <div class="k k-num" onclick="ins('9')">9</div>
                <div class="k" onclick="ins('-')">-</div>
                <div class="k">x²</div>
                <div class="k k-num" onclick="ins('4')">4</div>
                <div class="k k-num" onclick="ins('5')">5</div>
                <div class="k k-num" onclick="ins('6')">6</div>
                <div class="k" onclick="ins('+')">+</div>
                <div class="k">log</div>
                <div class="k k-num" onclick="ins('1')">1</div>
                <div class="k k-num" onclick="ins('2')">2</div>
                <div class="k k-num" onclick="ins('3')">3</div>
                <div class="k k-exe" onclick="op('EXE')">enter</div>
                <div class="k">ln</div>
                <div class="k k-num" onclick="ins('0')">0</div>
                <div class="k k-num">.</div>
                <div class="k k-num">(-)</div>
                <div class="k k-num">ans</div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-box">
            <h2 class="text-orange-500 font-black mb-4 uppercase text-center text-xl">Core Injection</h2>
            <div class="space-y-4">
                <div><p class="text-[10px] text-zinc-500 mb-1 uppercase">Build 1.12.2</p><input type="file" id="file12" class="bg-black p-2 w-full text-xs border border-zinc-800 text-white"></div>
                <div><p class="text-[10px] text-zinc-500 mb-1 uppercase">Build 1.8.8</p><input type="file" id="file8" class="bg-black p-2 w-full text-xs border border-zinc-800 text-white"></div>
                <button id="commit-btn" onclick="startHeavyInjection()" class="bg-orange-600 text-white p-3 w-full font-black border-b-4 border-orange-900">COMMIT TO CORE</button>
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-[10px] text-zinc-600 uppercase mt-4">Close Interface</button>
            </div>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-6 uppercase">Orange OS</h1>
            <div class="nav-item" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="launch('https://storage.googleapis.com/fernisbest/index.html')"><span>BROWSER</span><span>🌐</span></div>
            
            <div class="nav-item flex-col items-start gap-1 h-auto cursor-default">
                <span class="text-[9px] text-zinc-400 font-normal">Stay tuned for more bypasses</span>
                <button onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER/tree/main', '_blank')" class="bg-orange-600 text-[10px] px-2 py-0.5 rounded text-white font-bold hover:bg-orange-500 transition">GO TO WEBSITE</button>
            </div>

            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            <div class="mt-auto p-3 border border-orange-500 bg-black/20 text-[10px] flex justify-between items-center mb-2">
                <span>LIGHT THEME</span>
                <input type="checkbox" onchange="toggleLight(this.checked)">
            </div>
            <div class="nav-item text-white border-white" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="content-area" class="flex-grow flex items-center justify-center">
            <div id="launcher-view" class="mojang-window hidden animate-gui">
                <div class="mojang-body"></div>
                <div class="mojang-play-bar">
                    <select id="ver-select" class="bg-zinc-800 p-2 text-white border border-zinc-600 w-56 font-bold outline-none">
                        <option value="mc12" selected>Eaglercraft 1.12.2</option>
                        <option value="mc8">Eaglercraft 1.8.8</option>
                    </select>
                    <button onclick="playSelected()" class="play-btn ml-2">PLAY</button>
                    <div class="flex flex-col gap-1 ml-4 text-[9px] font-bold">
                        <div class="flex items-center gap-2"><span id="dot12" class="w-2 h-2 rounded-full bg-red-500"></span> 1.12</div>
                        <div class="flex items-center gap-2"><span id="dot8" class="w-2 h-2 rounded-full bg-red-500"></span> 1.8</div>
                    </div>
                </div>
            </div>
            
            <div id="settings-view" class="hidden p-10 bg-black/80 border border-orange-500 rounded-2xl w-full max-w-md animate-gui">
                <h2 class="text-2xl font-bold text-orange-500 mb-6">SETTINGS</h2>
                <div class="flex justify-between items-center mb-4"><span>Orange Rain</span><input type="checkbox" onchange="toggleRain(this.checked)"></div>
                <div class="flex justify-between items-center"><span>Iframe Mode</span><input type="checkbox" id="iframe-toggle" checked></div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="p-2 bg-zinc-900 flex justify-end"><button onclick="closeApp()" class="bg-red-600 px-4 py-1 font-bold text-xs">EXIT</button></div>
        <iframe id="app-frame" class="w-full h-full bg-black"></iframe>
    </div>

    <script>
        let db;
        const dbReq = indexedDB.open("OrangeOS_V22", 1);
        dbReq.onupgradeneeded = (e) => { db = e.target.result; db.createObjectStore("core"); };
        dbReq.onsuccess = (e) => { db = e.target.result; updateStatusDots(); };

        async function startHeavyInjection() {
            const btn = document.getElementById('commit-btn');
            const files = { mc12: document.getElementById('file12').files[0], mc8: document.getElementById('file8').files[0] };
            if(!files.mc12 && !files.mc8) return alert("Select a file first!");
            btn.innerText = "PROCESSING...";
            for (const [key, file] of Object.entries(files)) {
                if(!file) continue;
                const text = await file.text();
                const tx = db.transaction(["core"], "readwrite");
                tx.objectStore("core").put(text, key);
                await new Promise(r => tx.oncomplete = r);
            }
            btn.innerText = "CORE UPDATED!";
            updateStatusDots();
            setTimeout(() => btn.innerText = "COMMIT TO CORE", 2000);
        }

        function playSelected() {
            const key = document.getElementById('ver-select').value;
            const tx = db.transaction(["core"], "readonly");
            tx.objectStore("core").get(key).onsuccess = (e) => {
                const data = e.target.result;
                if(!data) return alert("Build not found! Upload in Admin Panel first.");
                
                // --- FORCE RENDER FIX ---
                if(document.getElementById('iframe-toggle').checked) {
                    const frame = document.getElementById('app-frame');
                    document.getElementById('app-overlay').style.display = 'flex';
                    const doc = frame.contentDocument || frame.contentWindow.document;
                    doc.open();
                    doc.write(data);
                    doc.close();
                } else { 
                    const newWin = window.open();
                    newWin.document.write(data);
                    newWin.document.close();
                }
            };
        }

        function updateStatusDots() {
            if(!db) return;
            const tx = db.transaction(["core"], "readonly");
            const store = tx.objectStore("core");
            store.get("mc12").onsuccess = (e) => document.getElementById('dot12').style.background = e.target.result ? '#44ff44' : '#ff4444';
            store.get("mc8").onsuccess = (e) => document.getElementById('dot8').style.background = e.target.result ? '#44ff44' : '#ff4444';
        }

        let inputStr = "0", is2nd = false;
        function op(k) {
            const lcd = document.getElementById('lcd');
            if(k === '2nd') { is2nd = !is2nd; lcd.style.background = is2nd ? '#d1ffd1' : '#99ad99'; return; }
            if(is2nd && k === 'DEL') {
                let p = prompt("ADMIN KEY:"); if(p === "remmy21") document.getElementById('admin-panel').style.display = 'flex';
                is2nd = false; return;
            }
            if(is2nd && k === 'EXE') { 
                document.getElementById('cloak').style.display = 'none'; 
                document.getElementById('orange-core').style.display = 'flex'; 
                updateStatusDots(); 
                return; 
            }
            if(k === 'DEL') inputStr = inputStr.length > 1 ? inputStr.slice(0, -1) : "0";
            if(k === 'EXE') try { inputStr = String(eval(inputStr.replace(/X/g, '*'))); } catch { inputStr = "ERR"; }
            lcd.innerText = inputStr;
        }
        function ins(v) { inputStr = (inputStr === "0") ? v : inputStr + v; document.getElementById('lcd').innerText = inputStr; }
        function handleGlobalKeys(e) { if(e.key === 'Escape') location.reload(); }
        function showView(v) { ['launcher-view', 'settings-view'].forEach(i => document.getElementById(i).classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
        function toggleLight(on) { if(on) document.body.classList.add('light-mode'); else document.body.classList.remove('light-mode'); }
        function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = 'about:blank'; }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function toggleRain(on) {
            document.getElementById('orange-rain').style.display = on ? 'block' : 'none';
            if(on && document.getElementById('orange-rain').innerHTML === "") {
                for(let i=0; i<30; i++) {
                    let o = document.createElement('div'); o.className='falling-orange'; o.innerText='🍊';
                    o.style.left=Math.random()*100+'vw'; o.style.animationDuration=(Math.random()*3+2)+'s';
                    document.getElementById('orange-rain').appendChild(o);
                }
            }
        }
    </script>
</body>
</html>
