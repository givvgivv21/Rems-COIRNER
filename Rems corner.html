<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | Multi-Core Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary: #ea580c; --primary-bright: #fb923c; --primary-dark: #7c2d12;
            --bg: #0c0a09; --sidebar: #110c0a; --accent-glow: rgba(234, 88, 12, 0.6);
            --text: #ffffff;
        }
        /* THEME OVERRIDES */
        .theme-lemon {
            --primary: #a3e635; --primary-bright: #fef08a; --primary-dark: #365314;
            --bg: #050501; --sidebar: #0a0a02; --accent-glow: rgba(163, 230, 53, 0.6);
        }
        .theme-grape {
            --primary: #a855f7; --primary-bright: #e9d5ff; --primary-dark: #3b0764;
            --bg: #05010a; --sidebar: #0a0212; --accent-glow: rgba(168, 85, 247, 0.6);
        }

        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: var(--text); transition: 0.5s ease-in-out; }

        /* FLASHY ANIMATIONS */
        @keyframes borderFlow {
            0% { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
            50% { border-color: var(--primary-bright); box-shadow: 0 0 25px var(--primary-bright); }
            100% { border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }
        }
        .flashy-border { border: 2px solid var(--primary); animation: borderFlow 2s infinite; }
        
        .glitch-text {
            text-shadow: 2px 0 var(--primary-dark), -2px 0 #00fff9;
            animation: glitch 3s infinite linear alternate-reverse;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--primary-dark), -2px 0 #00fff9; }
            50% { text-shadow: -2px 0 var(--primary-dark), 2px 0 #00fff9; }
            100% { text-shadow: 2px 0 var(--primary-dark), -1px 0 #00fff9; }
        }

        /* CORE UI */
        #orange-core { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, var(--primary-dark) -100%, var(--bg) 100%); }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 3px solid var(--primary); padding: 25px; display: flex; flex-direction: column; z-index: 1100; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        
        .nav-item { 
            border: 1px solid var(--primary); padding: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 900; 
            display: flex; justify-content: space-between; color: var(--primary-bright); background: rgba(0,0,0,0.4);
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-item:hover { background: var(--primary); color: #000; transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }

        .mojang-window { width: 850px; height: 550px; background: #000; border: 3px solid var(--primary); display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; animation: borderFlow 4s infinite; }
        .mojang-body { flex-grow: 1; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; position: relative; }
        
        .play-btn { 
            background: #3c8527; border: 3px solid #000; box-shadow: inset -4px -4px #1a3911, inset 4px 4px #5dbb3d; 
            width: 160px; height: 50px; color: white; font-weight: 900; cursor: pointer;
        }

        /* CLOAK & ADMIN */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; align-items: center; justify-content: center; }
        .calc { background: #111; width: 340px; padding: 25px; border-radius: 24px; border: 3px solid var(--primary); }
        .lcd { background: #a3ad99; height: 70px; margin-bottom: 15px; padding: 15px; color: #111; font-size: 1.8rem; text-align: right; font-family: monospace; border-radius: 8px; }

        #admin-panel { display:none; position:fixed; inset:0; z-index: 200000; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; }
        
        /* THEME SELECTOR BUTTONS */
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: 0.2s; }
        .theme-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body onkeydown="handleGlobalKeys(event)">

    <div id="cloak">
        <div class="calc flashy-border">
            <div id="lcd" class="lcd">0</div>
            <div class="grid grid-cols-4 gap-2">
                <div class="bg-zinc-800 p-4 text-center cursor-pointer rounded font-bold" onclick="op('2nd')">2nd</div>
                <div class="bg-zinc-800 p-4 text-center cursor-pointer rounded font-bold" onclick="op('DEL')">DEL</div>
                <div class="bg-zinc-700 p-4 text-center cursor-pointer rounded font-bold" onclick="ins('/')">/</div>
                <div class="bg-zinc-700 p-4 text-center cursor-pointer rounded font-bold" onclick="ins('*')">X</div>
                <div class="bg-zinc-900 p-4 text-center cursor-pointer rounded" onclick="ins('7')">7</div>
                <div class="bg-zinc-900 p-4 text-center cursor-pointer rounded" onclick="ins('8')">8</div>
                <div class="bg-zinc-900 p-4 text-center cursor-pointer rounded" onclick="ins('9')">9</div>
                <div class="bg-zinc-700 p-4 text-center cursor-pointer rounded font-bold" onclick="ins('-')">-</div>
                <div class="bg-orange-600 p-4 text-center cursor-pointer rounded font-bold col-span-4" onclick="op('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="bg-black border-2 border-primary p-8 rounded-xl w-96 flashy-border">
            <h2 class="text-primary font-black text-2xl mb-4 italic uppercase">Core Injection</h2>
            <input type="file" id="file12" class="w-full bg-zinc-900 p-2 mb-4 text-xs border border-zinc-700">
            <input type="file" id="file8" class="w-full bg-zinc-900 p-2 mb-4 text-xs border border-zinc-700">
            <button id="commit-btn" onclick="startHeavyInjection()" class="w-full bg-primary p-4 font-black text-black">INJECT DATA</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-500 text-[10px] mt-4 uppercase">Close</button>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-4xl font-black italic text-primary mb-8 uppercase glitch-text">Orange OS</h1>
            <div class="nav-item flashy-border" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="launch('https://www.google.com/search?igu=1')"><span>BROWSER</span><span>🌐</span></div>
            <div class="nav-item" onclick="launch('https://www.youtube.com/embed?listType=search&list=minecraft')"><span>YOUTUBE</span><span>📺</span></div>
            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            <div class="mt-auto nav-item text-white border-white" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="content-area" class="flex-grow flex items-center justify-center">
            <div id="launcher-view" class="mojang-window hidden">
                <div class="mojang-body"></div>
                <div class="h-24 bg-black/90 flex items-center justify-center gap-4 px-6 border-t-2 border-primary">
                    <select id="ver-select" class="bg-zinc-900 p-2 text-white border border-primary text-xs font-bold outline-none">
                        <option value="mc12">Eagler 1.12.2</option>
                        <option value="mc8">Eagler 1.8.8</option>
                    </select>
                    <button onclick="playSelected()" class="play-btn">PLAY</button>
                    <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" class="bg-zinc-800 p-2 text-[8px] font-bold border border-white/20 uppercase">Texture Packs</button>
                    <div class="flex flex-col gap-1 text-[9px]">
                        <div class="flex items-center gap-1"><span id="dot12" class="w-2 h-2 rounded-full bg-red-600"></span> 1.12</div>
                        <div class="flex items-center gap-1"><span id="dot8" class="w-2 h-2 rounded-full bg-red-600"></span> 1.8</div>
                    </div>
                </div>
            </div>

            <div id="settings-view" class="hidden p-10 bg-black border-2 border-primary rounded-2xl w-96 flashy-border">
                <h2 class="text-2xl font-black text-primary mb-6 italic uppercase">System Config</h2>
                <div class="flex flex-col gap-4">
                    <p class="text-xs font-bold text-zinc-400">COLOR SCHEME</p>
                    <div class="flex gap-4">
                        <div class="theme-btn bg-orange-600" onclick="setTheme('orange')"></div>
                        <div class="theme-btn bg-lime-500" onclick="setTheme('lemon')"></div>
                        <div class="theme-btn bg-purple-600" onclick="setTheme('grape')"></div>
                    </div>
                    <hr class="border-zinc-800 my-2">
                    <div class="flex justify-between items-center text-sm font-bold">
                        <span>Iframe Isolation</span>
                        <input type="checkbox" id="iframe-toggle" checked class="accent-primary">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="p-2 bg-primary flex justify-between items-center text-black font-black text-[10px]">
            <span class="ml-4">EXTERNAL CORE ACTIVE</span>
            <button onclick="closeApp()" class="bg-black text-white px-4 py-1">EXIT</button>
        </div>
        <iframe id="app-frame" class="w-full h-full bg-black"></iframe>
    </div>

    <script>
        let db;
        const dbReq = indexedDB.open("OrangeOS_V22", 1);
        dbReq.onupgradeneeded = (e) => { db = e.target.result; db.createObjectStore("core"); };
        dbReq.onsuccess = (e) => { db = e.target.result; updateStatusDots(); };

        function setTheme(t) {
            document.body.className = '';
            if(t !== 'orange') document.body.classList.add('theme-' + t);
        }

        async function startHeavyInjection() {
            const btn = document.getElementById('commit-btn');
            const files = { mc12: document.getElementById('file12').files[0], mc8: document.getElementById('file8').files[0] };
            if(!files.mc12 && !files.mc8) return alert("Select files!");
            btn.innerText = "INJECTING...";
            for (const [key, file] of Object.entries(files)) {
                if(!file) continue;
                const text = await file.text();
                const tx = db.transaction(["core"], "readwrite");
                tx.objectStore("core").put(text, key);
                await new Promise(r => tx.oncomplete = r);
            }
            btn.innerText = "SUCCESS";
            updateStatusDots();
            setTimeout(() => btn.innerText = "INJECT DATA", 2000);
        }

        function playSelected() {
            const key = document.getElementById('ver-select').value;
            const tx = db.transaction(["core"], "readonly");
            tx.objectStore("core").get(key).onsuccess = (e) => {
                const data = e.target.result;
                if(!data) return alert("Build not found!");
                const blob = new Blob([data], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                if(document.getElementById('iframe-toggle').checked) {
                    document.getElementById('app-frame').src = url;
                    document.getElementById('app-overlay').style.display = 'flex';
                } else { window.open(url, '_blank'); }
            };
        }

        function updateStatusDots() {
            if(!db) return;
            const tx = db.transaction(["core"], "readonly");
            const store = tx.objectStore("core");
            store.get("mc12").onsuccess = (e) => document.getElementById('dot12').style.background = e.target.result ? '#44ff44' : '#ff4444';
            store.get("mc8").onsuccess = (e) => document.getElementById('dot8').style.background = e.target.result ? '#44ff44' : '#ff4444';
        }

        let inputStr = "0", is2nd = false;
        function op(k) {
            if(k === '2nd') { is2nd = !is2nd; document.getElementById('lcd').style.background = is2nd ? '#d1ffd1' : '#a3ad99'; return; }
            if(is2nd && k === 'DEL') {
                let p = prompt("Key:"); if(p === "remmy21") document.getElementById('admin-panel').style.display = 'flex';
                is2nd = false; return;
            }
            if(is2nd && k === 'EXE') { document.getElementById('cloak').style.display = 'none'; document.getElementById('orange-core').style.display = 'flex'; updateStatusDots(); return; }
            if(k === 'DEL') inputStr = inputStr.length > 1 ? inputStr.slice(0, -1) : "0";
            if(k === 'EXE') try { inputStr = String(eval(inputStr.replace(/X/g, '*'))); } catch { inputStr = "ERR"; }
            document.getElementById('lcd').innerText = inputStr;
        }
        function ins(v) { inputStr = (inputStr === "0") ? v : inputStr + v; document.getElementById('lcd').innerText = inputStr; }
        function handleGlobalKeys(e) { if(e.key === 'Escape') location.reload(); }
        function showView(v) { ['launcher-view', 'settings-view'].forEach(i => document.getElementById(i).classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = ''; }
    </script>
</body>
</html>
