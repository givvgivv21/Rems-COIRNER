<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator | TI-84 Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --orange-dark: #7c2d12; --orange-mid: #ea580c; --orange-bright: #fb923c; 
            --bg: #0c0a09; --sidebar: #1c1917; --text: #ffffff; --glass: rgba(0,0,0,0.7);
            --mojang-green: #3c8527; --win-bg: #212121;
        }
        .light-mode {
            --bg: #e4e4e7; --sidebar: #ffffff; --text: #18181b; --glass: rgba(255,255,255,0.6);
            --win-bg: #f4f4f5;
        }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: var(--text); transition: 0.4s; }

        /* --- THE RAIN SYSTEM --- */
        #orange-rain { position: fixed; inset: 0; pointer-events: none; z-index: 1; display: none; }
        .falling-orange { position: absolute; font-size: 2rem; animation: fall linear infinite; user-select: none; }
        @keyframes fall { 
            from { transform: translateY(-10vh) rotate(0deg); } 
            to { transform: translateY(110vh) rotate(360deg); } 
        }

        /* FX */
        .bg-orange-container { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 0; pointer-events: none; }
        .big-orange { font-size: 20rem; filter: drop-shadow(0 0 50px var(--orange-mid)); animation: pulsate 4s ease-in-out infinite; opacity: 0.2; }
        @keyframes pulsate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* CALC CLOAK */
        #cloak { position: fixed; inset: 0; z-index: 10000; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }
        .calc { background: #1e1e1e; width: 360px; padding: 30px; border-radius: 20px; border: 4px solid #333; }
        .lcd { background: #99ad99; border: 4px solid #555; height: 80px; margin-bottom: 20px; padding: 15px; color: #111; font-size: 2rem; text-align: right; font-family: monospace; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { background: #2a2a2a; border-bottom: 4px solid #000; padding: 15px 0; text-align: center; cursor: pointer; color: #bbb; font-weight: bold; border-radius: 8px; }

        /* OS CORE */
        #orange-core { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 5000; }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 2px solid var(--orange-mid); padding: 25px; display: flex; flex-direction: column; z-index: 10; }
        .nav-item { border: 2px solid var(--orange-mid); padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: 900; display: flex; justify-content: space-between; color: var(--orange-bright); background: var(--glass); backdrop-filter: blur(10px); }

        /* MOJANG UI */
        .mojang-window { width: 850px; height: 520px; background: var(--win-bg); border: 1px solid #000; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; z-index: 20; }
        .mojang-nav { height: 45px; background: rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 20px; gap: 25px; border-bottom: 1px solid #333; }
        .mojang-body { flex-grow: 1; display: flex; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; position: relative; }
        .mojang-play-bar { height: 90px; background: var(--glass); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; padding: 0 30px; border-top: 1px solid #444; gap: 15px; }
        .play-btn { background: var(--mojang-green); border: 2px solid #000; box-shadow: inset -3px -3px #1a3911, inset 3px 3px #5dbb3d; width: 180px; height: 45px; color: white; font-size: 20px; font-weight: 900; cursor: pointer; }
        
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .dot-red { background: #ff4444; border: 1px solid #000; }
        .dot-green { background: #44ff44; box-shadow: 0 0 8px #44ff44; border: 1px solid #000; }

        #admin-panel { display:none; position:fixed; inset:0; z-index:30000; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 40000; flex-direction: column; }
    </style>
</head>
<body onkeydown="handleGlobalKeys(event)">

    <div id="orange-rain"></div>
    <div class="bg-orange-container"><div class="big-orange">🍊</div></div>

    <div id="cloak">
        <div class="calc">
            <div id="lcd" class="lcd">0</div>
            <div class="grid">
                <div class="btn" style="color:var(--orange-bright)" onclick="op('2nd')">2nd</div>
                <div class="btn" style="color:#ff4d4d" onclick="op('DEL')">DEL</div>
                <div class="btn" onclick="ins('/')">/</div><div class="btn" onclick="ins('*')">X</div>
                <div class="btn" onclick="ins('7')">7</div><div class="btn" onclick="ins('8')">8</div><div class="btn" onclick="ins('9')">9</div><div class="btn" onclick="ins('-')">-</div>
                <div class="btn" onclick="ins('4')">4</div><div class="btn" onclick="ins('5')">5</div><div class="btn" onclick="ins('6')">6</div><div class="btn" onclick="ins('+')">+</div>
                <div class="btn" onclick="ins('1')">1</div><div class="btn" onclick="ins('2')">2</div><div class="btn" onclick="ins('3')">3</div>
                <div class="btn bg-orange-600 text-white" onclick="op('EXE')">EXE</div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="mojang-window h-auto p-10 max-w-md bg-zinc-900 border-orange-500 border-2">
            <h2 class="text-orange-500 font-black mb-4 uppercase text-center text-xl">Core Injection</h2>
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] mb-1"><span>1.8.8</span><button onclick="clearGame('mc8')" class="text-red-500">WIPE</button></div>
                    <input type="file" id="file8" class="bg-black p-2 w-full text-xs border border-zinc-700">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-1"><span>1.12.2</span><button onclick="clearGame('mc12')" class="text-red-500">WIPE</button></div>
                    <input type="file" id="file12" class="bg-black p-2 w-full text-xs border border-zinc-700">
                </div>
                <button onclick="saveToIndexedDB()" class="w-full bg-orange-600 py-3 font-black text-white border-b-4 border-orange-900">COMMIT TO CORE</button>
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-[10px] text-zinc-500">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-8 uppercase">Rem's Corner</h1>
            <div class="nav-item" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER/tree/main', '_blank')"><span>FIND MORE</span><span>📁</span></div>
            <div class="nav-item" onclick="launch('https://youtube.com')"><span>YOUTUBE</span><span>📺</span></div>
            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            
            <div class="mt-auto p-4 border border-orange-500 bg-black/20 text-[10px] flex justify-between items-center">
                <span>LIGHT THEME</span>
                <input type="checkbox" onchange="toggleLight(this.checked)">
            </div>
            <div class="mt-4 nav-item text-white border-white" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="content-area">
            <div id="launcher-view" class="mojang-window hidden">
                <div class="mojang-nav"><div class="text-white border-b-2 border-orange-500 h-full flex items-center px-4 font-bold text-xs uppercase">Play</div></div>
                <div class="mojang-body"></div>
                <div class="mojang-play-bar">
                    <select id="ver-select" class="bg-zinc-800 p-2 text-white border border-zinc-600 w-64 outline-none font-bold">
                        <option value="mc8">Eaglercraft 1.8.8 Build</option>
                        <option value="mc12">Eaglercraft 1.12.2 Build</option>
                    </select>
                    <button onclick="playSelected()" class="play-btn">PLAY</button>
                    <div class="flex flex-col gap-1 ml-4">
                        <div class="flex items-center gap-2"><span id="dot8" class="status-dot dot-red"></span><span class="text-[9px]">1.8</span></div>
                        <div class="flex items-center gap-2"><span id="dot12" class="status-dot dot-red"></span><span class="text-[9px]">1.12</span></div>
                    </div>
                </div>
            </div>

            <div id="settings-view" class="hidden p-10 bg-black/60 backdrop-blur-xl border border-orange-500 rounded-2xl w-full max-w-md">
                <h2 class="text-2xl font-bold text-orange-500 mb-6">SETTINGS</h2>
                <div class="flex justify-between items-center mb-6">
                    <span class="font-bold">Orange Rain FX</span>
                    <input type="checkbox" onchange="toggleRain(this.checked)" class="w-5 h-5">
                </div>
                <div class="flex justify-between items-center"><span>Iframe Mode</span><input type="checkbox" id="iframe-toggle" checked></div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="p-2 bg-zinc-900 flex justify-end border-b border-orange-600"><button onclick="closeApp()" class="bg-red-600 px-4 py-1 font-bold text-xs">EXIT SESSION</button></div>
        <iframe id="app-frame" class="w-full h-full bg-black"></iframe>
    </div>

    <script>
        // --- CORE DATABASE ENGINE ---
        let db;
        const request = indexedDB.open("OrangeOS_Storage", 2);
        request.onupgradeneeded = (e) => { 
            db = e.target.result; 
            if(!db.objectStoreNames.contains("core")) db.createObjectStore("core"); 
        };
        request.onsuccess = (e) => { db = e.target.result; updateStatusDots(); };

        async function saveToIndexedDB() {
            const files = { mc8: document.getElementById('file8').files[0], mc12: document.getElementById('file12').files[0] };
            for (const [key, file] of Object.entries(files)) {
                if(!file) continue;
                const text = await file.text();
                const tx = db.transaction(["core"], "readwrite");
                tx.objectStore("core").put(text, key);
                await new Promise(r => tx.oncomplete = r);
            }
            alert("CORE REGISTRY UPDATED");
            updateStatusDots();
        }

        function playSelected() {
            const key = document.getElementById('ver-select').value;
            const tx = db.transaction(["core"], "readonly");
            const req = tx.objectStore("core").get(key);
            req.onsuccess = () => {
                if(!req.result) return alert("Version missing! Upload in Admin (2nd + DEL)");
                const url = URL.createObjectURL(new Blob([req.result], {type: 'text/html'}));
                if(document.getElementById('iframe-toggle').checked) {
                    document.getElementById('app-frame').src = url;
                    document.getElementById('app-overlay').style.display = 'flex';
                } else { window.open(url, '_blank'); }
            };
        }

        function updateStatusDots() {
            if(!db) return;
            const tx = db.transaction(["core"], "readonly");
            const store = tx.objectStore("core");
            store.get("mc8").onsuccess = (e) => document.getElementById('dot8').className = e.target.result ? 'status-dot dot-green' : 'status-dot dot-red';
            store.get("mc12").onsuccess = (e) => document.getElementById('dot12').className = e.target.result ? 'status-dot dot-green' : 'status-dot dot-red';
        }

        // --- RAIN LOGIC ---
        function toggleRain(on) {
            const container = document.getElementById('orange-rain');
            container.style.display = on ? 'block' : 'none';
            if(on && container.innerHTML === "") {
                for(let i=0; i<35; i++) {
                    let o = document.createElement('div');
                    o.className = 'falling-orange';
                    o.innerText = '🍊';
                    o.style.left = Math.random() * 100 + 'vw';
                    o.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    o.style.animationDelay = (Math.random() * 5) + 's';
                    container.appendChild(o);
                }
            }
        }

        // --- UI & CALC ---
        let inputStr = "0", is2nd = false;
        function op(k) {
            if(k === '2nd') { is2nd = !is2nd; document.getElementById('lcd').style.background = is2nd ? '#d1ffd1' : '#99ad99'; return; }
            if(is2nd && k === 'DEL') {
                let p = prompt("ADMIN KEY:"); if(p === "remmy21") document.getElementById('admin-panel').style.display = 'flex';
                is2nd = false; return;
            }
            if(is2nd && k === 'EXE') { document.getElementById('cloak').style.display = 'none'; document.getElementById('orange-core').style.display = 'flex'; updateStatusDots(); return; }
            if(k === 'DEL') inputStr = inputStr.length > 1 ? inputStr.slice(0, -1) : "0";
            if(k === 'EXE') try { inputStr = String(eval(inputStr.replace(/X/g, '*'))); } catch { inputStr = "ERR"; }
            document.getElementById('lcd').innerText = inputStr;
        }
        function ins(v) { inputStr = (inputStr === "0") ? v : inputStr + v; document.getElementById('lcd').innerText = inputStr; }
        function handleGlobalKeys(e) { if(e.key === 'Escape') location.reload(); }
        function showView(v) { ['launcher-view', 'settings-view'].forEach(i => document.getElementById(i).classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
        function toggleLight(on) { document.body.classList.toggle('light-mode', on); }
        function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = ''; }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
    </script>
</body>
</html>
