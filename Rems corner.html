<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Pumpkin OS | V82.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #f97316; --p-dark: #7c2d12; --bg: #0c0a09; --card: rgba(255,255,255,0.03); --text: #fff; }
        [data-theme="light"] { --bg: #f4f4f5; --card: rgba(0,0,0,0.05); --text: #18181b; }

        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: background 0.3s ease; }

        /* BOOT SCREEN */
        #cloak { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .big-pumpkin { font-size: 140px; margin-bottom: 20px; animation: glow 3s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 20px rgba(249,115,22,0.2)); transform: scale(1); } 50% { filter: drop-shadow(0 0 50px rgba(249,115,22,0.6)); transform: scale(1.05); } }
        
        .ti-body { background: #f97316; width: 340px; height: 580px; border-radius: 45px 45px 90px 90px; padding: 25px; border: 5px solid #c2410c; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .lcd { background: #94a392; height: 100px; border: 4px solid #000; border-radius: 12px; padding: 10px; color: #1a241a; font-family: monospace; font-weight: bold; overflow: hidden; }

        /* MAIN GUI */
        #orange-core { display: none; height: 100vh; width: 100vw; grid-template-columns: 240px 1fr; padding: 20px; gap: 20px; }
        .sidebar { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(128,128,128,0.1); border-radius: 40px; padding: 30px 15px; display: flex; flex-direction: column; }
        .main-stage { background: var(--card); border-radius: 50px; border: 1px solid rgba(128,128,128,0.1); overflow: hidden; position: relative; }
        .view-pane { display: none; width: 100%; height: 100%; padding: 40px; overflow-y: auto; }
        
        .nav-link { padding: 14px 20px; border-radius: 50px; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #777; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .nav-active { background: var(--p); color: #000 !important; }

        .ti-btn { height: 35px; background: #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; box-shadow: 0 4px 0 #000; color: #fff; cursor: pointer; }
        .ti-btn-2nd-active { background: #2563eb !important; }
        
        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="cloak">
        <div class="big-pumpkin">🎃</div>
        <div class="ti-body">
            <div class="lcd">
                <div id="calc-history" class="text-[10px] opacity-50 h-4"></div>
                <div id="calc-display" class="text-3xl mt-2 text-right">0</div>
            </div>
            <div class="grid grid-cols-5 gap-2 mt-10">
                <div id="btn-2nd" class="ti-btn bg-blue-600" onclick="handleOp('2nd')">2nd</div>
                <div class="ti-btn" onclick="handleOp('DEL')">del</div>
                <div class="ti-btn" onclick="ins('(')">(</div><div class="ti-btn" onclick="ins(')')">)</div><div class="ti-btn" onclick="ins('/')">/</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('7')">7</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('8')">8</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('9')">9</div><div class="ti-btn" onclick="ins('*')">x</div><div class="ti-btn" onclick="ins('**')">^</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('4')">4</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('5')">5</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('6')">6</div><div class="ti-btn" onclick="ins('-')">-</div><div class="ti-btn" onclick="ins('.')">.</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('1')">1</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('2')">2</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('3')">3</div><div class="ti-btn" onclick="ins('+')">+</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('0')">0</div>
                <div class="ti-btn bg-black text-white col-span-5" onclick="handleOp('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/90 z-[3000] hidden items-center justify-center backdrop-blur-md">
        <div class="bg-zinc-900 p-10 rounded-[50px] border-2 border-orange-500 w-[420px]">
            <h2 class="text-orange-500 font-black mb-6 uppercase">Eagler Injector</h2>
            <input type="file" id="f12" class="mb-4 text-xs text-white bg-white/5 p-4 rounded-2xl w-full">
            <input type="file" id="f8" class="mb-6 text-xs text-white bg-white/5 p-4 rounded-2xl w-full">
            <button onclick="injectFiles()" class="w-full py-4 bg-orange-500 text-black rounded-full font-black">RUN INJECTION</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-500 mt-4 text-xs">Close</button>
        </div>
    </div>

    <div id="orange-core">
        <aside class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-10 text-center">PUMPKIN</h1>
            <nav class="flex-grow">
                <div class="nav-link nav-active" onclick="nav('launcher')"><span>🎃</span> Launcher</div>
                <div class="nav-link" onclick="nav('updates')"><span>✨</span> Updates</div>
                <div class="nav-link" onclick="nav('settings')"><span>⚙️</span> Settings</div>
            </nav>
        </aside>

        <main class="main-stage">
            <div id="launcher-view" class="view-pane flex-col items-center justify-center" style="display:flex;">
                <div class="w-full max-w-lg p-10 bg-white/5 rounded-[50px] border border-white/10 text-center">
                    <h2 class="text-2xl font-black mb-8 uppercase">Eagler Loader</h2>
                    <select id="v-sel" class="w-full bg-zinc-800 p-4 rounded-3xl font-bold text-orange-500 mb-6">
                        <option value="mc12">Eaglercraft 1.12.2</option>
                        <option value="mc8">Eaglercraft 1.8.8</option>
                    </select>
                    <button onclick="play()" class="w-full py-5 bg-orange-500 text-black rounded-full font-black text-lg mb-8">BOOT GAME</button>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/blob/main/vanilla%2B2%20(tuff%20client%20compatible)%20(1)%20(1).zip', '_blank')" class="bg-white/10 p-4 rounded-2xl text-[10px] font-bold uppercase hover:bg-orange-500 hover:text-black transition-all">📦 PvP Textures</button>
                        <button onclick="window.open('https://modrinth.com/resourcepack/low-fire-txf/version/1.12', '_blank')" class="bg-white/10 p-4 rounded-2xl text-[10px] font-bold uppercase hover:bg-orange-500 hover:text-black transition-all">🔥 Low Fire pack</button>
                    </div>
                </div>
            </div>

            <div id="updates-view" class="view-pane flex-col items-center justify-center text-center">
                <div class="big-pumpkin text-6xl mb-4">✨</div>
                <h2 class="text-4xl font-black text-orange-500 mb-2 uppercase">Stay Tuned!</h2>
                <p class="text-zinc-500 mb-8">More updates are coming soon to Pumpkin OS.</p>
                <button onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')" class="px-10 py-4 border border-orange-500/50 rounded-full font-bold">Visit Website</button>
            </div>

            <div id="settings-view" class="view-pane">
                <h2 class="text-2xl font-black mb-10 uppercase">System Settings</h2>
                <div class="max-w-md space-y-4">
                    <div class="bg-white/5 p-6 rounded-[30px] flex justify-between items-center border border-white/5">
                        <span class="font-bold">Color Mode</span>
                        <button id="themeToggle" onclick="toggleTheme()" class="px-6 py-2 bg-orange-500 text-black rounded-full font-black text-xs uppercase">Toggle Light</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="app-overlay">
        <div class="bg-orange-600 p-2 flex justify-end"><button onclick="closeApp()" class="bg-black text-white px-6 py-1 rounded-full text-[10px] font-bold">CLOSE</button></div>
        <iframe id="app-frame" class="w-full h-full"></iframe>
    </div>

    <script>
        let currentInput = "", is2nd = false, db;

        // DB Setup
        const req = indexedDB.open("PUMPKIN_STORAGE_V82", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("core");
        req.onsuccess = e => { db = e.target.result; };

        // Calc Engine
        function ins(v) { currentInput += v; updateCalc(); }
        function updateCalc() { document.getElementById('calc-display').innerText = currentInput || "0"; }
        
        function handleOp(op) {
            if(op==='2nd') { is2nd = !is2nd; document.getElementById('btn-2nd').classList.toggle('ti-btn-2nd-active', is2nd); return; }
            if(is2nd && op==='DEL') { document.getElementById('admin-panel').style.display='flex'; reset2nd(); return; }
            if(is2nd && op==='EXE') { document.getElementById('cloak').style.display='none'; document.getElementById('orange-core').style.display='grid'; reset2nd(); return; }
            
            if(op==='DEL') { currentInput = ""; }
            else if(op==='EXE') {
                try { 
                    document.getElementById('calc-history').innerText = currentInput;
                    currentInput = eval(currentInput).toString(); 
                } catch { currentInput = "ERROR"; }
            }
            updateCalc();
        }

        function reset2nd() { is2nd = false; document.getElementById('btn-2nd').classList.remove('ti-btn-2nd-active'); }

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeToggle');
            if(html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                btn.innerText = "Toggle Dark";
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.innerText = "Toggle Light";
            }
        }

        function nav(v) {
            document.querySelectorAll('.view-pane').forEach(p => p.style.display = 'none');
            document.getElementById(v + '-view').style.display = 'flex';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
            event.currentTarget.classList.add('nav-active');
        }

        async function injectFiles() {
            const files = { mc12: document.getElementById('f12').files[0], mc8: document.getElementById('f8').files[0] };
            for (let [key, file] of Object.entries(files)) {
                if(!file) continue;
                const tx = db.transaction("core", "readwrite");
                tx.objectStore("core").put(new Blob([await file.arrayBuffer()], {type: 'text/html'}), key);
            }
            alert("Injected!");
        }

        function play() {
            const ver = document.getElementById('v-sel').value;
            db.transaction("core").objectStore("core").get(ver).onsuccess = e => {
                if(!e.target.result) return alert("Binary missing! Use 2nd+DEL.");
                document.getElementById('app-frame').src = URL.createObjectURL(e.target.result);
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }
    </script>
</body>
</html>
