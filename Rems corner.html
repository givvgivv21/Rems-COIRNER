<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V85.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #fb923c; --bg: #0c0a09; --card: rgba(255,255,255,0.03); --text: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: 0.3s; }

        /* BOUNCY ORANGE */
        .bouncy-orange { font-size: 140px; animation: bounce 2s ease-in-out infinite; filter: drop-shadow(0 0 25px rgba(251,146,60,0.5)); z-index: 10001; margin-bottom: 20px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.05); } }

        /* GIANT TACTILE CALCULATOR */
        .ti-body { background: #fb923c; width: 450px; height: 750px; border-radius: 50px 50px 100px 100px; padding: 40px; border: 6px solid #ea580c; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        .ti-btn { 
            height: 50px; background: #27272a; border-radius: 12px; display: flex; 
            align-items: center; justify-content: center; font-size: 14px; font-weight: 900; 
            box-shadow: 0 5px 0 #000; color: #fff; cursor: pointer;
            transition: all 0.05s ease; position: relative; top: 0;
        }
        .ti-btn:active { top: 4px; box-shadow: 0 1px 0 #000; filter: brightness(1.3); }
        .ti-btn-2nd-active { background: #facc15 !important; color: #000 !important; box-shadow: 0 5px 0 #a16207 !important; }

        #cloak { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lcd { background: #a3ad91; height: 140px; border: 5px solid #1a241a; border-radius: 15px; padding: 15px; color: #1a241a; font-family: 'Courier New', monospace; font-weight: bold; }

        #orange-core { display: none; height: 100vh; width: 100vw; grid-template-columns: 260px 1fr; padding: 25px; gap: 25px; position: relative; z-index: 100; }
        .sidebar { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 45px; padding: 40px 20px; display: flex; flex-direction: column; }
        .main-stage { background: var(--card); border-radius: 55px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative; }
        .view-pane { display: none; width: 100%; height: 100%; padding: 50px; overflow-y: auto; flex-direction: column; }
        
        .nav-link { padding: 16px 25px; border-radius: 50px; margin-bottom: 10px; font-size: 14px; font-weight: 700; color: #a1a1aa; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .nav-active { background: var(--p); color: #000 !important; }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') panic()">

    <canvas id="rain-canvas" class="fixed inset-0 pointer-events-none z-50 hidden"></canvas>

    <div id="cloak">
        <div class="bouncy-orange">🍊</div>
        <div class="ti-body">
            <div class="lcd">
                <div id="calc-history" class="text-xs opacity-60 h-5"></div>
                <div id="calc-display" class="text-5xl mt-2 text-right">0</div>
            </div>
            
            <div class="grid grid-cols-5 gap-3 mt-12">
                <div id="btn-2nd" class="ti-btn bg-zinc-500" onclick="handleOp('2nd')">2nd</div>
                <div class="ti-btn" onclick="handleOp('DEL')">del</div>
                <div class="ti-btn" onclick="ins('(')">(</div><div class="ti-btn" onclick="ins(')')">)</div><div class="ti-btn" onclick="ins('/')">/</div>
                
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('7')">7</div>
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('8')">8</div>
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('9')">9</div>
                <div class="ti-btn" onclick="ins('*')">×</div>
                <div class="ti-btn" onclick="ins('**')">^</div>
                
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('4')">4</div>
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('5')">5</div>
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('6')">6</div>
                <div class="ti-btn" onclick="ins('-')">-</div>
                <div class="ti-btn" onclick="ins('.')">.</div>
                
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('1')">1</div>
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('2')">2</div>
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('3')">3</div>
                <div class="ti-btn" onclick="ins('+')">+</div>
                <div class="ti-btn !bg-zinc-100 !text-black" onclick="ins('0')">0</div>
                
                <div class="ti-btn bg-orange-700 text-white col-span-5 !h-16 text-xl" onclick="handleOp('EXE')">ENTER</div>
            </div>
        </div>
        <input type="file" id="file-12" class="hidden" onchange="saveLocal('mc12', this)">
        <input type="file" id="file-8" class="hidden" onchange="saveLocal('mc8', this)">
    </div>

    <div id="orange-core">
        <aside class="sidebar">
            <h1 class="text-3xl font-black italic text-orange-400 mb-12 text-center tracking-tighter">ORANGE OS</h1>
            <nav class="flex-grow">
                <div class="nav-link nav-active" onclick="nav('launcher')"><span>🍊</span> Launcher</div>
                <div class="nav-link" onclick="openApp('https://www.google.com/search?q=orange')"><span>🌐</span> Browser</div>
                <div class="nav-link" onclick="nav('yt')"><span>📺</span> YouTube</div>
                <div class="nav-link" onclick="nav('settings')"><span>⚙️</span> Settings</div>
            </nav>
            <button onclick="panic()" class="w-full py-4 bg-red-600/10 text-red-500 rounded-full font-black text-[10px] border border-red-500/20 hover:bg-red-600 hover:text-white transition-all">PANIC</button>
        </aside>

        <main class="main-stage">
            <div id="launcher-view" class="view-pane items-center justify-center" style="display:flex;">
                <div class="w-full max-w-xl p-12 bg-white/5 rounded-[60px] border border-white/10 text-center">
                    <h2 class="text-3xl font-black mb-10 text-orange-400 italic uppercase">Game Engine</h2>
                    <select id="v-sel" class="w-full bg-zinc-900 p-5 rounded-3xl font-bold text-orange-400 mb-8 outline-none border border-white/10">
                        <option value="mc12">Eaglercraft 1.12.2 (Takai/Local)</option>
                        <option value="mc8">Eaglercraft 1.8.8 (Sandler/Local)</option>
                    </select>
                    <button onclick="playGame()" class="w-full py-6 bg-orange-500 text-black rounded-full font-black text-xl mb-4 shadow-2xl hover:scale-105 transition-transform">BOOT INSTANCE</button>
                    <p id="status-msg" class="text-[10px] uppercase font-bold text-zinc-500 italic">Ready to Launch</p>
                </div>
            </div>

            <div id="yt-view" class="view-pane items-center">
                <h2 class="text-3xl font-black text-orange-400 mb-6 italic uppercase">Cinema</h2>
                <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" class="w-full max-w-4xl aspect-video rounded-[40px] border border-white/10" allowfullscreen></iframe>
            </div>

            <div id="settings-view" class="view-pane">
                <h2 class="text-3xl font-black mb-10 uppercase italic">Settings</h2>
                <div class="max-w-md space-y-4">
                    <button onclick="clearStorage()" class="w-full p-6 bg-red-600/20 text-red-400 rounded-3xl font-bold border border-red-500/20">Wipe Local Game Files</button>
                    <div class="bg-white/5 p-6 rounded-[30px] flex justify-between items-center border border-white/5">
                        <span class="font-bold">Orange Rain</span>
                        <input type="checkbox" onchange="toggleRain(this.checked)" class="w-6 h-6 accent-orange-500">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="app-overlay">
        <div class="bg-orange-600 p-3 flex justify-between items-center px-8">
            <span class="text-xs font-black uppercase text-black">Live Instance Running</span>
            <button onclick="closeApp()" class="bg-black text-white px-8 py-2 rounded-full text-[10px] font-black uppercase">Kill Process</button>
        </div>
        <iframe id="app-frame" class="w-full h-full bg-white"></iframe>
    </div>

    <script>
        let currentInput = "", is2nd = false;

        function ins(v) { currentInput += v; updateCalc(); }
        function updateCalc() { document.getElementById('calc-display').innerText = currentInput || "0"; }
        
        function handleOp(op) {
            if(op==='2nd') { 
                is2nd = !is2nd; 
                document.getElementById('btn-2nd').classList.toggle('ti-btn-2nd-active', is2nd); 
                return; 
            }
            
            // LOGIC FOR 2nd + DEL (IMPORT FILES)
            if(is2nd && op === 'DEL') {
                alert("Import Mode: Choose 1.12.2 first, then 1.8.8");
                document.getElementById('file-12').click();
                setTimeout(() => document.getElementById('file-8').click(), 500);
                is2nd = false;
                document.getElementById('btn-2nd').classList.remove('ti-btn-2nd-active');
                return;
            }

            // LOGIC FOR 2nd + ENTER (BOOT OS)
            if(is2nd && op === 'EXE') { 
                document.getElementById('cloak').style.display='none'; 
                document.getElementById('orange-core').style.display='grid'; 
                return; 
            }

            if(op==='DEL') { currentInput = ""; }
            else if(op==='EXE') { try { currentInput = eval(currentInput).toString(); } catch { currentInput = "ERR"; } }
            updateCalc();
        }

        function saveLocal(version, input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('local_' + version, e.target.result);
                document.getElementById('status-msg').innerText = version + " SAVED LOCALLY";
            };
            reader.readAsDataURL(file);
        }

        function playGame() {
            const v = document.getElementById('v-sel').value;
            const localData = localStorage.getItem('local_' + v);
            
            if(localData) {
                openApp(localData);
                document.getElementById('status-msg').innerText = "Running from local storage...";
            } else {
                // Fallbacks
                if(v === 'mc12') openApp('https://takaiwebsite.neocities.org/minecraft');
                if(v === 'mc8') openApp('https://sandlersite.neocities.org/EaglercraftX_1.8_u29_Offline_Signed');
                document.getElementById('status-msg').innerText = "Running from cloud (No local file found)";
            }
        }

        function clearStorage() { localStorage.clear(); alert("Storage Wiped."); }
        function panic() { document.getElementById('orange-core').style.display='none'; document.getElementById('cloak').style.display='flex'; closeApp(); }
        function nav(v) { 
            document.querySelectorAll('.view-pane').forEach(p => p.style.display = 'none'); 
            document.getElementById(v + '-view').style.display = 'flex'; 
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
            if(event) event.currentTarget.classList.add('nav-active');
        }
        
        function openApp(url) {
            document.getElementById('app-frame').src = url;
            document.getElementById('app-overlay').style.display = 'flex';
        }

        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }

        // ORANGE RAIN
        const canv = document.getElementById('rain-canvas'), ct = canv.getContext('2d');
        let pk = [], active = false;
        function toggleRain(on) { 
            active = on; 
            canv.style.display = on ? 'block' : 'none'; 
            if(on) { 
                canv.width = window.innerWidth; 
                canv.height = window.innerHeight; 
                pk = Array.from({length:40},()=>({x:Math.random()*canv.width,y:Math.random()*-canv.height,s:3+Math.random()*5})); 
                loop(); 
            } 
        }
        function loop() { 
            if(!active) return; 
            ct.clearRect(0,0,canv.width,canv.height); 
            ct.font='30px serif'; 
            pk.forEach(p=>{
                ct.fillText('🍊',p.x,p.y); 
                p.y+=p.s; 
                if(p.y>canv.height)p.y=-40;
            }); 
            requestAnimationFrame(loop); 
        }
    </script>
</body>
</html>
