<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V28.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #ea580c; --ti-orange: #fb923c; --bg: #0c0a09; --sidebar: #1c1917; }
        .theme-lemon { --primary: #a3e635; --ti-orange: #d9f99d; }
        .theme-grape { --primary: #a855f7; --ti-orange: #ddd6fe; }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; transition: 0.5s; }

        /* TI-84 GUI */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #050505; display: flex; align-items: center; justify-content: center; }
        .ti-body { 
            background: #fb923c; width: 360px; height: 680px; 
            border-radius: 40px; padding: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 4px solid #c2712d; 
        }
        .lcd { 
            background: #fdfdfd; height: 160px; border-radius: 4px; padding: 10px; color: #111; 
            font-family: monospace; font-size: 1.4rem; text-align: right;
            display: flex; flex-direction: column; justify-content: flex-end; border: 2px solid #000;
        }

        .grid-ti { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .ti-btn { height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px #222; transition: 0.1s; user-select: none; }
        .ti-btn:active { transform: translateY(2px); box-shadow: 0 1px #222; }
        .btn-2nd { background: #2563eb; color: white; }
        .btn-mode { background: #4b5563; color: white; }
        .btn-func { background: #333; color: white; }
        .btn-num { background: #e5e7eb; color: #111; font-size: 1rem; }

        /* FRUIT RAIN */
        #fruit-rain { position: fixed; inset: 0; pointer-events: none; z-index: 100; display: none; }
        .falling-fruit { position: absolute; font-size: 2rem; animation: fall linear infinite; }
        @keyframes fall { from { transform: translateY(-10vh) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }

        /* OS LAYOUT */
        #orange-core { display: none; height: 100vh; width: 100vw; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 4px solid var(--primary); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { border: 2px solid var(--primary); padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: 900; display: flex; justify-content: space-between; }
        .nav-item:hover { background: var(--primary); color: #000; }
        
        .yt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        .yt-card { background: #111; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .yt-card:hover { border-color: var(--primary); transform: scale(1.05); }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="fruit-rain"></div>

    <div id="cloak">
        <div class="ti-body shadow-[0_0_30px_var(--primary)]">
            <div class="bg-[#1a1a1a] p-4 rounded-lg mb-4">
                <div id="lcd" class="lcd">
                    <div style="font-size: 0.5rem; color: #888; text-align: left;">TI-84 Plus CE</div>
                    <div id="calc-display">0</div>
                </div>
            </div>
            <div class="grid-ti">
                <div class="ti-btn btn-func">y=</div><div class="ti-btn btn-func">win</div><div class="ti-btn btn-func">zoom</div><div class="ti-btn btn-func">trace</div><div class="ti-btn btn-func">graph</div>
                <div class="ti-btn btn-2nd" onclick="op('2nd')">2nd</div><div class="ti-btn btn-mode" onclick="op('MODE')">mode</div><div class="ti-btn btn-func" onclick="op('DEL')">del</div><div class="ti-btn btn-func">stat</div><div class="ti-btn btn-func">prgm</div>
                <div class="ti-btn btn-num" onclick="ins('7')">7</div><div class="ti-btn btn-num" onclick="ins('8')">8</div><div class="ti-btn btn-num" onclick="ins('9')">9</div><div class="ti-btn btn-func">÷</div><div class="ti-btn btn-func">×</div>
                <div class="ti-btn btn-num" onclick="ins('4')">4</div><div class="ti-btn btn-num" onclick="ins('5')">5</div><div class="ti-btn btn-num" onclick="ins('6')">6</div><div class="ti-btn btn-func">-</div><div class="ti-btn btn-func">+</div>
                <div class="ti-btn btn-num" onclick="ins('1')">1</div><div class="ti-btn btn-num" onclick="ins('2')">2</div><div class="ti-btn btn-num" onclick="ins('3')">3</div><div class="col-span-2 ti-btn btn-func" style="background:black" onclick="op('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[3000] hidden items-center justify-center">
        <div class="bg-zinc-900 p-8 border-2 border-primary w-[400px]">
            <h2 class="text-primary font-black text-xl mb-4">DATA INJECTOR</h2>
            <input type="file" id="f12" class="w-full mb-4 text-xs text-white">
            <input type="file" id="f8" class="w-full mb-4 text-xs text-white">
            <div id="p-wrap" class="w-full h-2 bg-zinc-800 hidden mb-4"><div id="p-fill" class="h-full bg-primary w-0 transition-all"></div></div>
            <button onclick="injectFiles()" class="w-full bg-primary p-3 font-black text-black">COMMIT CORES</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-500 text-[10px] mt-4">CANCEL</button>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 id="os-logo" class="text-2xl font-black italic text-primary mb-6">ORANGE OS</h1>
            <div class="nav-item" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="showView('yt')"><span>VIDEO HUB</span><span>📺</span></div>
            <div class="nav-item" onclick="launch('https://storage.googleapis.com/fernisbest/index.html')"><span>BROWSER</span><span>🌐</span></div>
            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            <div class="mt-auto nav-item border-white text-white" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="main" class="flex-grow flex items-center justify-center">
            <div id="launcher-view" class="w-[850px] h-[550px] bg-zinc-800 border-4 border-black hidden flex-col shadow-2xl">
                <div class="flex-grow bg-[url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg')] bg-cover"></div>
                <div class="h-28 bg-black flex items-center justify-center gap-4 p-4">
                    <select id="v-sel" class="bg-zinc-900 p-2 text-white border border-primary font-bold"><option value="mc12">Eagler 1.12.2</option><option value="mc8">Eagler 1.8.8</option></select>
                    <button onclick="play()" class="bg-green-600 px-10 py-3 font-black hover:bg-green-500">PLAY</button>
                    <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" class="bg-zinc-700 px-4 py-3 text-[10px] font-black border border-zinc-500">USEFUL PACKS</button>
                    <div class="flex flex-col text-[10px] font-bold">
                        <div class="flex items-center gap-2"><span id="d12" class="w-2 h-2 rounded-full bg-red-600"></span> 1.12</div>
                        <div class="flex items-center gap-2"><span id="d8" class="w-2 h-2 rounded-full bg-red-600"></span> 1.8</div>
                    </div>
                </div>
            </div>

            <div id="yt-view" class="w-full h-full bg-black hidden overflow-y-auto p-6">
                <h2 class="font-black text-primary mb-6">VIDEO HUB</h2>
                <div class="yt-grid" id="yt-content"></div>
            </div>

            <div id="settings-view" class="bg-zinc-900 p-10 border-2 border-primary hidden w-[450px]">
                <h2 class="font-black text-xl text-primary mb-6">SYSTEM CONFIG</h2>
                <div class="space-y-6">
                    <div class="flex justify-between items-center"><span>Fruit Rain</span> <input type="checkbox" id="rain-toggle" onchange="toggleRain(this.checked)" class="w-6 h-6"></div>
                    <hr class="border-zinc-800">
                    <p class="text-[10px] font-bold text-zinc-500">COLOR SCHEMES</p>
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-orange-600 rounded-full cursor-pointer border-2 border-white" onclick="setTheme('orange')"></div>
                        <div class="w-12 h-12 bg-lime-500 rounded-full cursor-pointer border-2 border-white" onclick="setTheme('lemon')"></div>
                        <div class="w-12 h-12 bg-purple-600 rounded-full cursor-pointer border-2 border-white" onclick="setTheme('grape')"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="bg-primary p-2 flex justify-end"><button onclick="closeApp()" class="bg-black text-white px-4 font-black">EXIT</button></div>
        <iframe id="app-frame" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        let db;
        const req = indexedDB.open("OS_DATA", 2);
        req.onsuccess = e => { db = e.target.result; updateDots(); loadYT(); };

        function loadYT() {
            const vids = [
                {id:'dQw4w9WgXcQ', t:'Survival #1'}, {id:'XqZ_mE_Z97U', t:'Eaglercraft Pro'},
                {id:'70S8v7FvM_k', t:'2B2T Lore'}, {id:'p3G5UXn2YGo', t:'Minecraft 1.21'},
                {id:'f_pB_07983c', t:'Redstone Pro'}, {id:'9uY6_E_tPQU', t:'Minecraft Movie'},
                {id:'J---aiyznGQ', t:'Keyboard ASMR'}, {id:'8-X72v_SInE', t:'PVP Montage'}
            ];
            const container = document.getElementById('yt-content');
            vids.forEach(v => {
                let card = document.createElement('div'); card.className = 'yt-card';
                card.innerHTML = `<img src="https://img.youtube.com/vi/${v.id}/0.jpg" class="w-full"><p class="p-2 text-xs font-bold">${v.t}</p>`;
                card.onclick = () => launch(`https://www.youtube.com/embed/${v.id}`);
                container.appendChild(card);
            });
        }

        async function injectFiles() {
            const files = { mc12: document.getElementById('f12').files[0], mc8: document.getElementById('f8').files[0] };
            document.getElementById('p-wrap').style.display = 'block';
            for (let [k, f] of Object.entries(files)) {
                if(!f) continue;
                const blob = new Blob([await f.arrayBuffer()], {type: 'text/html'});
                const tx = db.transaction("core", "readwrite");
                tx.objectStore("core").put(blob, k);
                await new Promise(r => tx.oncomplete = r);
            }
            updateDots();
            alert("CORES UPDATED");
        }

        function play() {
            const ver = document.getElementById('v-sel').value;
            db.transaction("core").objectStore("core").get(ver).onsuccess = e => {
                if(!e.target.result) return alert("Core missing!");
                document.getElementById('app-frame').src = URL.createObjectURL(e.target.result);
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        function updateDots() {
            const tx = db.transaction("core").objectStore("core");
            tx.get("mc12").onsuccess = e => document.getElementById('d12').style.background = e.target.result ? '#4f4' : '#f44';
            tx.get("mc8").onsuccess = e => document.getElementById('d8').style.background = e.target.result ? '#4f4' : '#f44';
        }

        let inputStr = "0", is2nd = false, fruitIcon = '🍊';
        function op(k) {
            if(k==='2nd') { is2nd = !is2nd; document.getElementById('lcd').style.background = is2nd ? '#d1ffd1' : '#fdfdfd'; return; }
            // COMBO: 2nd + DEL = Injector
            if(is2nd && k==='DEL') { document.getElementById('admin-panel').style.display = 'flex'; is2nd = false; return; }
            // COMBO: 2nd + MODE = Open OS
            if(is2nd && k==='MODE') { document.getElementById('cloak').style.display='none'; document.getElementById('orange-core').style.display='flex'; return; }
            if(k==='DEL') inputStr = "0";
            document.getElementById('calc-display').innerText = inputStr;
        }
        function ins(v) { inputStr = (inputStr === "0") ? v : inputStr + v; document.getElementById('calc-display').innerText = inputStr; }
        
        function setTheme(t) {
            document.body.className = (t === 'orange') ? '' : 'theme-' + t;
            const logo = document.getElementById('os-logo');
            logo.innerText = t.toUpperCase() + ' OS';
            fruitIcon = (t === 'lemon') ? '🍋' : (t === 'grape') ? '🍇' : '🍊';
            if(document.getElementById('rain-toggle').checked) toggleRain(true);
        }

        function toggleRain(on) {
            const rain = document.getElementById('fruit-rain');
            rain.innerHTML = ''; rain.style.display = on ? 'block' : 'none';
            if(on) {
                for(let i=0; i<30; i++) {
                    let f = document.createElement('div'); f.className='falling-fruit'; f.innerText=fruitIcon;
                    f.style.left=Math.random()*100+'vw'; f.style.animationDuration=(Math.random()*3+2)+'s';
                    rain.appendChild(f);
                }
            }
        }

        function showView(v) { ['launcher-view', 'yt-view', 'settings-view'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(v+'-view').classList.remove('hidden'); }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }
    </script>
</body>
</html>
