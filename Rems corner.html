<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator | TI-84 Plus CE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --orange-mid: #ea580c; --orange-bright: #fb923c; 
            --bg: #0c0a09; --sidebar: #1c1917; --text: #ffffff;
            --ti-grey: #2d2d2d; --ti-dark: #1a1a1a;
        }

        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif; color: var(--text); }

        /* ANIMATIONS */
        @keyframes gui-pop {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-gui { animation: gui-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* TI-84 PLUS CE BODY SHAPE */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        
        .ti-body {
            width: 340px; background: var(--ti-grey); padding: 35px 20px;
            border-radius: 15px 15px 50px 50px; border: 3px solid #444;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.1);
            position: relative;
        }
        .ti-logo { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); color: #888; font-size: 10px; font-weight: bold; letter-spacing: 1px; }

        /* SCREEN */
        .ti-screen-bezel { background: #111; padding: 8px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #555; }
        .ti-screen { 
            background: #99ad99; height: 160px; border-radius: 2px; padding: 10px;
            font-family: monospace; color: #111; font-size: 1.2rem; text-align: right;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2); transition: 0.3s;
        }

        /* BUTTONS */
        .button-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .ti-btn {
            background: var(--ti-dark); height: 32px; border-radius: 4px;
            color: white; font-size: 9px; font-weight: bold; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            border-bottom: 3px solid #000; transition: 0.1s;
        }
        .ti-btn:active { transform: translateY(2px); border-bottom-width: 1px; }
        
        .btn-blue { background: #2563eb; } /* 2nd Button */
        .btn-green { background: #15803d; } /* Alpha Button */
        .btn-func { background: #444; height: 24px; font-size: 8px; margin-bottom: 5px; } /* Top row buttons */
        .btn-num { background: #333; height: 38px; font-size: 14px; }
        .btn-exe { background: #ea580c; border-bottom: 3px solid #7c2d12; }

        /* ORANGE OS */
        #orange-core { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 1000; }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 2px solid var(--orange-mid); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { 
            border: 2px solid var(--orange-mid); padding: 12px; margin-bottom: 10px; cursor: pointer; 
            font-weight: 900; color: var(--orange-bright); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            transition: 0.2s;
        }
        .nav-item:hover { transform: scale(1.03); background: var(--orange-mid); color: white; }
    </style>
</head>
<body onkeydown="handleKeys(event)">

    <div id="cloak">
        <div class="ti-body animate-gui">
            <div class="ti-logo">TI-84 Plus CE</div>
            <div class="ti-screen-bezel">
                <div id="lcd" class="ti-screen">0</div>
            </div>

            <div class="button-grid mb-4">
                <div class="ti-btn btn-func">y=</div>
                <div class="ti-btn btn-func">window</div>
                <div class="ti-btn btn-func">zoom</div>
                <div class="ti-btn btn-func">trace</div>
                <div class="ti-btn btn-func">graph</div>
            </div>

            <div class="button-grid">
                <div class="ti-btn btn-blue" onclick="op('2nd')">2nd</div>
                <div class="ti-btn">mode</div>
                <div class="ti-btn">del</div>
                <div class="ti-btn" onclick="ins('/')">/</div>
                <div class="ti-btn" onclick="ins('*')">X</div>

                <div class="ti-btn btn-green">alpha</div>
                <div class="ti-btn" onclick="ins('7')">7</div>
                <div class="ti-btn" onclick="ins('8')">8</div>
                <div class="ti-btn" onclick="ins('9')">9</div>
                <div class="ti-btn" onclick="ins('-')">-</div>

                <div class="ti-btn">x²</div>
                <div class="ti-btn" onclick="ins('4')">4</div>
                <div class="ti-btn" onclick="ins('5')">5</div>
                <div class="ti-btn" onclick="ins('6')">6</div>
                <div class="ti-btn" onclick="ins('+')">+</div>

                <div class="ti-btn">log</div>
                <div class="ti-btn" onclick="ins('1')">1</div>
                <div class="ti-btn" onclick="ins('2')">2</div>
                <div class="ti-btn" onclick="ins('3')">3</div>
                <div class="ti-btn btn-exe" onclick="op('EXE')">ENTER</div>

                <div class="ti-btn">ln</div>
                <div class="ti-btn" onclick="ins('0')">0</div>
                <div class="ti-btn">.</div>
                <div class="ti-btn">(-)</div>
                <div class="ti-btn">ans</div>
            </div>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-6 uppercase">Orange OS</h1>
            <div class="nav-item"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item"><span>BROWSER</span><span>🌐</span></div>
            
            <div class="nav-item flex flex-col items-start gap-2 h-auto cursor-default">
                <span class="text-[10px] text-zinc-400 font-normal">Stay tuned for more bypasses</span>
                <button onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER/tree/main', '_blank')" 
                        class="bg-orange-600 text-white text-[10px] px-3 py-1 rounded hover:bg-orange-500 transition w-full">
                    GO TO WEBSITE
                </button>
            </div>

            <div class="nav-item text-white border-white mt-auto" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>
    </div>

    <script>
        let inputStr = "0", is2nd = false;

        function op(k) {
            const lcd = document.getElementById('lcd');
            if(k === '2nd') { 
                is2nd = !is2nd; 
                lcd.style.background = is2nd ? '#d1ffd1' : '#99ad99'; 
                return; 
            }
            if(is2nd && k === 'EXE') {
                document.getElementById('cloak').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('cloak').style.display = 'none';
                    document.getElementById('orange-core').style.display = 'flex';
                }, 500);
                return;
            }
            if(k === 'EXE') {
                try { inputStr = String(eval(inputStr.replace(/X/g, '*'))); } catch { inputStr = "ERR"; }
            }
            lcd.innerText = inputStr;
        }

        function ins(v) {
            inputStr = (inputStr === "0") ? v : inputStr + v;
            document.getElementById('lcd').innerText = inputStr;
        }

        function handleKeys(e) {
            if(e.key === 'Escape') location.reload();
            // Shortcut for convenience: Shift + Enter
            if(e.shiftKey && e.key === 'Enter') op('EXE');
        }
    </script>
</body>
</html>
