<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator | TI-84 Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --orange: #ea580c; --bg: #0c0a09; --sidebar: #1c1917; --text: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); font-family: sans-serif; overflow: hidden; color: var(--text); }

        /* CALC CLOAK */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }
        .calc { background: #1e1e1e; width: 340px; padding: 25px; border-radius: 20px; border: 4px solid #333; }
        .lcd { background: #99ad99; border: 4px solid #555; height: 70px; margin-bottom: 15px; padding: 15px; color: #111; font-size: 1.8rem; text-align: right; font-family: monospace; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn { background: #2a2a2a; border-bottom: 4px solid #000; padding: 12px 0; text-align: center; cursor: pointer; color: #bbb; font-weight: bold; border-radius: 8px; }

        /* OS UI */
        #orange-core { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 1000; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 2px solid var(--orange); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { border: 2px solid var(--orange); padding: 10px; margin-bottom: 8px; cursor: pointer; font-weight: 900; color: #fb923c; text-align: center; }

        .mojang-window { width: 800px; height: 500px; background: #212121; border: 2px solid #000; display: flex; flex-direction: column; }
        .mojang-body { flex-grow: 1; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; }
        .mojang-play-bar { height: 80px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; padding: 0 20px; gap: 10px; }
        .play-btn { background: #3c8527; width: 160px; height: 40px; color: white; font-weight: 900; cursor: pointer; border: 2px solid #000; box-shadow: inset 2px 2px #5dbb3d, inset -2px -2px #1a3911; }

        /* ADMIN PANEL */
        #admin-panel { display:none; position:fixed; inset:0; z-index: 200000; background:rgba(0,0,0,0.98); align-items:center; justify-content:center; }
        .admin-box { width: 450px; padding: 40px; background: #000; border: 3px solid var(--orange); border-radius: 12px; box-shadow: 0 0 50px rgba(234, 88, 12, 0.3); }
        
        .wipe-btn { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; padding: 10px; width: 100%; font-weight: 900; margin-top: 20px; cursor: pointer; transition: 0.2s; }
        .wipe-btn:hover { background: #dc2626; color: white; }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 150000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="cloak">
        <div class="calc">
            <div id="lcd" class="lcd">0</div>
            <div class="grid">
                <div class="btn" onclick="op('2nd')">2nd</div><div class="btn" onclick="op('DEL')">DEL</div>
                <div class="btn" onclick="ins('/')">/</div><div class="btn" onclick="ins('*')">X</div>
                <div class="btn" onclick="ins('7')">7</div><div class="btn" onclick="ins('8')">8</div><div class="btn" onclick="ins('9')">9</div><div class="btn" onclick="ins('-')">-</div>
                <div class="btn" onclick="ins('4')">4</div><div class="btn" onclick="ins('5')">5</div><div class="btn" onclick="ins('6')">6</div><div class="btn" onclick="ins('+')">+</div>
                <div class="btn" onclick="ins('1')">1</div><div class="btn" onclick="ins('2')">2</div><div class="btn" onclick="ins('3')">3</div>
                <div class="btn bg-orange-600 text-white" onclick="op('EXE')">EXE</div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-box">
            <h2 class="text-orange-500 font-black mb-2 uppercase text-center text-xl italic">System Recovery</h2>
            <p class="text-[10px] text-zinc-500 text-center mb-6">IF GAME SHOWS CODE, USE THE WIPE BUTTON BELOW FIRST.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-orange-400 font-bold uppercase block mb-1">Upload 1.12.2 (Chunks Enabled)</label>
                    <input type="file" id="file12" class="w-full text-xs bg-zinc-900 p-2 border border-zinc-700">
                </div>
                <button id="commit-btn" onclick="injectChunked()" class="w-full bg-orange-600 py-3 font-black text-white hover:bg-orange-500 transition-colors">INJECT SELECTED CORE</button>
                
                <hr class="border-zinc-800 my-4">
                
                <button onclick="wipeDB()" class="wipe-btn uppercase">⚠️ Wipe Storage & Reset Engine ⚠️</button>
                
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-[10px] text-zinc-600 mt-4 uppercase font-bold tracking-widest">Exit Interface</button>
            </div>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-6">ORANGE OS</h1>
            <div class="nav-item" onclick="showView('launcher')">LAUNCHER ⛏️</div>
            <div class="nav-item" onclick="launch('https://google.com')">BROWSER 🌐</div>
            <div class="nav-item mt-auto border-white text-white" onclick="location.reload()">PURGE [ESC]</div>
        </div>
        <div id="content-area" class="flex-grow flex items-center justify-center">
            <div id="launcher-view" class="mojang-window hidden">
                <div class="mojang-body"></div>
                <div class="mojang-play-bar">
                    <select id="ver-select" class="bg-zinc-800 p-2 text-white border border-zinc-600 font-bold outline-none">
                        <option value="mc12">Eaglercraft 1.12.2</option>
                        <option value="mc8">Eaglercraft 1.8.8</option>
                    </select>
                    <button onclick="playChunked()" class="play-btn ml-4">PLAY GAME</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="p-2 bg-zinc-900 flex justify-end border-b border-zinc-800">
            <button onclick="closeApp()" class="bg-red-600 px-6 py-1 font-bold text-xs hover:bg-red-500">EXIT APP</button>
        </div>
        <iframe id="app-frame" class="w-full h-full bg-black"></iframe>
    </div>

    <script>
        let db;
        // Use a persistent DB name for stability
        const dbReq = indexedDB.open("OrangeOS_FinalEngine", 1);
        dbReq.onupgradeneeded = (e) => { 
            db = e.target.result; 
            if(!db.objectStoreNames.contains("chunks")) db.createObjectStore("chunks"); 
        };
        dbReq.onsuccess = (e) => { db = e.target.result; };

        // NEW CHUNK INJECTION (Fixes the code/letter glitch)
        async function injectChunked() {
            const btn = document.getElementById('commit-btn');
            const file = document.getElementById('file12').files[0];
            if(!file) return alert("Please select the 1.12.2 file!");

            btn.innerText = "CHUNKING DATA...";
            btn.disabled = true;

            const CHUNK_SIZE = 1024 * 1024; // 1MB chunks
            const text = await file.text();
            const totalChunks = Math.ceil(text.length / CHUNK_SIZE);
            
            const tx = db.transaction(["chunks"], "readwrite");
            const store = tx.objectStore("chunks");
            
            store.put(totalChunks, "mc12_count");

            for(let i=0; i<totalChunks; i++) {
                const chunk = text.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
                store.put(chunk, `mc12_${i}`);
            }

            tx.oncomplete = () => { 
                btn.innerText = "INJECTION SUCCESS!"; 
                btn.disabled = false;
                setTimeout(()=>btn.innerText="INJECT SELECTED CORE", 2000); 
            };
        }

        // REASSEMBLY ENGINE
        async function playChunked() {
            const tx = db.transaction(["chunks"], "readonly");
            const store = tx.objectStore("chunks");

            store.get("mc12_count").onsuccess = async (e) => {
                const count = e.target.result;
                if(!count) return alert("Core 1.12.2 not found! Please Inject in Admin Panel.");

                let fullText = "";
                for(let i=0; i<count; i++) {
                    const chunkReq = await new Promise(r => {
                        const req = store.get(`mc12_${i}`);
                        req.onsuccess = ev => r(ev.target.result);
                    });
                    fullText += chunkReq;
                }

                // Force browser to treat as HTML/UTF-8
                const blob = new Blob([fullText], {type: 'text/html;charset=utf-8'});
                const url = URL.createObjectURL(blob);
                document.getElementById('app-frame').src = url;
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        // THE WIPE BUTTON FUNCTION
        function wipeDB() {
            if(confirm("THIS WILL ERASE ALL STORED GAMES. Are you sure? Use this if you see black text/code when playing.")){
                const tx = db.transaction(["chunks"], "readwrite");
                tx.objectStore("chunks").clear();
                tx.oncomplete = () => {
                    alert("System Cleared. Please re-inject your 1.12.2 file now.");
                };
            }
        }

        // CALCULATOR & NAVIGATION
        function op(k) {
            let lcd = document.getElementById('lcd');
            if(k === '2nd') { window.is2nd = !window.is2nd; lcd.style.background = window.is2nd ? '#d1ffd1' : '#99ad99'; return; }
            if(window.is2nd && k === 'DEL') {
                if(prompt("ADMIN KEY:") === "remmy21") document.getElementById('admin-panel').style.display = 'flex';
                window.is2nd = false; return;
            }
            if(window.is2nd && k === 'EXE') { document.getElementById('cloak').style.display='none'; document.getElementById('orange-core').style.display='flex'; return; }
            if(k === 'DEL') lcd.innerText = lcd.innerText.length > 1 ? lcd.innerText.slice(0, -1) : "0";
            if(k === 'EXE') try { lcd.innerText = eval(lcd.innerText.replace(/X/g, '*')); } catch { lcd.innerText = "ERR"; }
        }
        function ins(v) { let lcd = document.getElementById('lcd'); lcd.innerText = (lcd.innerText === "0") ? v : lcd.innerText + v; }
        function showView(v) { document.getElementById('launcher-view').classList.remove('hidden'); }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src='about:blank'; }
        function launch(u) { document.getElementById('app-frame').src=u; document.getElementById('app-overlay').style.display='flex'; }
    </script>
</body>
</html>
