<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V65.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #fb923c; --bg: #050505; --txt: #ffffff; --card: #111; }
        .light-mode { --bg: #e5e7eb; --txt: #000000; --card: #ffffff; }
        
        /* FRUIT ACCENTS */
        .orange-theme { --p: #fb923c; }
        .apple-theme { --p: #ef4444; }
        .grape-theme { --p: #a855f7; }
        .lime-theme { --p: #84cc16; }

        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--txt); overflow: hidden; height: 100vh; }
        
        /* --- TI-84 HARDWARE --- */
        #boot-gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .ti-chassis { 
            background: #333; width: 340px; height: 580px;
            border-radius: 35px 35px 110px 110px; border: 6px solid #111; 
            padding: 20px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; 
        }
        .ti-lcd { background: #94a392; height: 100px; border: 8px solid #111; border-radius: 4px; font-family: monospace; color: #1a241a; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; }
        .key-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .k { height: 32px; background: #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 900; cursor: pointer; color: #fff; box-shadow: 0 4px 0 #1a1a1a; }
        .k:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        .k-2nd { background: #2563eb !important; box-shadow: 0 4px 0 #1e3a8a !important; }
        .k-num { background: #e5e7eb !important; color: #000 !important; font-size: 0.9rem; box-shadow: 0 4px 0 #9ca3af !important; }

        /* --- SQUARED GUI --- */
        #orange-desktop { display: none; height: 100vh; width: 100vw; grid-template-columns: 280px 1fr; background: var(--bg); }
        .sidebar { background: var(--card); border-right: 2px solid var(--p); padding: 30px 15px; display: flex; flex-direction: column; gap: 8px; }
        .nav-link { padding: 12px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: 800; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; }
        .nav-active { background: var(--p); color: #fff !important; box-shadow: 0 4px 15px var(--p); }

        /* --- CONTENT --- */
        .view-pane { width: 95%; height: 95%; margin: auto; display: none; background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; position: relative; }
        #os-frame { width: 100%; height: 100%; border: none; display: none; }
        
        .mc-footer { height: 100px; background: #000; display: flex; align-items: center; padding: 0 30px; gap: 20px; border-top: 3px solid var(--p); }
        .play-btn { background: #22c55e; color: #fff; padding: 12px 40px; font-size: 1.2rem; font-weight: 900; border-radius: 4px; }

        /* INJECTOR */
        #inj-modal { position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; }
        .inj-box { background: #000; padding: 40px; border: 2px solid var(--p); width: 400px; border-radius: 20px; }
        .prog-bar { height: 10px; background: #111; border-radius: 10px; overflow: hidden; margin: 20px 0; border: 1px solid #333; }
        #prog-fill { height: 100%; background: var(--p); width: 0%; transition: width 0.1s; }
    </style>
</head>
<body class="orange-theme" onkeydown="if(event.key==='Escape') panic()">

    <div id="boot-gate">
        <div class="ti-chassis">
            <div class="ti-lcd">
                <div id="ti-stat" style="font-size: 0.5rem; opacity: 0.5;">RAM CLEAR</div>
                <div id="ti-display" class="text-3xl text-right mt-4">0</div>
            </div>
            <div class="key-grid">
                <div class="k k-2nd" onclick="cAct('2nd')">2nd</div><div class="k">mode</div><div class="k" onclick="cAct('del')">del</div><div class="k">stat</div><div class="k">prgm</div>
                <div class="k k-num" onclick="cNum('7')">7</div><div class="k k-num" onclick="cNum('8')">8</div><div class="k k-num" onclick="cNum('9')">9</div><div class="k" onclick="cNum('/')">÷</div><div class="k">sin</div>
                <div class="k k-num" onclick="cNum('4')">4</div><div class="k k-num" onclick="cNum('5')">5</div><div class="k k-num" onclick="cNum('6')">6</div><div class="k" onclick="cNum('*')">×</div><div class="k">cos</div>
                <div class="k k-num" onclick="cNum('1')">1</div><div class="k k-num" onclick="cNum('2')">2</div><div class="k k-num" onclick="cNum('3')">3</div><div class="k" onclick="cNum('-')">-</div><div class="k">tan</div>
                <div class="k k-num" onclick="cNum('0')">0</div><div class="k">.</div><div class="k">(-)</div><div class="k" onclick="cNum('+')">+</div><div class="k bg-black text-white" onclick="cAct('ent')">enter</div>
            </div>
        </div>
    </div>

    <div id="orange-desktop">
        <aside class="sidebar">
            <h1 class="text-2xl font-black text-orange-500 mb-6">ORANGE OS</h1>
            <div class="nav-link nav-active" onclick="nav('launcher')">🎮 LAUNCHER</div>
            <div class="nav-link" onclick="nav('youtube')">🎬 YOUTUBE</div>
            <div class="nav-link" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')">🌐 BROWSER</div>
            <div class="nav-link" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')">🔥 FIND MORE</div>
            <div class="nav-link" onclick="nav('settings')">⚙️ SETTINGS</div>
            
            <div class="mt-auto space-y-2">
                <button onclick="toggleMode()" class="w-full p-2 bg-zinc-800 rounded text-[10px] font-black uppercase">🌓 Light/Dark</button>
                <button onclick="toggleFruit()" class="w-full p-2 bg-zinc-800 rounded text-[10px] font-black uppercase">🍎 Fruit Theme</button>
            </div>
            <button onclick="panic()" class="mt-4 bg-red-900 p-4 rounded-lg font-black text-white text-xs">PANIC</button>
        </aside>

        <main class="flex items-center justify-center p-4">
            <iframe id="os-frame" class="view-pane"></iframe>

            <div id="v-launcher" class="view-pane flex-col" style="display: flex;">
                <div class="flex-grow bg-zinc-900 flex flex-col items-center justify-center relative overflow-hidden">
                    <img src="https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg" class="absolute inset-0 w-full h-full object-cover opacity-40">
                    <h2 class="relative text-5xl font-black italic">Minecraft</h2>
                    <p id="k-status" class="relative text-[10px] font-bold text-red-500 mt-2 uppercase tracking-widest">Kernel Offline</p>
                </div>
                <div class="mc-footer">
                    <select id="v-sel" class="bg-zinc-800 p-3 rounded font-bold text-orange-400 outline-none">
                        <option value="18">1.8.8</option>
                        <option value="112">1.12.2</option>
                    </select>
                    <button onclick="bootMC()" class="play-btn">PLAY</button>
                </div>
            </div>

            <div id="v-youtube" class="view-pane p-8">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="yt-url" class="bg-zinc-800 flex-grow p-4 rounded-lg outline-none font-bold text-white" placeholder="YT Video ID or Link">
                    <button onclick="loadYT()" class="bg-orange-600 px-6 rounded-lg font-black">LOAD</button>
                </div>
                <div class="flex gap-2 mb-4">
                    <button id="yt-mode-btn" onclick="toggleYTMode()" class="text-[10px] font-bold text-zinc-500 uppercase">Mode: Nocookie</button>
                </div>
                <div id="yt-area" class="w-full aspect-video bg-black rounded-lg border-2 border-zinc-800 overflow-hidden"></div>
            </div>

            <div id="v-settings" class="view-pane p-10">
                <button onclick="wipe()" class="bg-red-600 p-6 rounded-xl font-black w-full">WIPE ALL DATA</button>
            </div>
        </main>
    </div>

    <div id="inj-modal">
        <div class="inj-box">
            <h2 class="font-black text-orange-500 mb-4">INJECTOR</h2>
            <input type="file" id="f1" class="text-xs mb-4 block w-full">
            <input type="file" id="f2" class="text-xs mb-4 block w-full">
            <div class="prog-bar"><div id="prog-fill"></div></div>
            <button onclick="runInject()" class="w-full bg-orange-600 p-4 rounded font-black">INJECT FILES</button>
        </div>
    </div>

    <script>
        let db, expr = "", is2nd = false, fruits = ['orange','apple','grape','lime'], fIdx = 0, ytMode = 'nocookie';

        const req = indexedDB.open("ORANGE_V65", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("blobs");
        req.onsuccess = e => { db = e.target.result; check(); };

        function check() {
            db.transaction("blobs").objectStore("blobs").count().onsuccess = e => {
                const s = document.getElementById('k-status');
                s.innerText = e.target.result > 0 ? "KERNEL READY ("+e.target.result+")" : "KERNEL OFFLINE";
                s.style.color = e.target.result > 0 ? "#22c55e" : "#ef4444";
            }
        }

        function cNum(v) { expr += v; document.getElementById('ti-display').innerText = expr; }
        function cAct(a) {
            if(a==='2nd') { is2nd = !is2nd; document.getElementById('ti-stat').innerText = is2nd ? "2nd ACTIVE" : "RAM CLEAR"; return; }
            if(is2nd && a==='ent') { document.getElementById('boot-gate').style.display='none'; document.getElementById('orange-desktop').style.display='grid'; return; }
            if(is2nd && a==='del') { document.getElementById('inj-modal').style.display='flex'; return; }
            if(a==='ent') { try { let r = eval(expr); document.getElementById('ti-display').innerText = r; expr = r.toString(); } catch { expr = ""; } }
            if(a==='del') { expr = ""; document.getElementById('ti-display').innerText = "0"; }
        }

        function toggleMode() { document.body.classList.toggle('light-mode'); }
        function toggleFruit() {
            document.body.classList.remove(fruits[fIdx]+'-theme');
            fIdx = (fIdx + 1) % fruits.length;
            document.body.classList.add(fruits[fIdx]+'-theme');
        }

        function toggleYTMode() {
            ytMode = ytMode === 'nocookie' ? 'standard' : 'nocookie';
            document.getElementById('yt-mode-btn').innerText = "Mode: " + ytMode;
        }

        function loadYT() {
            let val = document.getElementById('yt-url').value;
            let id = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.split('/').pop();
            let domain = ytMode === 'nocookie' ? 'youtube-nocookie.com' : 'youtube.com';
            document.getElementById('yt-area').innerHTML = `<iframe width="100%" height="100%" src="https://www.${domain}/embed/${id}" frameborder="0" allow="autoplay; encrypted-media" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
        }

        async function runInject() {
            const files = [document.getElementById('f1').files[0], document.getElementById('f2').files[0]];
            const fill = document.getElementById('prog-fill');
            const keys = ["18", "112"];
            
            fill.style.width = "20%";
            const tx = db.transaction("blobs", "readwrite");
            const store = tx.objectStore("blobs");

            for(let i=0; i<files.length; i++) {
                if(files[i]) {
                    const req = store.put(new Blob([await files[i].arrayBuffer()], {type:'text/html'}), keys[i]);
                    req.onsuccess = () => { 
                        fill.style.width = (50 * (i+1)) + "%";
                        if(i === files.length - 1 || !files[i+1]) {
                            setTimeout(() => {
                                alert("INJECTION FINISHED");
                                document.getElementById('inj-modal').style.display = 'none';
                                check();
                            }, 200);
                        }
                    };
                }
            }
        }

        function bootMC() {
            const v = document.getElementById('v-sel').value;
            db.transaction("blobs").objectStore("blobs").get(v).onsuccess = e => {
                if(e.target.result) {
                    const f = document.getElementById('os-frame');
                    f.src = URL.createObjectURL(e.target.result);
                    f.style.display = 'block';
                    ['v-launcher','v-youtube','v-settings'].forEach(id => document.getElementById(id).style.display='none');
                } else alert("Inject " + v + " first.");
            }
        }

        function nav(t) {
            ['v-launcher','v-youtube','v-settings','os-frame'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('v-'+t).style.display = (t==='launcher'?'flex':'block');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
            event.currentTarget.classList.add('nav-active');
        }

        function panic() {
            document.getElementById('orange-desktop').style.display = 'none';
            document.getElementById('boot-gate').style.display = 'flex';
            document.getElementById('os-frame').src = "";
            document.getElementById('yt-area').innerHTML = "";
        }

        function wipe() { if(confirm("Reset?")) { db.transaction("blobs","readwrite").objectStore("blobs").clear(); location.reload(); }}
    </script>
</body>
</html>
