<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator | TI-84 Plus CE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://mn.testnav.com/client/texasinstruments/js/ELG-min.js"></script>
    
    <style>
        :root { 
            --orange-mid: #ea580c; --orange-bright: #fb923c; 
            --bg: #0c0a09; --sidebar: #1c1917; --text: #ffffff;
        }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); overflow: hidden; color: var(--text); font-family: 'Segoe UI', sans-serif; }

        /* CLOAKING LAYER */
        #cloak { 
            position: fixed; inset: 0; z-index: 100000; background: #ffffff; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        
        #calculatorDiv { 
            transform-origin: center; 
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        /* ORANGE OS GUI */
        #orange-core { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 1000; opacity: 0; transition: 0.5s; }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 2px solid var(--orange-mid); padding: 20px; display: flex; flex-direction: column; }
        
        .nav-item { 
            border: 2px solid var(--orange-mid); padding: 12px; margin-bottom: 10px; 
            cursor: pointer; font-weight: 900; color: var(--orange-bright); 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .nav-item:hover { transform: scale(1.02); background: var(--orange-mid); color: white; }

        /* ANIMATIONS */
        .gui-appear { animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 150000; flex-direction: column; }
    </style>
</head>
<body onkeydown="handleGlobalKeys(event)">

    <div id="cloak">
        <div id="calculatorDiv" class="gui-appear"></div>
        <script id="h84statej" type="application/json" data-url="https://mn.testnav.com/client/texasinstruments/bin/No_AppsCE.h84statej"></script>
        <script id="ti84faceplate" type="application/json" data-url="https://mn.testnav.com/client/texasinstruments/images/TI84CE_touch.svg"></script>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-6 uppercase">Orange OS</h1>
            <div class="nav-item" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="launch('https://youtube.com')"><span>YOUTUBE</span><span>📺</span></div>
            
            <div class="nav-item flex flex-col items-start gap-2 h-auto cursor-default">
                <span class="text-[10px] text-zinc-400 font-normal">Stay tuned for more bypasses</span>
                <button onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER/tree/main', '_blank')" 
                        class="bg-orange-600 text-white text-[10px] px-3 py-1 rounded hover:bg-orange-500 transition w-full">
                    GO TO WEBSITE
                </button>
            </div>

            <div class="nav-item text-white border-white mt-auto" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="content-area" class="flex-grow flex items-center justify-center p-10">
            <div id="launcher-view" class="hidden w-full max-w-4xl bg-zinc-900 p-8 rounded-xl border border-orange-500 animate-gui">
                <h2 class="text-2xl font-bold mb-4">Minecraft Launcher</h2>
                <button onclick="playSelected()" class="bg-green-600 px-6 py-3 font-bold rounded">PLAY EAGLERCRAFT</button>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="p-2 bg-zinc-900 flex justify-end"><button onclick="closeApp()" class="bg-red-600 px-4 py-1 font-bold text-xs">EXIT</button></div>
        <iframe id="app-frame" class="w-full h-full bg-black"></iframe>
    </div>

    <script>
        // 1. INITIALIZE TI-84 EMULATOR
        function initEmulator() {
            const h84 = document.getElementById("h84statej");
            const face = document.getElementById("ti84faceplate");
            
            // Proxy logic from your provided code to handle URL cleaning
            XMLHttpRequest.prototype.open = new Proxy(XMLHttpRequest.prototype.open, {
                apply: function (target, thisArg, args) {
                    if (typeof args[1] === "string") args[1] = args[1].replace(/#.*$/, "");
                    Reflect.apply(target, thisArg, args);
                },
            });

            new TI84PCE({
                ROMLocation: h84.getAttribute("data-url") + "#.h84statej",
                FaceplateLocation: face.getAttribute("data-url") + "#.svg"
            });
        }

        // 2. SECRET BYPASS LOGIC
        // Listening for Shift (2nd) then Enter (EXE)
        let secondPressed = false;
        window.addEventListener('keydown', (e) => {
            if (e.key === "Shift") secondPressed = true;
            if (secondPressed && e.key === "Enter") {
                unlockOS();
            }
        });

        function unlockOS() {
            const cloak = document.getElementById('cloak');
            const core = document.getElementById('orange-core');
            
            cloak.style.opacity = '0';
            setTimeout(() => {
                cloak.style.display = 'none';
                core.style.display = 'flex';
                setTimeout(() => core.style.opacity = '1', 50);
            }, 600);
        }

        // 3. CORE OS FUNCTIONS
        function showView(v) {
            document.getElementById('launcher-view').classList.remove('hidden');
        }
        function launch(u) {
            document.getElementById('app-frame').src = u;
            document.getElementById('app-overlay').style.display = 'flex';
        }
        function closeApp() {
            document.getElementById('app-overlay').style.display = 'none';
            document.getElementById('app-frame').src = '';
        }
        function handleGlobalKeys(e) { if(e.key === 'Escape') location.reload(); }

        // Boot
        initEmulator();
    </script>
</body>
</html>
