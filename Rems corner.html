<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORANGE OS | V41 HYPER-MOTION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --orange-main: #ea580c;
            --orange-glow: #ff6600;
            --ti-plastic: #fb923c;
            --lcd-bg: #cbd5e1;
            --dark-bg: #030303;
        }

        /* --- GLOBAL ANIMATIONS --- */
        @keyframes fruitFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
        }
        .fruit { position: fixed; font-size: 2.5rem; pointer-events: none; z-index: 50; animation: fruitFall linear infinite; }

        @keyframes hyperGlow {
            0%, 100% { filter: drop-shadow(0 0 5px var(--orange-glow)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px var(--orange-glow)); transform: scale(1.02); }
        }
        .animate-glow { animation: hyperGlow 3s infinite ease-in-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
        .slide-entry { animation: slideIn 0.5s ease-out forwards; }

        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; margin: 0; }

        /* --- CIRCULAR CALC CHASSIS --- */
        #cloak { position: fixed; inset: 0; z-index: 10000; background: radial-gradient(circle, #1a1a1a, #000); display: flex; align-items: center; justify-content: center; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        .ti-chassis {
            background: var(--ti-plastic); width: 440px; height: 820px;
            border-radius: 60px 60px 180px 180px; border: 10px solid #92400e;
            padding: 40px; box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        .lcd { 
            background: var(--lcd-bg); height: 180px; border-radius: 15px; border: 6px solid #1e293b;
            padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end;
            font-family: monospace; font-size: 2rem; color: #1e293b; font-weight: 900;
        }

        /* --- BUTTONS --- */
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 40px; }
        .k { height: 45px; background: #334155; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 0 #0f172a; transition: 0.1s; }
        .k:active { transform: translateY(3px); box-shadow: 0 1px 0 #0f172a; }
        .k-2 { background: #2563eb; } .k-n { background: #f1f5f9; color: #0f172a; font-size: 1.2rem; }

        /* --- OS LAYOUT --- */
        #os-root { display: none; height: 100vh; width: 100vw; grid-template-columns: 320px 1fr; opacity: 0; transition: 1s; }
        .sidebar { background: #0f172a; border-right: 4px solid var(--orange-main); padding: 50px 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { border: 2px solid var(--orange-main); padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; }
        .nav-btn:hover { background: var(--orange-main); color: #000; box-shadow: 0 0 30px var(--orange-glow); transform: scale(1.05); }

        /* --- FIND MORE HUB --- */
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .hub-card { background: #1e293b; border: 2px solid transparent; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .hub-card:hover { border-color: var(--orange-main); transform: translateY(-5px); background: #2d3e50; }

        /* --- EXECUTION LAYERS --- */
        #iframe-container { width: 95%; height: 90%; border: 4px solid var(--orange-main); border-radius: 20px; display: none; background: #000; overflow: hidden; }
        #win-overlay { position: fixed; inset: 0; z-index: 20000; background: #000; display: none; flex-direction: column; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="rain-zone"></div>

    <div id="cloak">
        <div class="ti-chassis animate-glow">
            <div class="lcd"><div id="lcd-text">READY</div></div>
            <div class="btn-grid">
                <div class="k">y=</div><div class="k">win</div><div class="k">zoom</div><div class="k">trace</div><div class="k">graph</div>
                <div class="k k-2" onclick="calc('2nd')">2nd</div><div class="k">mode</div><div class="k" onclick="calc('del')">del</div><div class="k">stat</div><div class="k">prgm</div>
                <div class="k k-n" onclick="press('7')">7</div><div class="k k-n" onclick="press('8')">8</div><div class="k k-n" onclick="press('9')">9</div><div class="k">/</div><div class="k">^</div>
                <div class="k k-n" onclick="press('4')">4</div><div class="k k-n" onclick="press('5')">5</div><div class="k k-n" onclick="press('6')">6</div><div class="k">*</div><div class="k">(</div>
                <div class="k k-n" onclick="press('1')">1</div><div class="k k-n" onclick="press('2')">2</div><div class="k k-n" onclick="press('3')">3</div><div class="k">-</div><div class="k">)</div>
                <div class="k k-n" onclick="press('0')">0</div><div class="k">.</div><div class="k">(-)</div><div class="k col-span-2" style="background:#000" onclick="calc('ent')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="modal-inj" class="fixed inset-0 bg-black/90 z-[15000] hidden items-center justify-center p-6">
        <div class="bg-zinc-900 p-10 w-full max-w-lg rounded-[40px] border-4 border-orange-600 slide-entry">
            <h2 class="text-orange-500 font-black text-3xl italic mb-6">CORE INJECTOR</h2>
            <input type="file" id="f12" class="w-full bg-black p-4 mb-4 border border-zinc-800 text-xs">
            <input type="file" id="f8" class="w-full bg-black p-4 mb-6 border border-zinc-800 text-xs">
            <button onclick="commitFiles()" class="w-full bg-orange-600 p-5 font-black text-black rounded-2xl hover:bg-white transition-colors">PUSH BINARIES</button>
            <button onclick="document.getElementById('modal-inj').style.display='none'" class="w-full mt-4 text-zinc-600 text-xs uppercase">Abort Sequence</button>
        </div>
    </div>

    <div id="os-root">
        <aside class="sidebar">
            <h1 class="text-4xl font-black italic text-orange-600 mb-8 animate-glow">ORANGE OS</h1>
            <div class="nav-btn" onclick="openView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-btn" onclick="openView('hub')"><span>FIND MORE</span><span>🔥</span></div>
            <div class="nav-btn" onclick="exec('https://storage.googleapis.com/fernisbest/index.html')"><span>BROWSER</span><span>🌐</span></div>
            <div class="nav-btn" onclick="openView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            <div class="mt-auto nav-btn border-white/10" onclick="location.reload()"><span>REBOOT</span><span>❌</span></div>
        </aside>

        <main class="relative flex-grow flex items-center justify-center bg-black">
            <iframe id="iframe-container"></iframe>

            <div id="v-launcher" class="hidden slide-entry">
                <div class="w-[850px] h-[500px] bg-zinc-800 rounded-3xl overflow-hidden flex border-2 border-zinc-700">
                    <div class="w-48 bg-zinc-900 p-6 space-y-4 font-bold text-zinc-500">
                        <div class="text-orange-500">Java Edition</div>
                        <div>Skins</div>
                    </div>
                    <div class="flex-grow flex flex-col bg-[url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg')] bg-cover">
                        <div class="mt-auto bg-black/95 p-8 flex items-center gap-6">
                            <select id="v-sel" class="bg-zinc-800 text-white p-4 font-black outline-none"><option value="mc12">1.12.2</option><option value="mc8">1.8.8</option></select>
                            <button onclick="playMC()" class="bg-green-600 px-12 py-4 text-2xl font-black rounded hover:bg-green-500">PLAY</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="v-hub" class="hidden w-full h-full p-10 overflow-y-auto slide-entry">
                <h2 class="text-3xl font-black text-orange-500 mb-8 uppercase">Discovery Hub</h2>
                <div class="hub-grid" id="hub-items">
                    </div>
            </div>

            <div id="v-settings" class="hidden w-[500px] bg-zinc-900 p-10 rounded-[40px] border-2 border-orange-600 slide-entry">
                <h2 class="text-2xl font-black text-orange-500 mb-6 uppercase">System Config</h2>
                <div class="flex justify-between items-center bg-black p-6 rounded-3xl mb-4">
                    <span class="font-bold">IFRAME EXECUTION</span>
                    <input type="checkbox" id="if-toggle" class="w-8 h-8 accent-orange-600">
                </div>
                <div class="flex justify-between items-center bg-black p-6 rounded-3xl">
                    <span class="font-bold">FRUIT RAIN</span>
                    <input type="checkbox" id="rain-toggle" onchange="toggleRain(this.checked)" class="w-8 h-8 accent-orange-600">
                </div>
            </div>
        </main>
    </div>

    <div id="win-overlay">
        <div class="bg-orange-600 p-2 flex justify-between items-center">
            <span class="font-black italic px-4 text-xs">ORANGE_KERNEL_PROCESS</span>
            <button onclick="closeWin()" class="bg-black text-white px-8 font-black py-2 hover:bg-zinc-900">TERMINATE</button>
        </div>
        <iframe id="win-frame" class="flex-grow bg-black border-none"></iframe>
    </div>

    <script>
        (function() {
            let db;
            let isShift = false;
            let buf = "";

            // 1. DATABASE
            const req = indexedDB.open("ORANGE_V41", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("cores");
            req.onsuccess = e => { db = e.target.result; populateHub(); };

            // 2. CALC FUNCTIONS
            window.press = (v) => { buf += v; document.getElementById('lcd-text').innerText = buf; };
            window.calc = (cmd) => {
                const lcd = document.getElementById('lcd-text');
                if(cmd === '2nd') { isShift = !isShift; lcd.style.color = isShift ? '#2563eb' : '#1e293b'; lcd.innerText = isShift ? "SHIFTED" : (buf || "0"); }
                if(isShift && cmd === 'del') { document.getElementById('modal-inj').style.display = 'flex'; isShift = false; }
                if(isShift && cmd === 'ent') { 
                    document.getElementById('cloak').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('cloak').style.display = 'none';
                        const root = document.getElementById('os-root');
                        root.style.display = 'grid';
                        setTimeout(() => root.style.opacity = '1', 10);
                    }, 800);
                }
                if(cmd === 'ent' && !isShift) { buf = ""; lcd.innerText = "0"; }
            };

            // 3. INJECTOR
            window.commitFiles = async () => {
                const f12 = document.getElementById('f12').files[0];
                const f8 = document.getElementById('f8').files[0];
                const tx = db.transaction("cores", "readwrite");
                if(f12) tx.objectStore("cores").put(new Blob([await f12.arrayBuffer()], {type:'text/html'}), "mc12");
                if(f8) tx.objectStore("cores").put(new Blob([await f8.arrayBuffer()], {type:'text/html'}), "mc8");
                alert("CORES INJECTED");
                document.getElementById('modal-inj').style.display = 'none';
            };

            // 4. HUB & EXECUTION
            function populateHub() {
                const apps = [
                    {n: 'Eaglercraft 1.8.8', u: 'https://eaglercraft.com/mc/1.8.8/'},
                    {n: 'Retro Hub', u: 'https://emulatorjs.org/'},
                    {n: 'Shadow Browser', u: 'https://storage.googleapis.com/fernisbest/index.html'},
                    {n: 'Discord Web', u: 'https://discord.com/app'}
                ];
                apps.forEach(a => {
                    const d = document.createElement('div');
                    d.className = 'hub-card slide-entry';
                    d.innerHTML = `<h3 class="font-black text-orange-500">${a.n}</h3><p class="text-[10px] text-zinc-500">External Execution Module</p>`;
                    d.onclick = () => exec(a.u);
                    document.getElementById('hub-items').appendChild(d);
                });
            }

            window.exec = (url) => {
                const mode = document.getElementById('if-toggle').checked;
                if(mode) {
                    hideViews();
                    const f = document.getElementById('iframe-container');
                    f.src = url; f.style.display = 'block';
                } else {
                    document.getElementById('win-frame').src = url;
                    document.getElementById('win-overlay').style.display = 'flex';
                }
            };

            window.playMC = () => {
                const v = document.getElementById('v-sel').value;
                db.transaction("cores").objectStore("cores").get(v).onsuccess = e => {
                    if(!e.target.result) return alert("CORE MISSING");
                    exec(URL.createObjectURL(e.target.result));
                };
            };

            // 5. FRUIT RAIN
            window.toggleRain = (on) => {
                const z = document.getElementById('rain-zone');
                z.innerHTML = '';
                if(!on) return;
                for(let i=0; i<25; i++) {
                    const f = document.createElement('div');
                    f.className = 'fruit'; f.innerText = ['🍊','🍋','🍇','🍎'][Math.floor(Math.random()*4)];
                    f.style.left = Math.random()*100+'vw';
                    f.style.animationDuration = (Math.random()*3 + 2) + 's';
                    f.style.animationDelay = Math.random()*5 + 's';
                    z.appendChild(f);
                }
            };

            window.hideViews = () => { ['v-launcher', 'v-hub', 'v-settings', 'iframe-container'].forEach(id => document.getElementById(id).style.display = 'none'); };
            window.openView = (v) => { hideViews(); document.getElementById('v-'+v).style.display = (v==='launcher'?'flex':'block'); };
            window.closeWin = () => { document.getElementById('win-overlay').style.display = 'none'; document.getElementById('win-frame').src = ''; };
        })();
    </script>
</body>
</html>
