<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORANGE OS | V30 FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary: #ea580c; --ti-orange: #fb923c; 
            --bg: #050505; --neon: #ff6600;
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* HYPER-FLASHY EFFECTS */
        @keyframes neonPulse { 
            0%, 100% { box-shadow: 0 0 20px var(--neon); border-color: #fff; }
            50% { box-shadow: 0 0 60px var(--neon); border-color: var(--neon); }
        }
        .flashy { animation: neonPulse 1s infinite ease-in-out; }
        .glow-btn:hover { box-shadow: 0 0 25px var(--primary); transform: scale(1.05); transition: 0.2s; }

        /* TI-84 TUFF UI */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; align-items: center; justify-content: center; }
        .ti-body { 
            background: #fb923c; width: 380px; height: 720px; border-radius: 45px; padding: 30px; 
            border: 5px solid #b45309; position: relative;
        }
        .lcd { 
            background: #e2e8f0; height: 180px; border-radius: 8px; padding: 15px; color: #111; 
            font-family: 'Courier New', monospace; font-size: 1.6rem; text-align: right;
            display: flex; flex-direction: column; justify-content: flex-end; border: 4px solid #333;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }
        .grid-ti { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 25px; }
        .ti-btn { 
            height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-size: 0.7rem; font-weight: 900; cursor: pointer; box-shadow: 0 5px #222; 
            transition: 0.1s; background: #333; color: white; user-select: none;
        }
        .ti-btn:active { transform: translateY(3px); box-shadow: 0 2px #222; }
        .btn-2nd { background: #2563eb; } 
        .btn-num { background: #f8fafc; color: #000; font-size: 1.1rem; }

        /* MC LAUNCHER 2026 UI */
        .mc-container { background: #313233; width: 950px; height: 620px; display: flex; border: 1px solid #444; }
        .mc-sidebar { width: 220px; background: #212223; padding: 20px 0; }
        .mc-nav { padding: 12px 25px; color: #ccc; cursor: pointer; font-size: 13px; font-weight: 600; }
        .mc-nav:hover { background: #3c3f41; color: white; }
        .mc-active { border-left: 4px solid #3c8527; background: #3c3f41; color: white; }
        
        .mc-main { flex-grow: 1; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; position: relative; display: flex; flex-direction: column; }
        .mc-bar { height: 110px; background: rgba(0,0,0,0.9); margin-top: auto; display: flex; align-items: center; padding: 0 30px; gap: 20px; }
        .play-btn { background: #3c8527; color: white; padding: 15px 70px; font-size: 26px; font-weight: 900; border-radius: 2px; }
        .play-btn:hover { background: #47a02e; box-shadow: 0 0 20px #3c8527; }

        /* VIDEO HUB GRID */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 25px; }
        .video-card { background: #181818; border: 2px solid transparent; transition: 0.3s; cursor: pointer; }
        .video-card:hover { border-color: var(--primary); transform: scale(1.02); box-shadow: 0 0 20px var(--primary); }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="cloak">
        <div class="ti-body flashy">
            <div class="lcd">
                <div style="font-size: 0.5rem; color: #666; text-align: left;">TI-84 PLUS CE Python</div>
                <div id="calc-display">0</div>
            </div>
            <div class="grid-ti">
                <div class="ti-btn">y=</div><div class="ti-btn">win</div><div class="ti-btn">zoom</div><div class="ti-btn">trace</div><div class="ti-btn">graph</div>
                <div class="ti-btn btn-2nd" onclick="op('2nd')">2nd</div><div class="ti-btn" onclick="op('MODE')">mode</div><div class="ti-btn" onclick="op('DEL')">del</div><div class="ti-btn">stat</div><div class="ti-btn">math</div>
                <div class="ti-btn btn-num" onclick="ins('7')">7</div><div class="ti-btn btn-num" onclick="ins('8')">8</div><div class="ti-btn btn-num" onclick="ins('9')">9</div><div class="ti-btn">÷</div><div class="ti-btn">×</div>
                <div class="ti-btn btn-num" onclick="ins('4')">4</div><div class="ti-btn btn-num" onclick="ins('5')">5</div><div class="ti-btn btn-num" onclick="ins('6')">6</div><div class="ti-btn">-</div><div class="ti-btn">+</div>
                <div class="ti-btn btn-num" onclick="ins('1')">1</div><div class="ti-btn btn-num" onclick="ins('2')">2</div><div class="ti-btn btn-num" onclick="ins('3')">3</div><div class="col-span-2 ti-btn" style="background:black" onclick="op('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[5000] hidden items-center justify-center">
        <div class="bg-zinc-900 p-10 border-4 border-orange-600 w-[500px] flashy">
            <h2 class="text-orange-500 font-black text-2xl italic mb-6">CORE INJECTOR</h2>
            <div class="space-y-4">
                <div class="bg-black p-4 border border-zinc-700">
                    <p class="text-[10px] text-zinc-500 mb-2">TARGET: EAGLER_1.12</p>
                    <input type="file" id="f12" class="text-xs">
                </div>
                <div class="bg-black p-4 border border-zinc-700">
                    <p class="text-[10px] text-zinc-500 mb-2">TARGET: EAGLER_1.8</p>
                    <input type="file" id="f8" class="text-xs">
                </div>
            </div>
            <div id="p-wrap" class="w-full h-3 bg-zinc-800 mt-6 hidden"><div id="p-fill" class="h-full bg-orange-600 w-0 transition-all"></div></div>
            <button onclick="injectFiles()" class="w-full bg-orange-600 p-4 font-black text-xl text-black mt-8 glow-btn">COMMIT BINARY</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-600 text-[10px] mt-4 uppercase">Close</button>
        </div>
    </div>

    <div id="orange-core" class="flex h-screen w-screen bg-[#121212]">
        <div class="w-20 bg-black flex flex-col items-center py-8 border-r border-zinc-800">
            <div class="w-12 h-12 bg-orange-600 rounded-xl mb-10 flex items-center justify-center text-2xl font-black cursor-pointer glow-btn" onclick="showView('launcher')">O</div>
            <div class="text-3xl mb-10 cursor-pointer opacity-50 hover:opacity-100 transition-all" onclick="showView('yt')">📺</div>
            <div class="text-3xl mb-10 cursor-pointer opacity-50 hover:opacity-100 transition-all" onclick="launch('https://google.com')">🌐</div>
        </div>

        <div class="flex-grow flex items-center justify-center p-6">
            <div id="launcher-view" class="mc-container hidden shadow-[0_0_60px_rgba(0,0,0,0.8)]">
                <div class="mc-sidebar">
                    <div class="mc-nav mc-active">Java Edition</div>
                    <div class="mc-nav">Minecraft for Windows</div>
                    <div class="mc-nav">Dungeons</div>
                    <div class="mt-8 mc-nav text-zinc-500 uppercase text-[10px]">Library</div>
                    <div class="mc-nav">Installations</div>
                    <div class="mc-nav">Skins</div>
                </div>
                <div class="mc-main">
                    <div class="mc-bar">
                        <select id="v-sel" class="bg-[#313233] text-white p-3 border border-zinc-600 font-bold text-sm">
                            <option value="mc12">Latest Release (1.12.2)</option>
                            <option value="mc8">Release (1.8.8)</option>
                        </select>
                        <button onclick="play()" class="play-btn glow-btn">PLAY</button>
                        <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" class="bg-zinc-700 p-3 text-[10px] font-bold border border-zinc-500">USEFUL PACKS</button>
                    </div>
                </div>
            </div>

            <div id="yt-view" class="w-full h-full bg-[#0a0a0a] hidden overflow-y-auto">
                <div class="p-8 border-b border-zinc-900"><h1 class="text-3xl font-black italic text-orange-600">GLOBAL STREAM</h1></div>
                <div class="video-grid" id="video-content"></div>
            </div>
        </div>
    </div>

    <div id="app-overlay" class="fixed inset-0 z-[9999] bg-black">
        <div class="bg-orange-600 p-2 flex justify-between"><span class="font-black px-4">SYS.EXE</span><button onclick="closeApp()" class="bg-black px-6 font-black">X</button></div>
        <iframe id="app-frame" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        let db;
        const req = indexedDB.open("OS_DATA", 2);
        req.onsuccess = e => { db = e.target.result; loadYT(); };

        function loadYT() {
            const vids = [
                {id:'dQw4w9WgXcQ', t:'Rickroll'}, {id:'QH2-TGUlwu4', t:'Nyan Cat'}, 
                {id:'9bZkp7q19f0', t:'Gangnam Style'}, {id:'XqZ_mE_Z97U', t:'Eaglercraft Pro Tips'},
                {id:'70S8v7FvM_k', t:'2B2T Doc'}, {id:'_OBlgSz8sSM', t:'Charlie Bit Me'}
            ];
            vids.forEach(v => {
                let d = document.createElement('div'); d.className='video-card';
                d.innerHTML = `<img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" class="w-full"><p class="p-3 text-xs font-bold">${v.t}</p>`;
                d.onclick = () => launch(`https://www.youtube.com/embed/${v.id}?autoplay=1`);
                document.getElementById('video-content').appendChild(d);
            });
        }

        async function injectFiles() {
            const files = { mc12: document.getElementById('f12').files[0], mc8: document.getElementById('f8').files[0] };
            document.getElementById('p-wrap').style.display = 'block';
            for (let [k, f] of Object.entries(files)) {
                if(!f) continue;
                const blob = new Blob([await f.arrayBuffer()], {type: 'text/html'});
                const tx = db.transaction("core", "readwrite");
                tx.objectStore("core").put(blob, k);
                await new Promise(r => tx.oncomplete = r);
                document.getElementById('p-fill').style.width = '100%';
            }
            alert("CORES INJECTED");
        }

        function play() {
            const ver = document.getElementById('v-sel').value;
            db.transaction("core").objectStore("core").get(ver).onsuccess = e => {
                if(!e.target.result) return alert("CORE MISSING! USE 2nd+DEL");
                document.getElementById('app-frame').src = URL.createObjectURL(e.target.result);
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        let inputStr = "", is2nd = false;
        function op(k) {
            if(k==='2nd') { is2nd = !is2nd; document.getElementById('lcd').style.background = is2nd ? '#bef264' : '#e2e8f0'; return; }
            if(is2nd && k==='DEL') { document.getElementById('admin-panel').style.display = 'flex'; is2nd = false; return; }
            if(is2nd && k==='MODE') { document.getElementById('cloak').style.display='none'; document.getElementById('orange-core').style.display='flex'; return; }
            if(k==='EXE') inputStr = "";
            document.getElementById('calc-display').innerText = inputStr || "0";
        }
        function ins(v) { inputStr += v; document.getElementById('calc-display').innerText = inputStr; }
        function showView(v) { ['launcher-view', 'yt-view'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(v+'-view').classList.remove('hidden'); }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }
    </script>
</body>
</html>
