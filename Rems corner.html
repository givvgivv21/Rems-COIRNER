<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | Supernova V22.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary: #ea580c; --primary-bright: #fb923c; --primary-dark: #7c2d12;
            --bg: #0c0a09; --sidebar: #110c0a; --accent-glow: rgba(234, 88, 12, 0.8);
        }
        .theme-lemon {
            --primary: #a3e635; --primary-bright: #fef08a; --primary-dark: #365314;
            --bg: #050501; --sidebar: #0a0a02; --accent-glow: rgba(163, 230, 53, 0.8);
        }
        .theme-grape {
            --primary: #a855f7; --primary-bright: #e9d5ff; --primary-dark: #3b0764;
            --bg: #05010a; --sidebar: #0a0212; --accent-glow: rgba(168, 85, 247, 0.8);
        }

        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* FLASHY ANIMATIONS */
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanline { position: fixed; inset: 0; background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent); height: 10px; opacity: 0.1; pointer-events: none; animation: scanline 4s linear infinite; z-index: 99999; }
        
        @keyframes pulse-border { 0%, 100% { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-dark); } 50% { border-color: var(--primary-bright); box-shadow: 0 0 30px var(--primary); } }
        .flashy-window { border: 3px solid var(--primary); animation: pulse-border 2s infinite; }

        /* BOOT SCREEN */
        #boot-screen { position: fixed; inset: 0; background: black; z-index: 200000; display: none; align-items: center; justify-content: center; flex-direction: column; font-family: monospace; }
        .loading-bar { width: 300px; height: 4px; background: #222; margin-top: 20px; position: relative; overflow: hidden; }
        .loading-progress { position: absolute; height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        /* SIDEBAR NAV */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 4px solid var(--primary); padding: 25px; display: flex; flex-direction: column; box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        .nav-item { 
            border: 1px solid var(--primary); padding: 14px; margin-bottom: 15px; cursor: pointer; font-weight: 900; 
            display: flex; justify-content: space-between; color: var(--primary-bright); background: rgba(255,255,255,0.03);
            transition: 0.2s; text-transform: uppercase;
        }
        .nav-item:hover { background: var(--primary); color: #000; transform: scale(1.03) translateX(10px); box-shadow: -10px 0 20px var(--primary); }

        /* MOJANG STYLE */
        .mojang-window { width: 850px; height: 550px; background: #000; display: flex; flex-direction: column; overflow: hidden; border-radius: 20px; }
        
        /* THEME DOTS */
        .theme-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .theme-dot:hover { transform: scale(1.2); border-color: white; }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 150000; flex-direction: column; }
    </style>
</head>
<body onkeydown="handleGlobalKeys(event)">
    <div class="scanline"></div>

    <div id="boot-screen">
        <div class="text-2xl font-black italic text-primary glitch mb-2">OS_REBOOTING...</div>
        <div id="boot-status" class="text-xs text-zinc-500 uppercase">Verifying Kernel</div>
        <div class="loading-bar"><div id="boot-fill" class="loading-progress"></div></div>
    </div>

    <div id="cloak" class="fixed inset-0 bg-black flex items-center justify-center z-[100000]">
        <div class="bg-zinc-900 p-8 rounded-[40px] border-4 border-orange-600 w-80 shadow-2xl">
            <div id="lcd" class="bg-[#99ad99] h-20 mb-6 rounded-lg text-black text-3xl font-mono flex items-center justify-end px-4 shadow-inner">0</div>
            <div class="grid grid-cols-4 gap-3">
                <div class="bg-zinc-800 p-4 text-center rounded-xl cursor-pointer font-bold active:scale-95" onclick="op('2nd')">2nd</div>
                <div class="bg-zinc-800 p-4 text-center rounded-xl cursor-pointer font-bold active:scale-95" onclick="op('DEL')">DEL</div>
                <div class="bg-orange-600 p-4 text-center rounded-xl cursor-pointer font-bold col-span-2 active:scale-95" onclick="op('EXE')">EXE</div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[200000] hidden items-center justify-center backdrop-blur-md">
        <div class="bg-zinc-900 border-2 border-primary p-10 rounded-3xl w-[450px] flashy-window">
            <h2 class="text-primary font-black text-3xl italic mb-6 uppercase tracking-tighter">Core Injection</h2>
            
            <div id="inject-status-box" class="hidden mb-6 p-4 bg-black border border-primary/30 rounded text-center">
                <div id="inject-text" class="text-xs font-bold mb-2 text-primary">WAITING...</div>
                <div class="loading-bar w-full"><div id="inject-fill" class="loading-progress"></div></div>
            </div>

            <div class="space-y-4">
                <input type="file" id="file12" class="w-full bg-black p-3 text-xs border border-zinc-800">
                <input type="file" id="file8" class="w-full bg-black p-3 text-xs border border-zinc-800">
                <button id="commit-btn" onclick="startHeavyInjection()" class="w-full bg-primary p-4 font-black text-black text-xl hover:brightness-125 transition-all">INJECT CORES</button>
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-600 text-[10px] mt-4 uppercase font-bold">Close Interface</button>
            </div>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-4xl font-black italic text-primary mb-10 uppercase tracking-tighter filter drop-shadow-[0_0_8px_var(--primary)]">Orange OS</h1>
            <div class="nav-item flashy-window" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="launch('https://www.google.com/search?igu=1')"><span>BROWSER</span><span>🌐</span></div>
            <div class="nav-item" onclick="launch('https://www.youtube.com/embed?listType=search&list=minecraft')"><span>YOUTUBE</span><span>📺</span></div>
            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            <div class="mt-auto nav-item text-white border-white hover:bg-white hover:text-black" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="content-area" class="flex-grow flex items-center justify-center p-12">
            <div id="launcher-view" class="mojang-window flashy-window hidden">
                <div class="flex-grow bg-[url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg')] bg-cover bg-center"></div>
                <div class="h-28 bg-black flex items-center justify-center gap-6 px-10 border-t-4 border-primary">
                    <select id="ver-select" class="bg-zinc-900 p-3 text-white border-2 border-primary text-xs font-black outline-none rounded-md">
                        <option value="mc12">EAGLERCRAFT 1.12.2</option>
                        <option value="mc8">EAGLERCRAFT 1.8.8</option>
                    </select>
                    <button onclick="playSelected()" class="play-btn active:scale-95 transition-transform">PLAY</button>
                    <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" 
                            class="bg-zinc-800 border-2 border-black shadow-[inset_-3px_-3px_rgba(0,0,0,0.5),inset_3px_3px_rgba(255,255,255,0.1)] px-4 h-[50px] text-[9px] text-white font-black hover:bg-zinc-700 transition-all uppercase leading-tight">
                        USEFUL TEXTURE <br> PACKS
                    </button>
                    <div class="flex flex-col gap-2 text-[10px] font-black uppercase">
                        <div class="flex items-center gap-2"><span id="dot12" class="w-3 h-3 rounded-full bg-red-600"></span> 1.12</div>
                        <div class="flex items-center gap-2"><span id="dot8" class="w-3 h-3 rounded-full bg-red-600"></span> 1.8</div>
                    </div>
                </div>
            </div>

            <div id="settings-view" class="hidden p-12 bg-black border-2 border-primary rounded-[40px] w-[500px] flashy-window">
                <h2 class="text-4xl font-black text-primary mb-10 italic uppercase">System Config</h2>
                <div class="space-y-8">
                    <div>
                        <p class="text-sm font-black text-zinc-500 mb-4 uppercase tracking-widest">Color Schemes</p>
                        <div class="flex gap-6">
                            <div class="theme-dot bg-orange-600" onclick="setTheme('orange')"></div>
                            <div class="theme-dot bg-lime-500" onclick="setTheme('lemon')"></div>
                            <div class="theme-dot bg-purple-600" onclick="setTheme('grape')"></div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center text-xl font-black">
                        <span>Iframe Isolation</span>
                        <input type="checkbox" id="iframe-toggle" checked class="w-8 h-8 accent-primary">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="p-3 bg-primary flex justify-between items-center text-black font-black text-xs">
            <span class="ml-4 uppercase tracking-widest">Core App Running</span>
            <button onclick="closeApp()" class="bg-black text-white px-8 py-1 hover:bg-white hover:text-black transition-colors">TERMINATE</button>
        </div>
        <iframe id="app-frame" class="w-full h-full bg-black border-none"></iframe>
    </div>

    <script>
        let db;
        const dbReq = indexedDB.open("OrangeOS_V22", 1);
        dbReq.onupgradeneeded = (e) => { db = e.target.result; db.createObjectStore("core"); };
        dbReq.onsuccess = (e) => { db = e.target.result; updateStatusDots(); };

        function setTheme(t) {
            document.body.className = '';
            if(t !== 'orange') document.body.classList.add('theme-' + t);
        }

        async function startHeavyInjection() {
            const btn = document.getElementById('commit-btn');
            const statusBox = document.getElementById('inject-status-box');
            const statusText = document.getElementById('inject-text');
            const fill = document.getElementById('inject-fill');
            
            const files = { mc12: document.getElementById('file12').files[0], mc8: document.getElementById('file8').files[0] };
            if(!files.mc12 && !files.mc8) return alert("NO FILES DETECTED");

            statusBox.style.display = 'block';
            btn.disabled = true;

            for (const [key, file] of Object.entries(files)) {
                if(!file) continue;
                
                statusText.innerText = `INITIALIZING: ${key.toUpperCase()}`;
                fill.style.width = '20%';
                
                const text = await file.text();
                statusText.innerText = `INJECTING: ${key.toUpperCase()}`;
                fill.style.width = '60%';

                const tx = db.transaction(["core"], "readwrite");
                tx.objectStore("core").put(text, key);
                await new Promise(r => tx.oncomplete = r);
                
                fill.style.width = '100%';
            }

            statusText.innerText = "CORE UPDATED SUCCESSFULLY";
            setTimeout(() => {
                statusBox.style.display = 'none';
                btn.disabled = false;
                updateStatusDots();
            }, 2000);
        }

        async function bootOS() {
            document.getElementById('cloak').style.display = 'none';
            const boot = document.getElementById('boot-screen');
            const fill = document.getElementById('boot-fill');
            const stat = document.getElementById('boot-status');
            boot.style.display = 'flex';

            const steps = ["Loading Kernel", "Mounting Filesystem", "Initializing Graphics", "Finalizing"];
            for(let i=0; i<steps.length; i++) {
                stat.innerText = steps[i];
                fill.style.width = ((i+1) * 25) + "%";
                await new Promise(r => setTimeout(r, 600));
            }

            boot.style.display = 'none';
            document.getElementById('orange-core').style.display = 'flex';
            updateStatusDots();
        }

        function playSelected() {
            const key = document.getElementById('ver-select').value;
            const tx = db.transaction(["core"], "readonly");
            tx.objectStore("core").get(key).onsuccess = (e) => {
                const data = e.target.result;
                if(!data) return alert("CORE BUILD MISSING");
                const blob = new Blob([data], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                if(document.getElementById('iframe-toggle').checked) {
                    document.getElementById('app-frame').src = url;
                    document.getElementById('app-overlay').style.display = 'flex';
                } else { window.open(url, '_blank'); }
            };
        }

        function updateStatusDots() {
            if(!db) return;
            const tx = db.transaction(["core"], "readonly");
            const store = tx.objectStore("core");
            store.get("mc12").onsuccess = (e) => {
                const c = e.target.result ? '#44ff44' : '#ff4444';
                document.getElementById('dot12').style.background = c;
                document.getElementById('dot12').style.boxShadow = `0 0 10px ${c}`;
            };
            store.get("mc8").onsuccess = (e) => {
                const c = e.target.result ? '#44ff44' : '#ff4444';
                document.getElementById('dot8').style.background = c;
                document.getElementById('dot8').style.boxShadow = `0 0 10px ${c}`;
            };
        }

        let inputStr = "0", is2nd = false;
        function op(k) {
            if(k === '2nd') { is2nd = !is2nd; document.getElementById('lcd').style.background = is2nd ? '#d1ffd1' : '#99ad99'; return; }
            if(is2nd && k === 'DEL') {
                let p = prompt("ACCESS:"); if(p === "remmy21") document.getElementById('admin-panel').style.display = 'flex';
                is2nd = false; return;
            }
            if(is2nd && k === 'EXE') { bootOS(); return; }
            if(k === 'DEL') inputStr = inputStr.length > 1 ? inputStr.slice(0, -1) : "0";
            document.getElementById('lcd').innerText = inputStr;
        }
        function handleGlobalKeys(e) { if(e.key === 'Escape') location.reload(); }
        function showView(v) { ['launcher-view', 'settings-view'].forEach(i => document.getElementById(i).classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = ''; }
    </script>
</body>
</html>
