<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V25.0 TI-Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary: #ea580c; --ti-orange: #fb923c; 
            --bg: #0c0a09; --sidebar: #1c1917;
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* TI-84 PLUS CE BODY */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #050505; display: flex; align-items: center; justify-content: center; }
        
        .ti-body { 
            background: #fb923c; /* Peach Pi Orange */
            width: 360px; height: 680px; 
            border-radius: 40px 40px 60px 60px; 
            padding: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.2);
            border: 4px solid #c2712d;
            position: relative;
        }

        /* THE SCREEN BEZEL */
        .ti-screen-area {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid #333;
            box-shadow: inset 0 0 15px #000;
        }

        .lcd { 
            background: #fdfdfd; 
            height: 160px; 
            border-radius: 4px;
            padding: 10px;
            color: #111;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            border: 2px solid #000;
        }

        /* BUTTON STYLING */
        .grid-ti { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .ti-btn {
            height: 40px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 4px #222;
            transition: 0.1s;
            user-select: none;
            text-transform: uppercase;
        }
        .ti-btn:active { transform: translateY(3px); box-shadow: 0 1px #222; }
        
        /* COLOR CODING */
        .btn-2nd { background: #2563eb; color: white; } /* Blue 2nd key */
        .btn-alpha { background: #16a34a; color: white; } /* Green Alpha key */
        .btn-func { background: #333; color: white; } /* Black function keys */
        .btn-num { background: #e5e7eb; color: #111; font-size: 1rem; } /* Grey/White numbers */
        .btn-math { background: #4b5563; color: white; }
        
        /* FLASHY EFFECTS */
        @keyframes neonGlow {
            0%, 100% { box-shadow: 0 0 10px var(--ti-orange); border-color: #fff; }
            50% { box-shadow: 0 0 30px var(--ti-orange); border-color: var(--ti-orange); }
        }
        .flashy-body { animation: neonGlow 2s infinite; }

        /* FRUIT RAIN */
        #fruit-rain { position: fixed; inset: 0; pointer-events: none; z-index: 100; display: none; }
        .falling-fruit { position: absolute; font-size: 2rem; animation: fall linear infinite; }
        @keyframes fall { from { transform: translateY(-10vh) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }

        /* OS CORE STYLES */
        #orange-core { display: none; height: 100vh; width: 100vw; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 4px solid var(--primary); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { border: 2px solid var(--primary); padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: 900; display: flex; justify-content: space-between; }
        .nav-item:hover { background: var(--primary); color: #000; }
        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="fruit-rain"></div>

    <div id="cloak">
        <div class="ti-body flashy-body">
            <div class="ti-screen-area">
                <div id="lcd" class="lcd">
                    <div style="font-size: 0.6rem; color: #666; text-align: left;">TI-84 Plus CE</div>
                    <div id="calc-display">0</div>
                </div>
            </div>

            <div class="grid-ti">
                <div class="ti-btn btn-func">y=</div><div class="ti-btn btn-func">window</div><div class="ti-btn btn-func">zoom</div><div class="ti-btn btn-func">trace</div><div class="ti-btn btn-func">graph</div>
                
                <div class="ti-btn btn-2nd" onclick="op('2nd')">2nd</div><div class="ti-btn btn-math">mode</div><div class="ti-btn btn-btn btn-func" onclick="op('DEL')">del</div><div class="ti-btn btn-math">stat</div><div class="ti-btn btn-math">calc</div>
                
                <div class="ti-btn btn-alpha">alpha</div><div class="ti-btn btn-math">math</div><div class="ti-btn btn-math">apps</div><div class="ti-btn btn-math">prgm</div><div class="ti-btn btn-math">vars</div>
                
                <div class="ti-btn btn-math">x²</div><div class="ti-btn btn-num" onclick="ins('7')">7</div><div class="ti-btn btn-num" onclick="ins('8')">8</div><div class="ti-btn btn-num" onclick="ins('9')">9</div><div class="ti-btn btn-func" onclick="ins('/')">÷</div>
                
                <div class="ti-btn btn-math">log</div><div class="ti-btn btn-num" onclick="ins('4')">4</div><div class="ti-btn btn-num" onclick="ins('5')">5</div><div class="ti-btn btn-num" onclick="ins('6')">6</div><div class="ti-btn btn-func" onclick="ins('*')">×</div>
                
                <div class="ti-btn btn-math">ln</div><div class="ti-btn btn-num" onclick="ins('1')">1</div><div class="ti-btn btn-num" onclick="ins('2')">2</div><div class="ti-btn btn-num" onclick="ins('3')">3</div><div class="ti-btn btn-func" onclick="ins('-')">-</div>
                
                <div class="ti-btn btn-math">sto→</div><div class="ti-btn btn-num" onclick="ins('0')">0</div><div class="ti-btn btn-num">.</div><div class="ti-btn btn-num">(-)</div><div class="ti-btn btn-func" onclick="ins('+')">+</div>
                
                <div class="ti-btn col-span-5 btn-func" style="background:#000; color:#fff;" onclick="op('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/90 z-[3000] hidden items-center justify-center">
        <div class="bg-zinc-900 p-8 border-2 border-primary w-[400px] shadow-[0_0_50px_var(--primary)]">
            <h2 class="text-primary font-black text-xl mb-4">INJECTOR CORE</h2>
            <input type="file" id="f12" class="w-full mb-4 text-xs text-white">
            <input type="file" id="f8" class="w-full mb-4 text-xs text-white">
            <div id="p-wrap" class="w-full h-3 bg-zinc-800 rounded-full overflow-hidden hidden"><div id="p-fill" class="h-full bg-primary w-0 transition-all"></div></div>
            <p id="p-status" class="text-[10px] text-primary mt-2 uppercase font-bold text-center"></p>
            <button onclick="injectFiles()" class="w-full bg-primary p-3 font-black text-black mt-4">COMMIT DATA</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-500 text-[10px] mt-2">CLOSE</button>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-2xl font-black italic text-primary mb-6">ORANGE OS</h1>
            <div class="nav-item" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="showView('yt')"><span>VIDEO HUB</span><span>📺</span></div>
            <div class="nav-item" onclick="launch('https://storage.googleapis.com/fernisbest/index.html')"><span>BROWSER</span><span>🌐</span></div>
            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            <div class="mt-auto nav-item border-white text-white" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="main" class="flex-grow relative flex items-center justify-center">
            <div id="launcher-view" class="w-[800px] h-[500px] bg-zinc-800 border-4 border-black hidden flex-col shadow-2xl">
                <div class="flex-grow bg-[url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg')] bg-cover"></div>
                <div class="h-24 bg-black flex items-center justify-center gap-6 p-4">
                    <select id="v-sel" class="bg-zinc-900 p-2 text-white border border-primary font-bold"><option value="mc12">Eagler 1.12.2</option><option value="mc8">Eagler 1.8.8</option></select>
                    <button onclick="play()" class="bg-green-600 px-10 py-3 font-black">PLAY</button>
                    <div class="flex flex-col text-[10px] font-bold">
                        <div class="flex items-center gap-2"><span id="d12" class="w-2 h-2 rounded-full bg-red-600"></span> 1.12</div>
                        <div class="flex items-center gap-2"><span id="d8" class="w-2 h-2 rounded-full bg-red-600"></span> 1.8</div>
                    </div>
                </div>
            </div>

            <div id="yt-view" class="w-full h-full bg-black hidden overflow-y-auto">
                <div class="p-6 border-b border-primary"><h2 class="font-black text-primary">VIDEO HUB</h2></div>
                <div class="grid grid-cols-4 gap-4 p-4">
                    <div class="bg-zinc-900 cursor-pointer" onclick="launch('https://www.youtube.com/embed/dQw4w9WgXcQ')"><img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg"></div>
                </div>
            </div>

            <div id="settings-view" class="bg-zinc-900 p-10 border-2 border-primary hidden w-[400px]">
                <h2 class="font-black text-xl text-primary mb-6">SETTINGS</h2>
                <div class="flex justify-between"><span>Fruit Rain</span> <input type="checkbox" onchange="toggleRain(this.checked)"></div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="bg-primary p-2 flex justify-end"><button onclick="closeApp()" class="bg-black text-white px-4 font-black">EXIT</button></div>
        <iframe id="app-frame" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        let db;
        const req = indexedDB.open("OS_DATA", 2);
        req.onupgradeneeded = e => e.target.result.createObjectStore("core");
        req.onsuccess = e => { db = e.target.result; updateDots(); };

        async function injectFiles() {
            const files = { mc12: document.getElementById('f12').files[0], mc8: document.getElementById('f8').files[0] };
            const wrap = document.getElementById('p-wrap'), fill = document.getElementById('p-fill'), stat = document.getElementById('p-status');
            wrap.style.display = 'block';
            for (let [key, file] of Object.entries(files)) {
                if(!file) continue;
                stat.innerText = `Injecting ${key}...`;
                fill.style.width = '50%';
                const blob = new Blob([await file.arrayBuffer()], {type: 'text/html'});
                const tx = db.transaction("core", "readwrite");
                tx.objectStore("core").put(blob, key);
                await new Promise(r => tx.oncomplete = r);
                fill.style.width = '100%';
                stat.innerText = `${key} Complete!`;
                await new Promise(r => setTimeout(r, 500));
            }
            updateDots();
            setTimeout(() => wrap.style.display = 'none', 2000);
        }

        function play() {
            const ver = document.getElementById('v-sel').value;
            db.transaction("core").objectStore("core").get(ver).onsuccess = e => {
                if(!e.target.result) return alert("Core missing!");
                document.getElementById('app-frame').src = URL.createObjectURL(e.target.result);
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        function updateDots() {
            const tx = db.transaction("core").objectStore("core");
            tx.get("mc12").onsuccess = e => document.getElementById('d12').style.background = e.target.result ? '#4f4' : '#f44';
            tx.get("mc8").onsuccess = e => document.getElementById('d8').style.background = e.target.result ? '#4f4' : '#f44';
        }

        let inputStr = "0", is2nd = false;
        function op(k) {
            if(k==='2nd') { is2nd = !is2nd; document.getElementById('lcd').style.background = is2nd ? '#d1ffd1' : '#fdfdfd'; return; }
            if(is2nd && k==='DEL') { document.getElementById('admin-panel').style.display = 'flex'; is2nd = false; return; }
            if(is2nd && k==='EXE') { document.getElementById('cloak').style.display='none'; document.getElementById('orange-core').style.display='flex'; return; }
            if(k==='DEL') inputStr = "0";
            document.getElementById('calc-display').innerText = inputStr;
        }
        function ins(v) { inputStr = (inputStr === "0") ? v : inputStr + v; document.getElementById('calc-display').innerText = inputStr; }
        function showView(v) { ['launcher-view', 'yt-view', 'settings-view'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(v+'-view').classList.remove('hidden'); }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }
        function toggleRain(on) {
            const rain = document.getElementById('fruit-rain');
            rain.style.display = on ? 'block' : 'none';
            if(on) {
                for(let i=0; i<30; i++) {
                    let f = document.createElement('div'); f.className='falling-fruit'; f.innerText='🍊';
                    f.style.left=Math.random()*100+'vw'; f.style.animationDuration=(Math.random()*3+2)+'s';
                    rain.appendChild(f);
                }
            }
        }
    </script>
</body>
</html>
