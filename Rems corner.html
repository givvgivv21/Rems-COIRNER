<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pumpkin OS | V82.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #f97316; --p-dark: #7c2d12; --bg: #0c0a09; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        /* BOOT SCREEN */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .big-pumpkin { font-size: 140px; margin-bottom: 20px; animation: glow 3s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 20px rgba(249,115,22,0.2)); transform: scale(1); } 50% { filter: drop-shadow(0 0 50px rgba(249,115,22,0.6)); transform: scale(1.05); } }
        
        .ti-body { background: #f97316; width: 340px; height: 580px; border-radius: 45px 45px 90px 90px; padding: 25px; border: 5px solid #c2410c; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .lcd { background: #94a392; height: 100px; border: 4px solid #000; border-radius: 12px; padding: 10px; color: #1a241a; font-family: monospace; font-weight: bold; text-align: right; box-shadow: inset 0 4px 10px rgba(0,0,0,0.2); }

        /* INTERACTION */
        .btn-pill, .nav-link, .ti-btn { transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .btn-pill:active, .nav-link:active, .ti-btn:active { transform: scale(0.92); filter: brightness(0.8); }

        /* MAIN GUI */
        #orange-core { display: none; height: 100vh; width: 100vw; grid-template-columns: 240px 1fr; padding: 20px; gap: 20px; }
        .sidebar { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 30px 15px; display: flex; flex-direction: column; }
        
        .nav-link { padding: 14px 20px; border-radius: 50px; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #777; display: flex; align-items: center; gap: 12px; }
        .nav-active { background: var(--p); color: #000 !important; box-shadow: 0 10px 20px rgba(249,115,22,0.3); }

        .main-stage { background: rgba(255,255,255,0.02); border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; position: relative; }
        .view-pane { display: none; width: 100%; height: 100%; padding: 40px; overflow-y: auto; }
        
        .btn-pill { background: var(--p); color: #000; padding: 14px 32px; border-radius: 50px; font-weight: 800; border: none; }
        
        /* OVERLAYS */
        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }

        /* CALC UTILS */
        .ti-btn { height: 35px; background: #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; box-shadow: 0 4px 0 #000; color: #fff; text-transform: uppercase; }
        .ti-btn-2nd { background: #2563eb !important; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="cloak">
        <div class="big-pumpkin">🎃</div>
        <div class="ti-body">
            <div class="lcd"><div id="calc-display" class="text-3xl mt-4">0</div></div>
            <div class="grid grid-cols-5 gap-2 mt-10">
                <div class="ti-btn ti-btn-2nd" onclick="op('2nd')">2nd</div>
                <div class="ti-btn" onclick="op('DEL')">del</div><div class="ti-btn">mode</div><div class="ti-btn">stat</div><div class="ti-btn">prgm</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('7')">7</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('8')">8</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('9')">9</div><div class="ti-btn">/</div><div class="ti-btn">sin</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('4')">4</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('5')">5</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('6')">6</div><div class="ti-btn">x</div><div class="ti-btn">cos</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('1')">1</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('2')">2</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('3')">3</div><div class="ti-btn">-</div><div class="ti-btn">tan</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('0')">0</div><div class="ti-btn bg-zinc-100 !text-black">.</div><div class="ti-btn bg-zinc-100 !text-black">(-)</div><div class="ti-btn bg-black text-white col-span-2" onclick="op('EXE')">ENTER</div>
            </div>
            <p class="text-[9px] text-orange-900 font-bold mt-6 text-center tracking-widest opacity-60">SHORTCUT: 2ND + DEL = INJECT</p>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[3000] hidden items-center justify-center backdrop-blur-md">
        <div class="bg-zinc-900 p-10 rounded-[50px] border-2 border-orange-500 w-[420px] shadow-2xl">
            <h2 class="text-orange-500 font-black mb-2 uppercase text-xl">Eagler Injector</h2>
            <p class="text-zinc-500 text-[10px] mb-8 font-bold">COMMIT BINARIES TO LOCAL INDEXED STORAGE</p>
            
            <div class="space-y-4">
                <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                    <label class="text-[9px] text-zinc-400 block mb-2 uppercase">v1.12.2 File</label>
                    <input type="file" id="f12" class="w-full text-xs">
                </div>
                <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                    <label class="text-[9px] text-zinc-400 block mb-2 uppercase">v1.8.8 File</label>
                    <input type="file" id="f8" class="w-full text-xs">
                </div>
            </div>

            <div id="p-wrap" class="w-full h-2 bg-zinc-800 rounded-full overflow-hidden mt-6 hidden"><div id="p-fill" class="h-full bg-orange-500 w-0 transition-all"></div></div>
            <p id="p-status" class="text-[10px] text-orange-500 mt-2 uppercase font-bold text-center"></p>
            
            <button onclick="injectFiles()" class="w-full btn-pill mt-6 shadow-lg">RUN INJECTION</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-500 text-xs mt-4 hover:text-white transition-colors">Close Panel</button>
        </div>
    </div>

    <div id="orange-core">
        <aside class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-10 text-center">PUMPKIN</h1>
            <nav class="flex-grow">
                <div class="nav-link nav-active" onclick="nav('launcher')"><span>🎃</span> Launcher</div>
                <div class="nav-link" onclick="nav('yt')"><span>📺</span> Video Hub</div>
                <div class="nav-link" onclick="launch('https://storage.googleapis.com/fernisbest/index.html')"><span>🌐</span> Browser</div>
                <div class="nav-link" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')"><span>✨</span> More Updates</div>
                <div class="nav-link" onclick="nav('settings')"><span>⚙️</span> Settings</div>
            </nav>
            <button onclick="location.reload()" class="w-full py-4 rounded-full bg-red-600/10 text-red-500 font-bold text-xs hover:bg-red-600 hover:text-white active:scale-95 transition-all uppercase tracking-tighter">Panic Button</button>
        </aside>

        <main class="main-stage">
            <div id="launcher-view" class="view-pane flex flex-col items-center justify-center" style="display:flex;">
                <div class="w-full max-w-lg p-10 bg-white/5 rounded-[50px] border border-white/10 shadow-xl">
                    <h2 class="text-2xl font-black mb-8 text-center uppercase tracking-widest">Eagler Loader</h2>
                    <select id="v-sel" class="w-full bg-zinc-800 p-4 rounded-3xl font-bold text-orange-500 border border-white/5 mb-6 outline-none appearance-none text-center">
                        <option value="mc12">Eaglercraft 1.12.2</option>
                        <option value="mc8">Eaglercraft 1.8.8</option>
                    </select>
                    <button onclick="play()" class="w-full btn-pill text-lg mb-10 shadow-xl">BOOT GAME</button>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="window.open('https://github.com/Eaglercraft/resource-packs', '_blank')" class="bg-white/5 p-5 rounded-3xl text-[10px] font-black uppercase hover:bg-orange-500 hover:text-black transition-all">PvP Textures</button>
                        <button onclick="window.open('https://eaglercraft.com/resourcepacks', '_blank')" class="bg-white/5 p-5 rounded-3xl text-[10px] font-black uppercase hover:bg-orange-500 hover:text-black transition-all">Faithful 32x</button>
                    </div>
                </div>
            </div>

            <div id="yt-view" class="view-pane flex flex-col items-center">
                <h2 class="text-3xl font-black mb-8 text-orange-500 uppercase">Cinema Hub</h2>
                <div class="w-full max-w-4xl aspect-video bg-black rounded-[40px] overflow-hidden border border-white/10 shadow-2xl">
                    <iframe id="yt-player" src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
                </div>
                <div class="mt-8 flex gap-4 w-full max-w-4xl">
                    <input type="text" id="yt-url" placeholder="Paste Video URL..." class="flex-grow bg-white/5 p-5 rounded-full border border-white/10 outline-none focus:border-orange-500 transition-all">
                    <button onclick="loadYT()" class="btn-pill px-10">Load</button>
                </div>
            </div>

            <div id="settings-view" class="view-pane">
                <h2 class="text-2xl font-black mb-10 uppercase tracking-widest">System Config</h2>
                <div class="max-w-md space-y-4">
                    <div class="bg-white/5 p-8 rounded-[40px] flex justify-between items-center border border-white/5">
                        <span class="font-bold">Autumn Pumpkin Rain</span>
                        <input type="checkbox" onchange="toggleRain(this.checked)" class="w-6 h-6 accent-orange-500">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="app-overlay">
        <div class="bg-orange-600 p-2 flex justify-end">
            <button onclick="closeApp()" class="bg-black text-white px-8 py-2 rounded-full font-black text-[10px] tracking-widest uppercase">Close Instance</button>
        </div>
        <iframe id="app-frame"></iframe>
    </div>

    <script>
        let db, inputStr = "0", is2nd = false;
        const req = indexedDB.open("PUMPKIN_STORAGE_V82", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("core");
        req.onsuccess = e => { db = e.target.result; };

        // CORE INJECTOR
        async function injectFiles() {
            const files = { mc12: document.getElementById('f12').files[0], mc8: document.getElementById('f8').files[0] };
            const wrap = document.getElementById('p-wrap'), fill = document.getElementById('p-fill'), stat = document.getElementById('p-status');
            wrap.style.display = 'block';
            for (let [key, file] of Object.entries(files)) {
                if(!file) continue;
                stat.innerText = `Injecting ${key}...`;
                fill.style.width = '50%';
                const tx = db.transaction("core", "readwrite");
                tx.objectStore("core").put(new Blob([await file.arrayBuffer()], {type: 'text/html'}), key);
                await new Promise(r => tx.oncomplete = r);
                fill.style.width = '100%';
            }
            stat.innerText = "SUCCESSFULLY COMMITTED";
            setTimeout(() => { wrap.style.display = 'none'; document.getElementById('admin-panel').style.display='none'; }, 1000);
        }

        function play() {
            const ver = document.getElementById('v-sel').value;
            db.transaction("core").objectStore("core").get(ver).onsuccess = e => {
                if(!e.target.result) return alert("NO BINARY DETECTED. Use 2nd + DEL on the Calc to inject.");
                document.getElementById('app-frame').src = URL.createObjectURL(e.target.result);
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        function loadYT() {
            const val = document.getElementById('yt-url').value;
            let id = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.split('/').pop();
            document.getElementById('yt-player').src = "https://www.youtube.com/embed/" + id;
        }

        // CALC & SHORTCUTS
        function op(k) {
            if(k==='2nd') { 
                is2nd = !is2nd; 
                document.querySelector('.ti-btn-2nd').classList.toggle('brightness-150');
                return; 
            }
            // 2nd + DEL Shortcut for Injector
            if(is2nd && k==='DEL') { 
                document.getElementById('admin-panel').style.display = 'flex'; 
                is2nd = false; 
                return; 
            }
            // 2nd + ENTER Shortcut for OS Boot
            if(is2nd && k==='EXE') { 
                document.getElementById('cloak').style.display='none'; 
                document.getElementById('orange-core').style.display='grid'; 
                return; 
            }
            if(k==='DEL') inputStr = "0";
            document.getElementById('calc-display').innerText = inputStr;
        }

        function ins(v) { 
            inputStr = (inputStr === "0") ? v : inputStr + v; 
            document.getElementById('calc-display').innerText = inputStr; 
        }

        function nav(v) {
            ['launcher-view', 'yt-view', 'settings-view'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById(v+'-view').style.display = (v==='settings'?'block':'flex');
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('nav-active');
                if(l.innerText.toLowerCase().includes(v)) l.classList.add('nav-active');
            });
        }

        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }

        function toggleRain(on) {
            // Logic for visual pumpkin rain would go here
        }
    </script>
</body>
</html>
