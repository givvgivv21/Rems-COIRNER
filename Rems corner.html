<!DOCTYPE html>
<html lang="en" data-theme="dark" id="master-html">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V97.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #fb923c; --bg: #0c0a09; --card: #1e1e1e; --text: #fff; --sub: rgba(255,255,255,0.1); --nav-text: #777; --pane: #313335; }
        .light { --bg: #d1d5db; --card: #f3f4f6; --text: #111827; --sub: rgba(0,0,0,0.1); --nav-text: #4b5563; --pane: #e5e7eb; }

        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: 0.3s; }

        /* FRUIT RAIN */
        #rain-container { position: fixed; inset: 0; pointer-events: none; z-index: 9999; display: none; }
        .fruit { position: absolute; top: -50px; font-size: 24px; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* CALCULATOR CLOAK */
        #cloak { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ti-body { background: #fb923c; width: 440px; height: 750px; border-radius: 50px 50px 100px 100px; padding: 35px; border: 6px solid #ea580c; box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative; }
        .ti-btn { height: 48px; background: #27272a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; box-shadow: 0 5px 0 #000; color: #fff; cursor: pointer; position: relative; top: 0; transition: 0.05s; }
        .ti-btn:active { top: 4px; box-shadow: 0 1px 0 #000; }
        .ti-btn-2nd-active { background: #3b82f6 !important; box-shadow: 0 5px 0 #1d4ed8 !important; }
        .lcd { background: #94a392; height: 130px; border: 5px solid #000; border-radius: 15px; padding: 15px; color: #1a241a; font-family: monospace; font-weight: bold; overflow: hidden; text-align: right; font-size: 40px; display: flex; align-items: flex-end; justify-content: flex-end; }

        /* DISK GUI (INSIDE CALC) */
        #disk-gui { position: absolute; inset: 20px; background: #111; border-radius: 30px; z-index: 10001; border: 4px solid #000; display: none; flex-direction: column; padding: 25px; }

        /* OS CORE */
        #orange-core { display: none; height: 100vh; width: 100vw; grid-template-columns: 260px 1fr; padding: 20px; gap: 20px; }
        .view-pane { display: none; width: 100%; height: 100%; border-radius: 15px; overflow: hidden; background: var(--pane); border: 1px solid var(--sub); }
        .mc-layout { display: grid; grid-template-columns: 200px 1fr; height: 100%; }
        .mc-sidebar { background: rgba(0,0,0,0.1); border-right: 1px solid var(--sub); padding: 20px; }
        .play-bar { background: rgba(0,0,0,0.2); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; position: absolute; bottom: 0; width: calc(100% - 200px); }
        .play-btn { background: #3c8527; color: white; padding: 12px 60px; border-radius: 4px; font-weight: 900; font-size: 20px; border-bottom: 4px solid #235117; cursor: pointer; }
        .play-btn-disabled { background: #444 !important; border-bottom: 4px solid #222 !important; cursor: not-allowed; opacity: 0.5; }

        .nav-link { padding: 14px 20px; border-radius: 12px; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: var(--nav-text); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .nav-active { background: var(--p); color: #000 !important; }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .switch { position: relative; width: 40px; height: 20px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #777; border-radius: 20px; transition: 0.4s; }
        input:checked + .slider { background: #fb923c; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') panic()">

    <div id="rain-container"></div>

    <div id="cloak">
        <div class="ti-body">
            <div id="disk-gui">
                <h2 class="text-orange-500 font-black italic text-xl mb-4">DISK MANAGER</h2>
                <div class="space-y-4 flex-grow">
                    <div class="bg-white/5 p-4 rounded-xl">
                        <label class="text-[10px] font-bold text-orange-400 block mb-2 uppercase">Eagler 1.8.8</label>
                        <input type="file" onchange="saveDisk('mc8', this)" class="text-[10px] w-full file:bg-orange-600 file:text-white file:border-0 file:rounded file:px-2 file:mr-2">
                        <span id="disk-status-8" class="text-[9px] mt-1 block uppercase font-bold text-red-500">Empty</span>
                    </div>
                    <div class="bg-white/5 p-4 rounded-xl">
                        <label class="text-[10px] font-bold text-orange-400 block mb-2 uppercase">Eagler 1.12.2</label>
                        <input type="file" onchange="saveDisk('mc12', this)" class="text-[10px] w-full file:bg-orange-600 file:text-white file:border-0 file:rounded file:px-2 file:mr-2">
                        <span id="disk-status-12" class="text-[9px] mt-1 block uppercase font-bold text-red-500">Empty</span>
                    </div>
                </div>
                <button onclick="closeDisk()" class="w-full py-3 bg-white text-black font-black text-xs rounded-xl uppercase">Apply & Close</button>
            </div>

            <div id="calc-display" class="lcd">0</div>
            <div class="grid grid-cols-5 gap-3 mt-12">
                <div id="btn-2nd" class="ti-btn bg-blue-600" onclick="handleOp('2nd')">2nd</div>
                <div class="ti-btn" onclick="handleOp('DEL')">del</div>
                <div class="ti-btn" onclick="ins('(')">(</div><div class="ti-btn" onclick="ins(')')">)</div><div class="ti-btn" onclick="ins('/')">/</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('7')">7</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('8')">8</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('9')">9</div><div class="ti-btn" onclick="ins('*')">x</div><div class="ti-btn" onclick="ins('**')">^</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('4')">4</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('5')">5</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('6')">6</div><div class="ti-btn" onclick="ins('-')">-</div><div class="ti-btn" onclick="ins('.')">.</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('1')">1</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('2')">2</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('3')">3</div><div class="ti-btn" onclick="ins('+')">+</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('0')">0</div>
                <div class="ti-btn bg-black text-white col-span-5 !h-16 text-lg" onclick="handleOp('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="orange-core">
        <aside class="flex flex-col">
            <div class="mb-10 text-center text-orange-500 font-black italic text-2xl">ORANGE OS</div>
            <nav class="flex-grow">
                <div class="nav-link nav-active" id="nav-launcher" onclick="nav('launcher')">🍊 Launcher</div>
                <div class="nav-link" onclick="openApp('https://storage.googleapis.com/fernisbest/index.html')">🌐 Browser</div>
                <div class="nav-link" id="nav-yt" onclick="nav('yt')">📺 YouTube</div>
                <div class="nav-link" id="nav-brotato" onclick="nav('brotato')">🥔 Brotato</div>
                <div class="nav-link" id="nav-more" onclick="nav('more')">⭐ Find More</div>
                <div class="nav-link" id="nav-settings" onclick="nav('settings')">⚙️ Settings</div>
            </nav>
            <button onclick="panic()" class="py-4 bg-red-600 text-white font-black text-xs rounded-xl shadow-lg border-b-4 border-red-900 active:border-b-0 active:translate-y-1 transition-all uppercase">PANIC BUTTON</button>
        </aside>

        <main class="relative">
            <div id="launcher-view" class="view-pane" style="display:block;">
                <div class="mc-layout">
                    <div class="mc-sidebar"><div class="text-[10px] font-black opacity-30 uppercase">Local Kernel</div></div>
                    <div class="p-10 relative">
                        <h2 class="text-3xl font-black mb-1">Minecraft: Eagler Offline</h2>
                        <div class="grid grid-cols-2 gap-4 max-w-lg mt-8 mb-10">
                            <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-')" class="bg-black/10 p-5 rounded-lg border border-white/5 text-left hover:border-orange-500/50 group">
                                <span class="block text-orange-500 font-black text-[10px] mb-1 italic">RESOURCE</span>
                                <span class="text-sm font-bold group-hover:text-orange-400">📦 Tuff Client</span>
                            </button>
                            <button onclick="window.open('https://modrinth.com/resourcepack/low-fire-txf')" class="bg-black/10 p-5 rounded-lg border border-white/5 text-left hover:border-orange-500/50 group">
                                <span class="block text-orange-500 font-black text-[10px] mb-1 italic">RESOURCE</span>
                                <span class="text-sm font-bold group-hover:text-orange-400">🔥 Low Fire</span>
                            </button>
                        </div>
                        <div class="play-bar">
                            <div>
                                <select id="v-sel" onchange="checkStatus()" class="bg-black/40 p-2 rounded text-xs border border-white/10 outline-none">
                                    <option value="mc8">Eaglercraft 1.8.8</option>
                                    <option value="mc12">Eaglercraft 1.12.2</option>
                                </select>
                                <div id="status-text" class="text-[9px] font-black mt-2 uppercase">Searching Disk...</div>
                            </div>
                            <button id="play-btn" onclick="playGame()" class="play-btn play-btn-disabled">PLAY</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="yt-view" class="view-pane p-10"><iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" class="w-full h-full rounded-xl" allowfullscreen></iframe></div>
            <div id="brotato-view" class="view-pane flex items-center justify-center"><button onclick="openApp('https://brotato.io/')" class="px-12 py-5 bg-orange-500 text-black rounded-full font-black uppercase shadow-xl hover:scale-105 transition-transform">Launch Brotato</button></div>
            <div id="more-view" class="view-pane flex flex-col items-center justify-center p-20 text-center">
                <h2 class="text-4xl font-black text-orange-500 mb-4 tracking-tighter uppercase italic">Find More</h2>
                <button onclick="openApp('https://github.com/givvgivv21/Rems-COIRNER/tree/main')" class="bg-orange-500 text-black px-12 py-4 rounded-full font-black uppercase hover:shadow-2xl transition-all">Go To Website</button>
            </div>

            <div id="settings-view" class="view-pane p-10">
                <h2 class="text-2xl font-black mb-10 uppercase italic text-orange-500">Settings</h2>
                <div class="max-w-md space-y-4">
                    <div class="bg-black/10 p-6 rounded-xl border border-white/5 flex items-center justify-between"><span class="font-bold">Dark Mode</span><label class="switch"><input type="checkbox" checked onchange="setTheme(this.checked)"><span class="slider"></span></label></div>
                    <div class="bg-black/10 p-6 rounded-xl border border-white/5 flex items-center justify-between"><span class="font-bold">Fruit Rain 🍓</span><label class="switch"><input type="checkbox" onchange="setRain(this.checked)"><span class="slider"></span></label></div>
                    <div class="bg-black/10 p-6 rounded-xl border border-white/5 flex items-center justify-between"><span class="font-bold">Iframe Bypass</span><label class="switch"><input type="checkbox" onchange="setBypass(this.checked)"><span class="slider"></span></label></div>
                    <button onclick="localStorage.clear(); location.reload();" class="w-full p-4 bg-red-600/20 text-red-500 rounded-xl font-bold border border-red-500/20 uppercase text-xs">Wipe Kernel</button>
                </div>
            </div>
        </main>
    </div>

    <div id="app-overlay">
        <div class="bg-orange-600 p-2 flex justify-end px-4"><button onclick="closeApp()" class="bg-black text-white px-4 py-1 rounded-full text-[10px] font-black uppercase">Close</button></div>
        <iframe id="app-frame" class="w-full h-full bg-black"></iframe>
    </div>

    <script>
        let currentInput = "", is2nd = false, rainInterval = null;

        function ins(v) { currentInput += v; document.getElementById('calc-display').innerText = currentInput; }
        
        function handleOp(op) {
            const btn2nd = document.getElementById('btn-2nd');
            if(op === '2nd') { is2nd = !is2nd; btn2nd.classList.toggle('ti-btn-2nd-active', is2nd); return; }
            if(is2nd && op === 'DEL') { document.getElementById('disk-gui').style.display = 'flex'; updateDiskStatus(); return; }
            if(is2nd && op === 'EXE') { document.getElementById('cloak').style.display = 'none'; document.getElementById('orange-core').style.display = 'grid'; checkStatus(); return; }
            if(op === 'DEL') currentInput = "";
            if(op === 'EXE') { try { currentInput = eval(currentInput).toString(); } catch { currentInput = "ERR"; } }
            document.getElementById('calc-display').innerText = currentInput || "0";
        }

        function saveDisk(key, input) {
            const reader = new FileReader();
            reader.onload = e => { localStorage.setItem(key, e.target.result); updateDiskStatus(); };
            reader.readAsText(input.files[0]);
        }

        function updateDiskStatus() {
            ['8', '12'].forEach(v => {
                const s = document.getElementById('disk-status-'+v);
                if(localStorage.getItem('mc'+v)) { s.innerText = "System Injected"; s.style.color = "#22c55e"; }
            });
        }

        function closeDisk() { document.getElementById('disk-gui').style.display = 'none'; is2nd = false; document.getElementById('btn-2nd').classList.remove('ti-btn-2nd-active'); }

        function checkStatus() {
            const v = document.getElementById('v-sel').value;
            const data = localStorage.getItem(v);
            const btn = document.getElementById('play-btn');
            const txt = document.getElementById('status-text');
            if(data) { btn.classList.remove('play-btn-disabled'); txt.innerText = "Game Ready"; txt.style.color = "#22c55e"; }
            else { btn.classList.add('play-btn-disabled'); txt.innerText = "No File Found"; txt.style.color = "#ef4444"; }
        }

        function playGame() {
            const v = document.getElementById('v-sel').value;
            const data = localStorage.getItem(v);
            if(data) {
                document.getElementById('app-overlay').style.display = 'flex';
                document.getElementById('app-frame').srcdoc = data;
            }
        }

        function nav(v) {
            document.querySelectorAll('.view-pane').forEach(p => p.style.display = 'none');
            document.getElementById(v + '-view').style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
            document.getElementById('nav-' + v).classList.add('nav-active');
            if(v === 'launcher') checkStatus();
        }

        function openApp(url) { document.getElementById('app-frame').srcdoc = ''; document.getElementById('app-frame').src = url; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; document.getElementById('app-frame').srcdoc=''; }
        function panic() { closeApp(); document.getElementById('orange-core').style.display='none'; document.getElementById('cloak').style.display='flex'; }
        
        function setTheme(dark) { if(dark) document.getElementById('master-html').classList.remove('light'); else document.getElementById('master-html').classList.add('light'); }
        function setBypass(on) { const f = document.getElementById('app-frame'); if(on) f.removeAttribute('sandbox'); else f.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms'); }
        function setRain(on) {
            const c = document.getElementById('rain-container');
            if(on) { c.style.display = 'block'; rainInterval = setInterval(() => {
                const f = document.createElement('div'); f.className = 'fruit'; f.innerText = '🍊';
                f.style.left = Math.random() * 100 + 'vw'; f.style.animationDuration = (Math.random()*3 + 2) + 's';
                c.appendChild(f); setTimeout(() => f.remove(), 5000);
            }, 150); } else { c.style.display = 'none'; clearInterval(rainInterval); }
        }
    </script>
</body>
</html>
