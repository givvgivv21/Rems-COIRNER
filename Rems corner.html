<!DOCTYPE html>
<html lang="en" id="master-html">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V100.0 FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #fb923c; --bg: #0c0a09; --text: #fff; --pane: #1c1917; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; font-family: sans-serif; }

        /* CALCULATOR CLOAK */
        #cloak { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .ti-body { background: #fb923c; width: 420px; height: 720px; border-radius: 40px; padding: 30px; border: 5px solid #ea580c; position: relative; }
        .lcd { background: #94a392; height: 120px; border: 4px solid #000; border-radius: 10px; padding: 15px; color: #1a241a; font-family: monospace; font-size: 35px; text-align: right; display: flex; align-items: flex-end; justify-content: flex-end; }
        .ti-btn { height: 45px; background: #27272a; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; cursor: pointer; box-shadow: 0 4px 0 #000; }
        .ti-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .btn-2nd-on { background: #3b82f6 !important; }

        /* INJECTOR GUI */
        #disk-gui { position: absolute; inset: 20px; background: #111; border-radius: 25px; z-index: 10001; border: 3px solid #fb923c; display: none; flex-direction: column; padding: 20px; }

        /* OS LAYOUT */
        #orange-core { display: none; height: 100vh; width: 100vw; grid-template-columns: 240px 1fr; }
        aside { background: #0c0a09; padding: 20px; border-right: 1px solid #292524; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 8px; cursor: pointer; font-weight: bold; color: #a8a29e; }
        .nav-item:hover { background: #292524; color: #fff; }
        .nav-active { background: #fb923c !important; color: #000 !important; }
        
        .view-pane { display: none; width: 100%; height: 100%; background: var(--pane); }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* PLAY BAR */
        .play-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-play { background: #22c55e; color: white; padding: 10px 40px; border-radius: 5px; font-weight: 900; }
        .btn-disabled { background: #444; opacity: 0.5; cursor: not-allowed; }
        
        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 11000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') panic()">

    <div id="cloak">
        <div class="ti-body">
            <div id="disk-gui">
                <h2 class="text-orange-500 font-black mb-4 uppercase">System Injector</h2>
                <div class="space-y-4 flex-grow">
                    <div class="bg-stone-900 p-3 rounded-lg">
                        <label class="text-[10px] text-stone-400 font-bold block mb-1">Eaglercraft 1.8.8</label>
                        <input type="file" onchange="injectFile('mc8', this)" class="text-[10px] w-full text-white">
                        <div id="status-mc8" class="text-[10px] font-bold text-red-500 mt-1">EMPTY</div>
                    </div>
                    <div class="bg-stone-900 p-3 rounded-lg">
                        <label class="text-[10px] text-stone-400 font-bold block mb-1">Eaglercraft 1.12.2</label>
                        <input type="file" onchange="injectFile('mc12', this)" class="text-[10px] w-full text-white">
                        <div id="status-mc12" class="text-[10px] font-bold text-red-500 mt-1">EMPTY</div>
                    </div>
                </div>
                <button onclick="toggleDisk(false)" class="bg-white text-black font-black p-3 rounded-lg text-xs mt-4">CLOSE & SAVE</button>
            </div>

            <div id="display" class="lcd">0</div>
            <div class="grid grid-cols-5 gap-2 mt-8">
                <div id="btn-2nd" class="ti-btn bg-blue-600" onclick="op('2nd')">2nd</div>
                <div class="ti-btn" onclick="op('DEL')">del</div>
                <div class="ti-btn" onclick="add('(')">(</div><div class="ti-btn" onclick="add(')')">)</div><div class="ti-btn" onclick="add('/')">/</div>
                <div class="ti-btn !bg-stone-200 !text-black" onclick="add('7')">7</div><div class="ti-btn !bg-stone-200 !text-black" onclick="add('8')">8</div><div class="ti-btn !bg-stone-200 !text-black" onclick="add('9')">9</div><div class="ti-btn" onclick="add('*')">x</div><div class="ti-btn" onclick="add('**')">^</div>
                <div class="ti-btn !bg-stone-200 !text-black" onclick="add('4')">4</div><div class="ti-btn !bg-stone-200 !text-black" onclick="add('5')">5</div><div class="ti-btn !bg-stone-200 !text-black" onclick="add('6')">6</div><div class="ti-btn" onclick="add('-')">-</div><div class="ti-btn" onclick="add('.')">.</div>
                <div class="ti-btn !bg-stone-200 !text-black" onclick="add('1')">1</div><div class="ti-btn !bg-stone-200 !text-black" onclick="add('2')">2</div><div class="ti-btn !bg-stone-200 !text-black" onclick="add('3')">3</div><div class="ti-btn" onclick="add('+')">+</div><div class="ti-btn !bg-stone-200 !text-black" onclick="add('0')">0</div>
                <div class="ti-btn bg-black text-white col-span-5 !h-16" onclick="op('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="orange-core">
        <aside>
            <div class="text-orange-500 font-black text-xl mb-8 italic">ORANGE OS</div>
            <div class="flex-grow">
                <div class="nav-item nav-active" id="n-launcher" onclick="nav('launcher')">Launcher</div>
                <div class="nav-item" id="n-browser" onclick="nav('browser')">Browser</div>
                <div class="nav-item" id="n-yt" onclick="nav('yt')">YouTube</div>
                <div class="nav-item" id="n-brotato" onclick="nav('brotato')">Brotato</div>
                <div class="nav-item" id="n-more" onclick="nav('more')">More</div>
            </div>
            <button onclick="panic()" class="w-full py-4 bg-red-600 text-white font-black rounded-xl border-b-4 border-red-900 active:border-0 uppercase text-xs">Panic Button</button>
        </aside>

        <main class="relative">
            <div id="v-launcher" class="view-pane" style="display:block;">
                <div class="p-10">
                    <h1 class="text-4xl font-black mb-4">Minecraft Eagler</h1>
                    <p class="text-stone-400 mb-8">Select your injected version and hit Play.</p>
                    <div class="play-bar">
                        <select id="ver-select" onchange="syncLauncher()" class="bg-stone-800 p-2 rounded outline-none">
                            <option value="mc8">1.8.8 Offline</option>
                            <option value="mc12">1.12.2 Offline</option>
                        </select>
                        <button id="p-btn" onclick="launchGame()" class="btn-play btn-disabled">PLAY</button>
                    </div>
                </div>
            </div>

            <div id="v-browser" class="view-pane"><iframe src="https://storage.googleapis.com/fernisbest/index.html"></iframe></div>
            <div id="v-yt" class="view-pane"><iframe src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe></div>
            <div id="v-brotato" class="view-pane"><iframe src="https://brotato.io/"></iframe></div>
            <div id="v-more" class="view-pane"><iframe src="https://github.com/givvgivv21/Rems-COIRNER/tree/main"></iframe></div>
        </main>
    </div>

    <div id="app-overlay">
        <div class="bg-orange-500 p-1 flex justify-end"><button onclick="closeGame()" class="bg-black text-white px-3 py-1 text-[10px] font-bold">CLOSE GAME</button></div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        let input = "", is2nd = false;

        function add(v) { input += v; document.getElementById('display').innerText = input; }
        
        function op(o) {
            if(o === '2nd') { is2nd = !is2nd; document.getElementById('btn-2nd').classList.toggle('btn-2nd-on', is2nd); return; }
            if(is2nd && o === 'DEL') { toggleDisk(true); return; }
            if(is2nd && o === 'EXE') { document.getElementById('cloak').style.display = 'none'; document.getElementById('orange-core').style.display = 'grid'; syncLauncher(); return; }
            if(o === 'DEL') input = "";
            if(o === 'EXE') { try { input = eval(input).toString(); } catch { input = "ERR"; } }
            document.getElementById('display').innerText = input || "0";
        }

        function toggleDisk(show) { 
            document.getElementById('disk-gui').style.display = show ? 'flex' : 'none'; 
            is2nd = false; 
            document.getElementById('btn-2nd').classList.remove('btn-2nd-on');
            updateUI(); 
        }

        function injectFile(key, el) {
            const file = el.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                localStorage.setItem(key, e.target.result);
                updateUI();
            };
            reader.readAsText(file);
        }

        function updateUI() {
            ['mc8', 'mc12'].forEach(k => {
                const s = document.getElementById('status-' + k);
                if(localStorage.getItem(k)) { s.innerText = "INJECTED"; s.style.color = "#22c55e"; }
                else { s.innerText = "EMPTY"; s.style.color = "#ef4444"; }
            });
        }

        function syncLauncher() {
            const val = document.getElementById('ver-select').value;
            const btn = document.getElementById('p-btn');
            if(localStorage.getItem(val)) btn.classList.remove('btn-disabled');
            else btn.classList.add('btn-disabled');
        }

        function launchGame() {
            const val = document.getElementById('ver-select').value;
            const data = localStorage.getItem(val);
            if(!data) return;
            document.getElementById('app-overlay').style.display = 'flex';
            document.getElementById('game-frame').srcdoc = data;
        }

        function closeGame() {
            document.getElementById('app-overlay').style.display = 'none';
            document.getElementById('game-frame').srcdoc = '';
        }

        function nav(v) {
            document.querySelectorAll('.view-pane').forEach(p => p.style.display = 'none');
            document.getElementById('v-' + v).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            document.getElementById('n-' + v).classList.add('nav-active');
            if(v === 'launcher') syncLauncher();
        }

        function panic() {
            closeGame();
            document.getElementById('orange-core').style.display = 'none';
            document.getElementById('cloak').style.display = 'flex';
        }

        // Initial check
        updateUI();
    </script>
</body>
</html>
