<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V68.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #fb923c; --bg: #050505; --txt: #ffffff; --card: #111; }
        .light-mode { --bg: #f3f4f6; --txt: #111827; --card: #ffffff; }
        
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; transition: transform 0.1s; }
        body { background: var(--bg); color: var(--txt); overflow: hidden; height: 100vh; }
        
        /* --- CALC UI --- */
        #boot-gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .ti-chassis { background: #333; width: 340px; height: 580px; border-radius: 35px 35px 110px 110px; border: 6px solid #111; padding: 20px; display: flex; flex-direction: column; }
        .ti-lcd { background: #94a392; height: 100px; border: 8px solid #111; border-radius: 4px; color: #1a241a; padding: 10px; }
        .key-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .k { height: 32px; background: #444; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 900; cursor: pointer; color: #fff; box-shadow: 0 4px 0 #1a1a1a; }
        .k:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        .k-2nd { background: #2563eb !important; box-shadow: 0 4px 0 #1e3a8a !important; }
        .k-num { background: #e5e7eb !important; color: #000 !important; font-size: 0.9rem; box-shadow: 0 4px 0 #9ca3af !important; }

        /* --- SQUARE DESKTOP --- */
        #orange-desktop { display: none; height: 100vh; width: 100vw; grid-template-columns: 240px 1fr; background: var(--bg); }
        .sidebar { background: var(--card); border-right: 2px solid var(--p); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-link { padding: 14px; border-radius: 4px; font-size: 0.8rem; font-weight: 900; cursor: pointer; color: #666; border: 1px solid transparent; }
        .nav-link:hover { color: var(--p); }
        .nav-active { border-color: var(--p); color: var(--p) !important; background: rgba(251, 146, 60, 0.05); }

        /* --- CONTENT --- */
        .view-pane { width: 100%; height: 100%; display: none; background: var(--bg); position: relative; }
        #os-frame { width: 100%; height: 100%; border: none; display: none; background: #000; }
        
        /* INJECTION PROGRESS */
        .prog-shell { height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin: 20px 0; border: 1px solid #333; position: relative; }
        #prog-fill { height: 100%; background: linear-gradient(90deg, #fb923c, #f97316); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--p); }

        /* ANIMATED BUTTONS */
        .btn-push { background: var(--p); color: white; padding: 12px 24px; border-radius: 6px; font-weight: 900; border-bottom: 4px solid #7c2d12; }
        .btn-push:active { transform: translateY(2px); border-bottom-width: 1px; }

        /* MC LAUNCHER FOOTER */
        .mc-footer { height: 120px; background: #000; border-top: 3px solid var(--p); display: flex; align-items: center; padding: 0 30px; gap: 15px; }

        /* INJECTOR */
        #inj-modal { position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; }
        .inj-box { background: #0a0a0a; padding: 40px; border: 2px solid var(--p); width: 450px; border-radius: 12px; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') panic()">

    <div id="boot-gate">
        <div class="ti-chassis">
            <div class="ti-lcd">
                <div id="ti-stat" style="font-size: 0.5rem; opacity: 0.5;">RAM CLEAR</div>
                <div id="ti-display" class="text-3xl text-right mt-4 font-mono">0</div>
            </div>
            <div class="key-grid">
                <div class="k k-2nd" onclick="cAct('2nd')">2nd</div><div class="k">mode</div><div class="k" onclick="cAct('del')">del</div><div class="k">stat</div><div class="k">prgm</div>
                <div class="k k-num" onclick="cNum('7')">7</div><div class="k k-num" onclick="cNum('8')">8</div><div class="k k-num" onclick="cNum('9')">9</div><div class="k" onclick="cNum('/')">÷</div><div class="k">sin</div>
                <div class="k k-num" onclick="cNum('4')">4</div><div class="k k-num" onclick="cNum('5')">5</div><div class="k k-num" onclick="cNum('6')">6</div><div class="k" onclick="cNum('*')">×</div><div class="k">cos</div>
                <div class="k k-num" onclick="cNum('1')">1</div><div class="k k-num" onclick="cNum('2')">2</div><div class="k k-num" onclick="cNum('3')">3</div><div class="k" onclick="cNum('-')">-</div><div class="k">tan</div>
                <div class="k k-num" onclick="cNum('0')">0</div><div class="k">.</div><div class="k">(-)</div><div class="k" onclick="cNum('+')">+</div><div class="k bg-black text-white" onclick="cAct('ent')">enter</div>
            </div>
        </div>
    </div>

    <div id="orange-desktop">
        <aside class="sidebar">
            <h1 class="text-xl font-black text-orange-500 mb-4 italic">ORANGE OS V68</h1>
            <div class="nav-link nav-active" onclick="nav('launcher')">🎮 LAUNCHER</div>
            <div class="nav-link" onclick="nav('youtube')">🎬 YOUTUBE</div>
            <div class="nav-link" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')">🌐 BROWSER</div>
            <div class="nav-link" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')">🔥 FIND MORE</div>
            <div class="nav-link" onclick="nav('settings')">⚙️ SETTINGS</div>
            <button onclick="panic()" class="mt-auto bg-red-600 p-3 rounded font-black text-[10px] text-white btn-push">PANIC SHUTDOWN</button>
        </aside>

        <main class="relative overflow-hidden">
            <iframe id="os-frame"></iframe>

            <div id="v-launcher" class="view-pane flex flex-col items-center justify-center" style="display: flex;">
                <div class="w-full h-full relative flex flex-col">
                    <div class="flex-grow bg-zinc-900 flex items-center justify-center">
                        <img src="https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg" class="absolute inset-0 w-full h-full object-cover opacity-40">
                        <div class="z-10 text-center">
                            <h2 class="text-6xl font-black italic">Minecraft</h2>
                            <p id="k-status" class="text-xs font-bold text-red-500 uppercase tracking-widest mt-2">Kernel Offline</p>
                        </div>
                    </div>
                    <div class="mc-footer">
                        <select id="v-sel" class="bg-zinc-800 p-4 rounded font-bold text-orange-500 outline-none border border-zinc-700">
                            <option value="18">Eaglercraft 1.8.8</option>
                            <option value="112">Eaglercraft 1.12.2</option>
                        </select>
                        <button onclick="bootApp('mc')" class="bg-green-600 px-12 py-4 rounded font-black text-xl btn-push">PLAY</button>
                        <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" class="bg-zinc-800 px-6 py-4 rounded font-black text-xs btn-push">TPACKS</button>
                    </div>
                </div>
            </div>

            <div id="v-youtube" class="view-pane p-10">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="yt-url" class="bg-zinc-800 flex-grow p-4 rounded outline-none font-bold text-white border border-zinc-700" placeholder="Paste Link">
                    <button onclick="document.getElementById('yt-url').value=''" class="bg-zinc-700 px-4 rounded font-bold text-xs uppercase">Clear</button>
                    <button onclick="bootApp('yt')" class="bg-orange-600 px-10 rounded font-black btn-push">LOAD</button>
                </div>
                <div id="yt-area" class="w-full aspect-video bg-black rounded-lg border-2 border-zinc-800 overflow-hidden shadow-2xl"></div>
            </div>

            <div id="v-settings" class="view-pane p-10 space-y-6">
                <h2 class="text-2xl font-black text-orange-500 uppercase">Settings</h2>
                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-zinc-900 p-6 rounded border border-zinc-800 flex justify-between items-center">
                        <span>iFrame Window Mode</span>
                        <input type="checkbox" id="iframe-toggle" checked class="w-6 h-6 accent-orange-500">
                    </div>
                    <button onclick="wipe()" class="bg-red-600 p-4 rounded font-black uppercase text-xs btn-push">Wipe All Injection Blobs</button>
                </div>
            </div>
        </main>
    </div>

    <div id="inj-modal">
        <div class="inj-box">
            <h2 class="font-black text-orange-500 mb-2 uppercase text-xl">Injection Console</h2>
            <div class="space-y-4">
                <div>
                    <span class="text-[10px] text-zinc-500 font-bold uppercase">v1.8.8 Source</span>
                    <input type="file" id="f1" class="text-xs w-full bg-zinc-900 p-2 border border-zinc-800 rounded">
                </div>
                <div>
                    <span class="text-[10px] text-zinc-500 font-bold uppercase">v1.12.2 Source</span>
                    <input type="file" id="f2" class="text-xs w-full bg-zinc-900 p-2 border border-zinc-800 rounded">
                </div>
            </div>
            
            <div class="prog-shell"><div id="prog-fill"></div></div>
            
            <div class="flex gap-2">
                <button onclick="runInject()" class="flex-grow bg-orange-600 p-4 rounded font-black btn-push">START INJECTION</button>
                <button onclick="document.getElementById('inj-modal').style.display='none'" class="px-6 bg-zinc-800 rounded font-bold text-xs uppercase">Exit</button>
            </div>
        </div>
    </div>

    <script>
        let db, expr = "", is2nd = false;

        const req = indexedDB.open("ORANGE_V68", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("blobs");
        req.onsuccess = e => { db = e.target.result; check(); };

        function check() {
            db.transaction("blobs").objectStore("blobs").count().onsuccess = e => {
                const s = document.getElementById('k-status');
                s.innerText = e.target.result > 0 ? "KERNEL ACTIVE ("+e.target.result+")" : "KERNEL OFFLINE";
                s.style.color = e.target.result > 0 ? "#22c55e" : "#ef4444";
            }
        }

        function cNum(v) { expr += v; document.getElementById('ti-display').innerText = expr; }
        function cAct(a) {
            if(a==='2nd') { is2nd = !is2nd; document.getElementById('ti-stat').innerText = is2nd ? "2nd ACTIVE" : "RAM CLEAR"; return; }
            if(is2nd && a==='ent') { document.getElementById('boot-gate').style.display='none'; document.getElementById('orange-desktop').style.display='grid'; return; }
            if(is2nd && a==='del') { document.getElementById('inj-modal').style.display='flex'; return; }
            if(a==='ent') { try { let r = eval(expr); document.getElementById('ti-display').innerText = r; expr = r.toString(); } catch { expr = ""; } }
            if(a==='del') { expr = ""; document.getElementById('ti-display').innerText = "0"; }
        }

        async function runInject() {
            const f1 = document.getElementById('f1').files[0];
            const f2 = document.getElementById('f2').files[0];
            const fill = document.getElementById('prog-fill');
            fill.style.width = "5%";
            
            const storeData = async (file, key, progress) => {
                return new Promise(async (resolve) => {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const tx = db.transaction("blobs", "readwrite");
                        tx.objectStore("blobs").put(new Blob([e.target.result], {type:'text/html'}), key);
                        tx.oncomplete = () => { fill.style.width = progress + "%"; resolve(); };
                    };
                    reader.readAsArrayBuffer(file);
                });
            };

            if(f1) await storeData(f1, "18", 50);
            if(f2) await storeData(f2, "112", 100);
            
            if(fill.style.width !== "100%") fill.style.width = "100%";
            
            setTimeout(() => {
                alert("INJECTION COMPLETE");
                document.getElementById('inj-modal').style.display='none';
                check();
            }, 500);
        }

        function bootApp(type) {
            const useIframe = document.getElementById('iframe-toggle').checked;
            if (type === 'mc') {
                const v = document.getElementById('v-sel').value;
                db.transaction("blobs").objectStore("blobs").get(v).onsuccess = e => {
                    if (e.target.result) {
                        const url = URL.createObjectURL(e.target.result);
                        if (useIframe) {
                            const f = document.getElementById('os-frame');
                            f.src = url; f.style.display = 'block';
                            ['v-launcher','v-youtube','v-settings'].forEach(id => document.getElementById(id).style.display='none');
                        } else { window.open(url, '_blank'); }
                    } else alert("Inject version " + v + " first.");
                };
            } else if (type === 'yt') {
                let val = document.getElementById('yt-url').value;
                let id = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.split('/').pop();
                let url = `https://www.youtube-nocookie.com/embed/${id}`;
                if (useIframe) {
                    document.getElementById('yt-area').innerHTML = `<iframe width="100%" height="100%" src="${url}" frameborder="0" allowfullscreen></iframe>`;
                } else { window.open(url, '_blank'); }
            }
        }

        function nav(t) {
            ['v-launcher','v-youtube','v-settings','os-frame'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('v-'+t).style.display = (t==='launcher'?'flex':'block');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('nav-active'));
            event.currentTarget.classList.add('nav-active');
        }

        function panic() { location.reload(); }
        function wipe() { if(confirm("Clear Kernel?")) { db.transaction("blobs","readwrite").objectStore("blobs").clear(); location.reload(); }}
    </script>
</body>
</html>
