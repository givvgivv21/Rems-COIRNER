<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V50.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ++++++++++++++++++++++++++++++++++++++++++++++
        +                                            +
        +         ORANGE OS MADE BY REMONE           +
        +                                            +
        ++++++++++++++++++++++++++++++++++++++++++++++
        */

        :root { --p: #f97316; --bg: #000; --fruit: '🍊'; --ti-body: #374151; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* --- TI-84 PLUS REPLICA --- */
        #calc-cloak { 
            position: fixed; inset: 0; z-index: 10000; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .ti-84-body {
            background: var(--ti-body); width: 440px; height: 860px;
            border-radius: 40px 40px 160px 160px; border: 4px solid #111;
            padding: 30px; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
        }
        .bezel { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .lcd { background: #94a392; height: 180px; position: relative; color: #2d3e2d; padding: 10px; font-family: monospace; }
        
        /* KEYPAD */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .k { height: 42px; background: #4b5563; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 900; cursor: pointer; box-shadow: 0 3px 0 #000; color: #fff; position: relative; }
        .k:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        .k-2nd { background: #2563eb !important; } 
        .k-alpha { background: #16a34a !important; }
        .k-num { background: #e5e7eb !important; color: #000 !important; font-size: 1.1rem; }
        .k::before { content: attr(data-lbl); position: absolute; top: -14px; font-size: 0.55rem; font-weight: 900; width: 100%; text-align: center; }
        .lbl-blue::before { color: #3b82f6; }

        /* --- ORANGE OS --- */
        #os-root { display: none; height: 100vh; width: 100vw; grid-template-columns: 320px 1fr; }
        .sidebar { background: #070707; border-right: 3px solid var(--p); padding: 60px 30px; display: flex; flex-direction: column; gap: 12px; }
        .nav-item { border: 2px solid var(--p); padding: 18px; border-radius: 20px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; }
        .nav-item:hover { background: var(--p); color: #000; }

        /* FRUIT PHYSICS */
        #rain-layer { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
        .fruit-part { position: absolute; font-size: 2.5rem; pointer-events: auto; animation: drop linear forwards; cursor: pointer; }
        @keyframes drop { 0% { transform: translateY(-100px); } 100% { transform: translateY(110vh); } }

        /* VIEWER */
        #os-view { width: 98%; height: 95%; border: 3px solid var(--p); border-radius: 16px; display: none; background: #000; }

        /* INJECTOR MODAL */
        .modal { position: fixed; inset: 0; z-index: 20000; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="rain-layer"></div>

    <div id="calc-cloak">
        <div class="ti-84-body">
            <div class="bezel"><div class="lcd"><div id="l1">RAM CLEARED</div><div id="lm" class="text-4xl text-right mt-10">0</div></div></div>
            <div class="keypad">
                <div class="k k-2nd lbl-blue" data-lbl="QUIT" onclick="act('2nd')">2nd</div><div class="k">mode</div><div class="k" onclick="act('del')">del</div><div class="k"></div><div class="k"></div>
                <div class="k k-alpha" data-lbl="LOCK">alpha</div><div class="k">XTθn</div><div class="k">stat</div><div class="k">^</div><div class="k">clear</div>
                <div class="k k-num" onclick="num('7')">7</div><div class="k k-num" onclick="num('8')">8</div><div class="k k-num" onclick="num('9')">9</div><div class="k">÷</div><div class="k"></div>
                <div class="k k-num" onclick="num('4')">4</div><div class="k k-num" onclick="num('5')">5</div><div class="k k-num" onclick="num('6')">6</div><div class="k">×</div><div class="k"></div>
                <div class="k k-num" onclick="num('1')">1</div><div class="k k-num" onclick="num('2')">2</div><div class="k k-num" onclick="num('3')">3</div><div class="k">-</div><div class="k"></div>
                <div class="k k-num" onclick="num('0')">0</div><div class="k">.</div><div class="k">(-)</div><div class="k">+</div><div class="k bg-black text-white" onclick="act('ent')">enter</div>
            </div>
        </div>
    </div>

    <div id="injector" class="modal">
        <div class="bg-zinc-900 p-10 rounded-[40px] border-4 border-orange-500 w-[500px]">
            <h2 class="text-orange-500 font-black text-2xl mb-6">BLOB INJECTOR</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] block mb-1">EAGLERCRAFT 1.8.8 BLOB</label>
                    <input type="file" id="blob-18" class="text-xs bg-black p-2 w-full">
                </div>
                <div>
                    <label class="text-[10px] block mb-1">EAGLERCRAFT 1.12.2 BLOB</label>
                    <input type="file" id="blob-112" class="text-xs bg-black p-2 w-full">
                </div>
                <button onclick="saveBlobs()" class="w-full bg-orange-600 p-4 font-black rounded-xl">INJECT INTO KERNEL</button>
            </div>
            <button onclick="closeInj()" class="mt-4 text-[10px] w-full text-zinc-600">CLOSE</button>
        </div>
    </div>

    <div id="os-root">
        <aside class="sidebar">
            <h1 class="text-4xl font-black italic text-orange-600">ORANGE OS</h1>
            <div class="nav-item mt-10" onclick="page('launcher')">LAUNCHER ⛏️</div>
            <div class="nav-item" onclick="run('https://github.com/givvgivv21/Rems-COIRNER')">FIND MORE 🔥</div>
            <div class="nav-item" onclick="run('https://storage.googleapis.com/fernisbest/index.html')">BROWSER 🌐</div>
            <div class="nav-item" onclick="page('settings')">SETTINGS ⚙️</div>
            <div class="mt-auto nav-item border-zinc-900" onclick="location.reload()">REBOOT ❌</div>
        </aside>

        <main class="flex-grow flex items-center justify-center relative">
            <iframe id="os-view"></iframe>

            <div id="v-launcher" class="hidden w-[800px] h-[500px] bg-zinc-800 rounded-3xl overflow-hidden flex border border-zinc-700">
                <div class="w-40 bg-zinc-900 p-6 font-bold text-zinc-500">Blobs</div>
                <div class="flex-grow flex flex-col items-center justify-center bg-black/50">
                    <select id="ver" class="bg-zinc-700 p-4 font-black mb-4"><option value="18">Eagler 1.8.8</option><option value="112">Eagler 1.12.2</option></select>
                    <button onclick="launchBlob()" class="bg-orange-600 px-10 py-4 font-black rounded-xl">START INJECTED SESSION</button>
                </div>
            </div>

            <div id="v-settings" class="hidden bg-zinc-900 p-12 rounded-[50px] border-4 border-orange-500 w-[500px]">
                <div class="grid grid-cols-4 gap-4 mb-8" id="colors"></div>
                <div class="flex justify-between items-center bg-black p-4 rounded-2xl">
                    <span>FRUIT RAIN</span>
                    <input type="checkbox" id="rain-chk" onchange="doRain(this.checked)" class="w-8 h-8 accent-orange-500">
                </div>
            </div>
        </main>
    </div>

    <script>
        let db, is2nd = false, buffer = "";

        // DB INIT
        const req = indexedDB.open("ORANGE_BLOBS", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("blobs");
        req.onsuccess = e => { db = e.target.result; };

        // CALC
        function num(n) { buffer += n; document.getElementById('lm').innerText = buffer; }
        function act(k) {
            if(k==='2nd') { is2nd=!is2nd; document.getElementById('l1').innerText = is2nd?"2nd ACTIVE":"RAM CLEARED"; return; }
            if(is2nd && k==='del') { document.getElementById('injector').style.display='flex'; is2nd=false; return; }
            if(is2nd && k==='ent') { document.getElementById('calc-cloak').style.display='none'; document.getElementById('os-root').style.display='grid'; return; }
            if(k==='ent') { buffer=""; document.getElementById('lm').innerText="0"; }
        }

        // BLOB LOGIC
        async function saveBlobs() {
            const f18 = document.getElementById('blob-18').files[0];
            const f112 = document.getElementById('blob-112').files[0];
            const tx = db.transaction("blobs", "readwrite");
            if(f18) tx.objectStore("blobs").put(new Blob([await f18.arrayBuffer()], {type:'text/html'}), "18");
            if(f112) tx.objectStore("blobs").put(new Blob([await f112.arrayBuffer()], {type:'text/html'}), "112");
            alert("KERNAL INJECTED");
        }

        function launchBlob() {
            const v = document.getElementById('ver').value;
            db.transaction("blobs").objectStore("blobs").get(v).onsuccess = e => {
                if(!e.target.result) return alert("NO BLOB FOUND. INJECT FIRST.");
                run(URL.createObjectURL(e.target.result));
            };
        }

        function run(url) { hide(); const v=document.getElementById('os-view'); v.src=url; v.style.display='block'; }
        function page(p) { hide(); document.getElementById('v-'+p).style.display=(p==='launcher'?'flex':'block'); }
        function hide() { ['v-launcher','v-settings','os-view'].forEach(i=>document.getElementById(i).style.display='none'); }
        function closeInj() { document.getElementById('injector').style.display='none'; }
        
        function doRain(on) {
            const z = document.getElementById('rain-layer'); z.innerHTML = '';
            if(!on) return;
            setInterval(() => {
                if(!document.getElementById('rain-chk').checked) return;
                const f = document.createElement('div'); f.className='fruit-part'; f.innerText='🍊';
                f.style.left = Math.random()*95+'vw'; f.style.animationDuration = '3s';
                z.appendChild(f);
                setTimeout(()=>f.remove(), 3000);
            }, 500);
        }
    </script>
</body>
</html>
