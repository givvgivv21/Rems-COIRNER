<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ORANGE OS | V102.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; font-family: monospace; }
        
        /* THE OLD SCHOOL CALCULATOR */
        #cloak { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .calc-case { background: #fb923c; width: 400px; height: 700px; border-radius: 20px; padding: 25px; border: 4px solid #c2410c; position: relative; }
        .screen { background: #8da399; height: 100px; border: 4px solid #111; border-radius: 5px; color: #111; font-size: 32px; text-align: right; padding: 10px; display: flex; align-items: flex-end; justify-content: flex-end; }
        .btn { background: #222; border-bottom: 4px solid #000; color: #fff; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .btn:active { border-bottom: 0; transform: translateY(2px); }
        .btn-2nd { background: #2563eb; }
        .btn-num { background: #e5e7eb; color: #000; }

        /* THE OG INJECTOR GUI */
        #disk-gui { position: absolute; top: 10%; left: 5%; width: 90%; height: 80%; background: #111; border: 2px solid #fb923c; z-index: 10001; display: none; flex-direction: column; padding: 15px; }
        .disk-slot { border: 1px solid #333; padding: 10px; margin-bottom: 10px; background: #050505; }
        .status-tag { font-weight: bold; font-size: 12px; margin-top: 5px; }

        /* OS CORE */
        #os-ui { display: none; height: 100vh; width: 100vw; grid-template-columns: 200px 1fr; background: #0a0a0a; }
        nav { background: #111; border-right: 2px solid #fb923c; padding: 15px; display: flex; flex-direction: column; }
        .nav-btn { padding: 12px; border: 1px solid #222; margin-bottom: 5px; cursor: pointer; color: #888; text-transform: uppercase; font-size: 12px; }
        .nav-btn:hover { color: #fff; background: #1a1a1a; }
        .active-tab { background: #fb923c !important; color: #000 !important; border: 1px solid #fff; }

        .pane { display: none; width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* PANIC BUTTON */
        .panic-btn { margin-top: auto; background: #b91c1c; color: #fff; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; border: 2px solid #7f1d1d; }

        #overlay { display: none; position: fixed; inset: 0; z-index: 20000; background: #000; flex-direction: column; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') panic()">

    <div id="cloak">
        <div class="calc-case">
            <div id="disk-gui">
                <div style="color:#fb923c; font-weight:bold; margin-bottom:15px; border-bottom:1px solid #fb923c;">DISK MANAGER V1</div>
                <div class="disk-slot">
                    <div style="font-size:10px; color:#888;">SLOT 1: EAGLER 1.8.8</div>
                    <input type="file" onchange="processFile('mc8', this)" style="font-size:10px; width:100%;">
                    <div id="stat-mc8" class="status-tag" style="color:#ef4444;">[ EMPTY ]</div>
                </div>
                <div class="disk-slot">
                    <div style="font-size:10px; color:#888;">SLOT 2: EAGLER 1.12.2</div>
                    <input type="file" onchange="processFile('mc12', this)" style="font-size:10px; width:100%;">
                    <div id="stat-mc12" class="status-tag" style="color:#ef4444;">[ EMPTY ]</div>
                </div>
                <button onclick="hideDisk()" style="background:#fb923c; color:#000; padding:10px; font-weight:bold; margin-top:auto;">SAVE & APPLY</button>
            </div>

            <div id="lcd" class="screen">0</div>
            <div class="grid grid-cols-4 gap-2 mt-10">
                <div class="btn btn-2nd" onclick="handleCalc('2nd')">2nd</div>
                <div class="btn" onclick="handleCalc('DEL')">DEL</div>
                <div class="btn" onclick="press('/')">/</div>
                <div class="btn" onclick="press('*')">X</div>
                
                <div class="btn btn-num" onclick="press('7')">7</div>
                <div class="btn btn-num" onclick="press('8')">8</div>
                <div class="btn btn-num" onclick="press('9')">9</div>
                <div class="btn" onclick="press('-')">-</div>
                
                <div class="btn btn-num" onclick="press('4')">4</div>
                <div class="btn btn-num" onclick="press('5')">5</div>
                <div class="btn btn-num" onclick="press('6')">6</div>
                <div class="btn" onclick="press('+')">+</div>
                
                <div class="btn btn-num" onclick="press('1')">1</div>
                <div class="btn btn-num" onclick="press('2')">2</div>
                <div class="btn btn-num" onclick="press('3')">3</div>
                <div class="btn" onclick="handleCalc('EXE')">ENT</div>
            </div>
            <div class="btn btn-num mt-2" onclick="press('0')">0</div>
        </div>
    </div>

    <div id="os-ui">
        <nav>
            <div style="color:#fb923c; font-weight:bold; margin-bottom:20px; font-size:18px;">ORANGE_OS</div>
            <div class="nav-btn active-tab" id="b-launch" onclick="showTab('launch')">Launcher</div>
            <div class="nav-btn" id="b-web" onclick="showTab('web')">Browser</div>
            <div class="nav-item" style="height:10px;"></div>
            <div class="nav-btn" id="b-yt" onclick="showTab('yt')">YouTube</div>
            <div class="nav-btn" id="b-brotato" onclick="showTab('brotato')">Brotato</div>
            <div class="nav-btn" id="b-more" onclick="showTab('more')">Find More</div>
            <div class="nav-btn" id="b-set" onclick="showTab('set')">Settings</div>
            
            <div class="panic-btn" onclick="panic()">PANIC</div>
        </nav>

        <main>
            <div id="p-launch" class="pane" style="display:block; padding:40px;">
                <h1 style="font-size:24px; color:#fb923c; border-bottom:1px solid #333;">MINECRAFT KERNEL</h1>
                <div style="margin-top:20px;">
                    <select id="v-pick" onchange="refreshLaunch()" style="background:#222; color:#fff; padding:10px; border:1px solid #fb923c;">
                        <option value="mc8">Eaglercraft 1.8.8</option>
                        <option value="mc12">Eaglercraft 1.12.2</option>
                    </select>
                    <div id="v-status" style="margin-top:10px; font-size:12px;">CHECKING...</div>
                    <button id="v-play" onclick="bootGame()" style="margin-top:20px; background:#fb923c; color:#000; padding:15px 40px; font-weight:bold; opacity:0.2; pointer-events:none;">PLAY GAME</button>
                </div>
            </div>

            <div id="p-web" class="pane"><iframe src="https://storage.googleapis.com/fernisbest/index.html"></iframe></div>
            <div id="p-yt" class="pane"><iframe src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe></div>
            <div id="p-brotato" class="pane"><iframe src="https://brotato.io/"></iframe></div>
            <div id="p-more" class="pane"><iframe src="https://github.com/givvgivv21/Rems-COIRNER/tree/main"></iframe></div>
            
            <div id="p-set" class="pane" style="padding:40px;">
                <h2 style="color:#fb923c;">SYSTEM SETTINGS</h2>
                <button onclick="localStorage.clear(); location.reload();" style="margin-top:20px; background:#ef4444; color:#fff; padding:10px;">WIPE ALL DATA</button>
            </div>
        </main>
    </div>

    <div id="overlay">
        <div style="background:#fb923c; padding:5px; display:flex; justify-content:flex-end;">
            <button onclick="closeApp()" style="background:#000; color:#fff; padding:2px 10px; font-size:10px;">EXIT_APP</button>
        </div>
        <iframe id="game-frame" style="flex-grow:1;"></iframe>
    </div>

    <script>
        let exp = "", is2nd = false;

        function press(v) { exp += v; document.getElementById('lcd').innerText = exp; }
        
        function handleCalc(type) {
            if(type === '2nd') { is2nd = !is2nd; document.querySelector('.btn-2nd').style.background = is2nd ? '#facc15' : '#2563eb'; }
            if(is2nd && type === 'DEL') { document.getElementById('disk-gui').style.display = 'flex'; checkDiskStats(); }
            if(is2nd && type === 'EXE') { document.getElementById('cloak').style.display = 'none'; document.getElementById('os-ui').style.display = 'grid'; refreshLaunch(); }
            if(type === 'DEL') { exp = ""; document.getElementById('lcd').innerText = "0"; }
            if(type === 'EXE') { try { exp = eval(exp).toString(); document.getElementById('lcd').innerText = exp; } catch { exp = "ERROR"; } }
        }

        function processFile(key, input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    localStorage.setItem(key, e.target.result);
                    checkDiskStats();
                } catch(err) {
                    alert("FILE TOO BIG FOR BROWSER STORAGE. TRY A SMALLER OFFLINE FILE.");
                }
            };
            reader.readAsText(file);
        }

        function checkDiskStats() {
            ['mc8', 'mc12'].forEach(k => {
                const el = document.getElementById('stat-' + k);
                if(localStorage.getItem(k)) { el.innerText = "[ INJECTED ]"; el.style.color = "#22c55e"; }
                else { el.innerText = "[ EMPTY ]"; el.style.color = "#ef4444"; }
            });
        }

        function hideDisk() { document.getElementById('disk-gui').style.display = 'none'; is2nd = false; }

        function refreshLaunch() {
            const v = document.getElementById('v-pick').value;
            const has = localStorage.getItem(v);
            const btn = document.getElementById('v-play');
            const stat = document.getElementById('v-status');
            if(has) {
                btn.style.opacity = "1"; btn.style.pointerEvents = "auto";
                stat.innerText = "READY TO BOOT"; stat.style.color = "#22c55e";
            } else {
                btn.style.opacity = "0.2"; btn.style.pointerEvents = "none";
                stat.innerText = "NO DATA FOUND IN SLOT"; stat.style.color = "#ef4444";
            }
        }

        function bootGame() {
            const v = document.getElementById('v-pick').value;
            const data = localStorage.getItem(v);
            document.getElementById('overlay').style.display = 'flex';
            const f = document.getElementById('game-frame');
            f.srcdoc = data;
        }

        function closeApp() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-frame').srcdoc = "";
            document.getElementById('game-frame').src = "";
        }

        function showTab(t) {
            document.querySelectorAll('.pane').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('p-' + t).style.display = 'block';
            document.getElementById('b-' + t).classList.add('active-tab');
            if(t === 'launch') refreshLaunch();
        }

        function panic() {
            closeApp();
            document.getElementById('os-ui').style.display = 'none';
            document.getElementById('cloak').style.display = 'flex';
        }
    </script>
</body>
</html>
