<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pumpkin OS | V81.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p: #f97316; --p-dark: #7c2d12; --bg: #0c0a09; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        /* BOOT SCREEN */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .big-lemon { font-size: 140px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .ti-body { background: #f97316; width: 340px; height: 580px; border-radius: 40px 40px 80px 80px; padding: 25px; border: 5px solid #c2410c; }
        .lcd { background: #94a392; height: 100px; border: 4px solid #000; border-radius: 12px; padding: 10px; color: #1a241a; font-family: monospace; font-weight: bold; text-align: right; }

        /* BUTTON ANIMATIONS */
        .btn-pill, .nav-link, .ti-btn, .util-card { transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .btn-pill:active, .nav-link:active, .ti-btn:active, .util-card:active { transform: scale(0.92); }

        /* MAIN GUI LAYOUT */
        #orange-core { display: none; height: 100vh; width: 100vw; grid-template-columns: 240px 1fr; padding: 20px; gap: 20px; }
        .sidebar { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 30px 15px; display: flex; flex-direction: column; }
        
        .nav-link { padding: 14px 20px; border-radius: 50px; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #777; display: flex; align-items: center; gap: 12px; }
        .nav-active { background: var(--p); color: #000 !important; box-shadow: 0 10px 20px rgba(249,115,22,0.3); }

        .main-stage { background: rgba(255,255,255,0.02); border-radius: 45px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; position: relative; }
        .view-pane { display: none; width: 100%; height: 100%; padding: 40px; overflow-y: auto; }
        
        .btn-pill { background: var(--p); color: #000; padding: 14px 32px; border-radius: 50px; font-weight: 800; border: none; }
        
        /* APP OVERLAY */
        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }

        /* RAIN */
        #fruit-rain { position: fixed; inset: 0; pointer-events: none; z-index: 100; display: none; }
        .falling-fruit { position: absolute; font-size: 2rem; animation: fall linear infinite; }
        @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }

        .ti-btn { height: 35px; background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; box-shadow: 0 4px 0 #000; color: #fff; }
    </style>
</head>
<body onkeydown="if(event.key==='Escape') location.reload()">

    <div id="fruit-rain"></div>

    <div id="cloak">
        <div class="big-lemon">🍋</div>
        <div class="ti-body">
            <div class="lcd"><div id="calc-display">0</div></div>
            <div class="grid grid-cols-5 gap-2 mt-8">
                <div class="ti-btn bg-blue-600" onclick="op('2nd')">2nd</div>
                <div class="ti-btn" onclick="op('DEL')">del</div><div class="ti-btn">mode</div><div class="ti-btn">stat</div><div class="ti-btn">prgm</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('7')">7</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('8')">8</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('9')">9</div><div class="ti-btn">/</div><div class="ti-btn">sin</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('4')">4</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('5')">5</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('6')">6</div><div class="ti-btn">x</div><div class="ti-btn">cos</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('1')">1</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('2')">2</div><div class="ti-btn bg-zinc-100 !text-black" onclick="ins('3')">3</div><div class="ti-btn">-</div><div class="ti-btn">tan</div>
                <div class="ti-btn bg-zinc-100 !text-black" onclick="ins('0')">0</div><div class="ti-btn bg-zinc-100 !text-black">.</div><div class="ti-btn bg-zinc-100 !text-black">(-)</div><div class="ti-btn bg-black text-white col-span-2" onclick="op('EXE')">ENTER</div>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/95 z-[3000] hidden items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-[40px] border-2 border-orange-500 w-[400px]">
            <h2 class="text-orange-500 font-black mb-6 uppercase">VFS Core Injector</h2>
            <input type="file" id="f12" class="mb-2 w-full text-xs">
            <input type="file" id="f8" class="mb-4 w-full text-xs">
            <div id="p-wrap" class="w-full h-2 bg-zinc-800 rounded-full overflow-hidden hidden"><div id="p-fill" class="h-full bg-orange-500 w-0 transition-all"></div></div>
            <p id="p-status" class="text-[10px] text-orange-500 mt-2 uppercase font-bold text-center"></p>
            <button onclick="injectFiles()" class="w-full btn-pill mt-6">Commit Binary</button>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-zinc-600 text-xs mt-4">Exit</button>
        </div>
    </div>

    <div id="orange-core">
        <aside class="sidebar">
            <h1 class="text-2xl font-black italic text-orange-500 mb-10">PUMPKIN OS</h1>
            <nav class="flex-grow">
                <div class="nav-link nav-active" onclick="nav('launcher')"><span>🎃</span> Launcher</div>
                <div class="nav-link" onclick="nav('yt')"><span>📺</span> Video Hub</div>
                <div class="nav-link" onclick="launch('https://storage.googleapis.com/fernisbest/index.html')"><span>🌐</span> Browser</div>
                <div class="nav-link" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER', '_blank')"><span>✨</span> More Updates</div>
                <div class="nav-link" onclick="nav('settings')"><span>⚙️</span> Settings</div>
            </nav>
            <button onclick="location.reload()" class="w-full py-4 rounded-full bg-red-600/10 text-red-500 font-bold text-xs hover:bg-red-600 hover:text-white active:scale-95 transition-all uppercase tracking-widest">Panic Button</button>
        </aside>

        <main class="main-stage">
            <div id="launcher-view" class="view-pane flex flex-col items-center justify-center" style="display:flex;">
                <div class="w-full max-w-lg p-10 bg-white/5 rounded-[45px] border border-white/10">
                    <h2 class="text-2xl font-bold mb-6 text-center">Minecraft Loader</h2>
                    <select id="v-sel" class="w-full bg-zinc-800 p-4 rounded-2xl font-bold text-orange-500 border border-white/5 mb-4 outline-none">
                        <option value="mc12">Eagler 1.12.2</option>
                        <option value="mc8">Eagler 1.8.8</option>
                    </select>
                    <button onclick="play()" class="w-full btn-pill text-lg mb-8">Play Game</button>
                    
                    <div class="border-t border-white/10 pt-6">
                        <p class="text-xs font-bold text-zinc-500 mb-4 uppercase text-center">Utility & Textures</p>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="window.open('https://github.com/Eaglercraft/resource-packs', '_blank')" class="bg-white/5 p-4 rounded-2xl text-xs font-bold hover:bg-white/10">PvP Texture Packs</button>
                            <button onclick="window.open('https://eaglercraft.com/resourcepacks', '_blank')" class="bg-white/5 p-4 rounded-2xl text-xs font-bold hover:bg-white/10">Faithful 32x</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="yt-view" class="view-pane flex flex-col items-center">
                <h2 class="text-3xl font-bold mb-6 text-orange-500">Video Hub</h2>
                <div class="w-full max-w-3xl aspect-video bg-black rounded-3xl overflow-hidden border border-white/10">
                    <iframe id="yt-player" src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
                </div>
                <div class="mt-6 flex gap-3 w-full max-w-3xl">
                    <input type="text" id="yt-url" placeholder="Paste Video URL..." class="flex-grow bg-white/5 p-4 rounded-full border border-white/10 outline-none">
                    <button onclick="loadYT()" class="btn-pill">Load</button>
                </div>
            </div>

            <div id="settings-view" class="view-pane">
                <h2 class="text-2xl font-bold mb-8 uppercase">System Config</h2>
                <div class="max-w-md space-y-4">
                    <div class="bg-white/5 p-6 rounded-[30px] flex justify-between items-center">
                        <span class="font-bold">Pumpkin Rain</span>
                        <input type="checkbox" onchange="toggleRain(this.checked)" class="w-6 h-6 accent-orange-500">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="app-overlay">
        <div class="bg-orange-600 p-2 flex justify-end">
            <button onclick="closeApp()" class="bg-black text-white px-6 py-1 rounded-full font-black text-[10px]">CLOSE</button>
        </div>
        <iframe id="app-frame"></iframe>
    </div>

    <script>
        let db, inputStr = "0", is2nd = false;
        const req = indexedDB.open("OS_DATA_V81", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("core");
        req.onsuccess = e => { db = e.target.result; };

        async function injectFiles() {
            const files = { mc12: document.getElementById('f12').files[0], mc8: document.getElementById('f8').files[0] };
            const wrap = document.getElementById('p-wrap'), fill = document.getElementById('p-fill'), stat = document.getElementById('p-status');
            wrap.style.display = 'block';
            for (let [key, file] of Object.entries(files)) {
                if(!file) continue;
                stat.innerText = `Writing ${key}...`;
                fill.style.width = '50%';
                const tx = db.transaction("core", "readwrite");
                tx.objectStore("core").put(new Blob([await file.arrayBuffer()], {type: 'text/html'}), key);
                await new Promise(r => tx.oncomplete = r);
                fill.style.width = '100%';
            }
            stat.innerText = "Injection Success";
            setTimeout(() => { wrap.style.display = 'none'; document.getElementById('admin-panel').style.display='none'; }, 1000);
        }

        function play() {
            const ver = document.getElementById('v-sel').value;
            db.transaction("core").objectStore("core").get(ver).onsuccess = e => {
                if(!e.target.result) return alert("Binary not found! Inject using 2nd + DEL.");
                document.getElementById('app-frame').src = URL.createObjectURL(e.target.result);
                document.getElementById('app-overlay').style.display = 'flex';
            };
        }

        function loadYT() {
            const val = document.getElementById('yt-url').value;
            let id = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.split('/').pop();
            document.getElementById('yt-player').src = "https://www.youtube.com/embed/" + id;
        }

        function op(k) {
            if(k==='2nd') { is2nd = !is2nd; return; }
            if(is2nd && k==='DEL') { document.getElementById('admin-panel').style.display = 'flex'; is2nd = false; return; }
            if(is2nd && k==='EXE') { document.getElementById('cloak').style.display='none'; document.getElementById('orange-core').style.display='grid'; return; }
            if(k==='DEL') inputStr = "0";
            document.getElementById('calc-display').innerText = inputStr;
        }
        function ins(v) { inputStr = (inputStr === "0") ? v : inputStr + v; document.getElementById('calc-display').innerText = inputStr; }

        function nav(v) {
            ['launcher-view', 'yt-view', 'settings-view'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById(v+'-view').style.display = (v==='settings'?'block':'flex');
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('nav-active');
                if(l.innerText.toLowerCase().includes(v)) l.classList.add('nav-active');
            });
        }

        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        function closeApp() { document.getElementById('app-overlay').style.display='none'; document.getElementById('app-frame').src=''; }

        function toggleRain(on) {
            const rain = document.getElementById('fruit-rain');
            rain.style.display = on ? 'block' : 'none';
            if(on) {
                rain.innerHTML = "";
                for(let i=0; i<30; i++) {
                    let f = document.createElement('div'); f.className='falling-fruit'; f.innerText='🎃';
                    f.style.left=Math.random()*100+'vw'; f.style.top='-50px'; f.style.animationDuration=(Math.random()*3+2)+'s';
                    rain.appendChild(f);
                }
            }
        }
    </script>
</body>
</html>
