<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orange OS | V22 Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --orange-dark: #7c2d12; --orange-mid: #ea580c; --orange-bright: #fb923c; 
            --bg: #0c0a09; --sidebar: #110c0a; --text: #ffffff; --glass: rgba(20, 10, 0, 0.8);
            --win-bg: #1c1917;
            --glow: 0 0 15px rgba(234, 88, 12, 0.6);
        }
        .light-mode {
            --bg: #fff7ed; --sidebar: #ffedd5; --text: #7c2d12; --glass: rgba(255, 255, 255, 0.8);
            --win-bg: #fed7aa;
        }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: var(--text); transition: 0.5s; }

        /* FLASHY ANIMATIONS */
        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px var(--orange-mid); }
            50% { box-shadow: 0 0 20px var(--orange-bright), inset 0 0 10px var(--orange-mid); }
            100% { box-shadow: 0 0 5px var(--orange-mid); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .orange-glow { animation: glowPulse 2s infinite; border: 1px solid var(--orange-bright) !important; }
        
        /* DECOR */
        #orange-rain { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }
        .falling-orange { position: absolute; font-size: 2rem; animation: fall linear infinite; filter: drop-shadow(0 0 10px orange); }
        @keyframes fall { from { transform: translateY(-10vh) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }

        /* CALC CLOAK */
        #cloak { position: fixed; inset: 0; z-index: 100000; background: #000; display: flex; align-items: center; justify-content: center; }
        .calc { background: #1a1a1a; width: 340px; padding: 25px; border-radius: 20px; border: 4px solid #ea580c; box-shadow: 0 0 30px rgba(234, 88, 12, 0.3); }
        .lcd { background: #99ad99; border: 4px solid #444; height: 70px; margin-bottom: 15px; padding: 15px; color: #111; font-size: 1.8rem; text-align: right; font-family: monospace; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn { background: #2a2a2a; border-bottom: 4px solid #000; padding: 12px 0; text-align: center; cursor: pointer; color: #bbb; font-weight: bold; border-radius: 8px; transition: 0.1s; }
        .btn:active { transform: translateY(2px); border-bottom-width: 2px; }

        /* CORE UI */
        #orange-core { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 1000; background: radial-gradient(circle at center, #2d1305 0%, #0c0a09 100%); }
        .sidebar { width: 280px; background: var(--sidebar); border-right: 3px solid var(--orange-mid); padding: 25px; display: flex; flex-direction: column; z-index: 1100; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .nav-item { 
            border: 2px solid var(--orange-mid); padding: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 900; 
            display: flex; justify-content: space-between; color: var(--orange-bright); background: linear-gradient(90deg, rgba(234,88,12,0.1), transparent);
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .nav-item:hover { background: var(--orange-mid); color: white; transform: translateX(10px); box-shadow: 0 0 15px var(--orange-mid); }

        .mojang-window { width: 850px; height: 550px; background: var(--win-bg); border: 3px solid var(--orange-mid); display: flex; flex-direction: column; z-index: 1050; border-radius: 10px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .mojang-body { flex-grow: 1; background: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MC-Vanilla-KeyArt_Standard.jpg') center/cover; position: relative; }
        .mojang-body::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        
        .mojang-play-bar { height: 100px; background: #111; display: flex; align-items: center; justify-content: center; padding: 0 20px; border-top: 3px solid var(--orange-mid); gap: 15px; color: white; }
        
        .play-btn { 
            background: #3c8527; border: 3px solid #000; box-shadow: inset -4px -4px #1a3911, inset 4px 4px #5dbb3d; 
            width: 180px; height: 50px; color: white; font-size: 1.2rem; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* ADMIN PANEL */
        #admin-panel { display:none; position:fixed; inset:0; z-index: 200000; background:rgba(12, 10, 9, 0.98); align-items:center; justify-content:center; backdrop-filter: blur(5px); }
        .admin-box { width: 450px; padding: 40px; background: #000; border: 3px solid var(--orange-mid); color: white; border-radius: 20px; box-shadow: 0 0 100px rgba(234, 88, 12, 0.4); }
        .commit-btn { background: var(--orange-mid); color: white; padding: 18px; width: 100%; font-weight: 900; border-bottom: 5px solid #7c2d12; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        #app-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 150000; flex-direction: column; }
    </style>
</head>
<body onkeydown="handleGlobalKeys(event)">

    <div id="orange-rain"></div>

    <div id="cloak">
        <div class="calc">
            <div id="lcd" class="lcd">0</div>
            <div class="grid">
                <div class="btn" onclick="op('2nd')">2nd</div>
                <div class="btn" onclick="op('DEL')">DEL</div>
                <div class="btn" onclick="ins('/')">/</div><div class="btn" onclick="ins('*')">X</div>
                <div class="btn" onclick="ins('7')">7</div><div class="btn" onclick="ins('8')">8</div><div class="btn" onclick="ins('9')">9</div><div class="btn" onclick="ins('-')">-</div>
                <div class="btn" onclick="ins('4')">4</div><div class="btn" onclick="ins('5')">5</div><div class="btn" onclick="ins('6')">6</div><div class="btn" onclick="ins('+')">+</div>
                <div class="btn" onclick="ins('1')">1</div><div class="btn" onclick="ins('2')">2</div><div class="btn" onclick="ins('3')">3</div>
                <div class="btn bg-orange-600 text-white" onclick="op('EXE')">EXE</div>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-box">
            <h2 class="text-orange-500 font-black mb-6 uppercase text-center text-3xl italic tracking-tighter">Core Injection</h2>
            <div class="space-y-6">
                <div><p class="text-[10px] text-orange-300 mb-1 uppercase font-bold">Build 1.12.2 (System Priority)</p><input type="file" id="file12" class="bg-zinc-900 p-3 w-full text-xs border border-orange-900 text-white rounded"></div>
                <div><p class="text-[10px] text-orange-300 mb-1 uppercase font-bold">Build 1.8.8</p><input type="file" id="file8" class="bg-zinc-900 p-3 w-full text-xs border border-orange-900 text-white rounded"></div>
                <button id="commit-btn" onclick="startHeavyInjection()" class="commit-btn mt-4 hover:bg-orange-500 transition-all">INITIALIZE UPLOAD</button>
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="w-full text-[10px] text-zinc-500 uppercase mt-4 hover:text-white transition-colors">Abort Interface</button>
            </div>
        </div>
    </div>

    <div id="orange-core" class="flex">
        <div class="sidebar">
            <h1 class="text-4xl font-black italic text-orange-500 mb-8 uppercase tracking-tighter filter drop-shadow-[0_0_10px_rgba(234,88,12,0.8)]">Orange OS</h1>
            <div class="nav-item orange-glow" onclick="showView('launcher')"><span>LAUNCHER</span><span>⛏️</span></div>
            <div class="nav-item" onclick="launch('https://storage.googleapis.com/fernisbest/index.html')"><span>BROWSER</span><span>🌐</span></div>
            <div class="nav-item" onclick="launch('https://youtube.com')"><span>YOUTUBE</span><span>📺</span></div>
            <div class="nav-item" onclick="window.open('https://github.com/givvgivv21/Rems-COIRNER/tree/main', '_blank')"><span>FIND MORE</span><span>📁</span></div>
            <div class="nav-item" onclick="showView('settings')"><span>SETTINGS</span><span>⚙️</span></div>
            
            <div class="mt-auto p-4 border-2 border-orange-500 bg-orange-950/30 text-[10px] flex justify-between items-center mb-4 rounded-lg">
                <span class="font-bold">HIGH CONTRAST</span>
                <input type="checkbox" id="theme-check" onchange="toggleLight(this.checked)" class="accent-orange-500">
            </div>
            <div class="nav-item text-white border-white hover:bg-white hover:text-black" onclick="location.reload()"><span>PURGE [ESC]</span></div>
        </div>

        <div id="content-area" class="flex-grow flex items-center justify-center p-10">
            <div id="launcher-view" class="mojang-window hidden">
                <div class="mojang-body"></div>
                <div class="mojang-play-bar">
                    <select id="ver-select" class="bg-zinc-900 p-3 text-white border-2 border-orange-600 w-44 font-black outline-none text-xs rounded">
                        <option value="mc12" selected>Eagler 1.12.2</option>
                        <option value="mc8">Eagler 1.8.8</option>
                    </select>
                    
                    <button onclick="playSelected()" class="play-btn">PLAY</button>

                    <button onclick="window.open('https://github.com/GupGupMC/Tuff-Client-1.12.2-/tree/main', '_blank')" 
                            class="bg-zinc-800 border-2 border-black shadow-[inset_-3px_-3px_#333,inset_3px_3px_#555] px-4 h-[50px] text-[9px] text-white font-black hover:bg-orange-600 transition-all uppercase leading-tight">
                        USEFUL TEXTURE <br> PACKS
                    </button>

                    <div class="flex flex-col gap-2 ml-4 text-[10px] font-black uppercase">
                        <div class="flex items-center gap-2"><span id="dot12" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_8px_red]"></span> 1.12</div>
                        <div class="flex items-center gap-2"><span id="dot8" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_8px_red]"></span> 1.8</div>
                    </div>
                </div>
            </div>

            <div id="settings-view" class="hidden p-12 bg-black/90 border-2 border-orange-500 rounded-3xl w-full max-w-lg shadow-[0_0_100px_rgba(234,88,12,0.2)]">
                <h2 class="text-4xl font-black text-orange-500 mb-8 italic">OS CONFIG</h2>
                <div class="flex justify-between items-center mb-6 text-xl"><span>Orange Rain</span><input type="checkbox" onchange="toggleRain(this.checked)" class="w-6 h-6 accent-orange-500"></div>
                <div class="flex justify-between items-center text-xl"><span>Iframe Mode</span><input type="checkbox" id="iframe-toggle" checked class="w-6 h-6 accent-orange-500"></div>
            </div>
        </div>
    </div>

    <div id="app-overlay">
        <div class="p-3 bg-orange-600 flex justify-between items-center">
            <span class="font-black text-xs ml-4 tracking-widest">RUNNING EXTERNAL CORE</span>
            <button onclick="closeApp()" class="bg-black text-white px-6 py-1 font-black text-xs hover:bg-white hover:text-black transition-colors">TERMINATE</button>
        </div>
        <iframe id="app-frame" class="w-full h-full bg-black"></iframe>
    </div>

    <script>
        let db;
        const dbReq = indexedDB.open("OrangeOS_V22", 1);
        dbReq.onupgradeneeded = (e) => { db = e.target.result; db.createObjectStore("core"); };
        dbReq.onsuccess = (e) => { db = e.target.result; updateStatusDots(); };

        async function startHeavyInjection() {
            const btn = document.getElementById('commit-btn');
            const files = { 
                mc12: document.getElementById('file12').files[0],
                mc8: document.getElementById('file8').files[0] 
            };
            
            if(!files.mc12 && !files.mc8) return alert("SELECT SYSTEM FILES!");

            btn.innerText = "INJECTING CORE DATA...";
            for (const [key, file] of Object.entries(files)) {
                if(!file) continue;
                const text = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsText(file);
                });
                const tx = db.transaction(["core"], "readwrite");
                tx.objectStore("core").put(text, key);
                await new Promise(r => tx.oncomplete = r);
            }
            btn.innerText = "INJECTION SUCCESSFUL";
            updateStatusDots();
            setTimeout(() => btn.innerText = "INITIALIZE UPLOAD", 2000);
        }

        function playSelected() {
            const key = document.getElementById('ver-select').value;
            const tx = db.transaction(["core"], "readonly");
            tx.objectStore("core").get(key).onsuccess = (e) => {
                const data = e.target.result;
                if(!data) return alert("CORE BUILD NOT FOUND!");
                const blob = new Blob([data], {type: 'text/html'});
                const url = URL.createObjectURL(blob);
                if(document.getElementById('iframe-toggle').checked) {
                    document.getElementById('app-frame').src = url;
                    document.getElementById('app-overlay').style.display = 'flex';
                } else { window.open(url, '_blank'); }
            };
        }

        function updateStatusDots() {
            if(!db) return;
            const tx = db.transaction(["core"], "readonly");
            const store = tx.objectStore("core");
            store.get("mc12").onsuccess = (e) => document.getElementById('dot12').style.background = e.target.result ? '#44ff44' : '#ff4444';
            store.get("mc12").onsuccess = (e) => {
                const color = e.target.result ? '#44ff44' : '#ff4444';
                document.getElementById('dot12').style.background = color;
                document.getElementById('dot12').style.boxShadow = `0 0 10px ${color}`;
            }
            store.get("mc8").onsuccess = (e) => {
                const color = e.target.result ? '#44ff44' : '#ff4444';
                document.getElementById('dot8').style.background = color;
                document.getElementById('dot8').style.boxShadow = `0 0 10px ${color}`;
            }
        }

        let inputStr = "0", is2nd = false;
        function op(k) {
            if(k === '2nd') { is2nd = !is2nd; document.getElementById('lcd').style.background = is2nd ? '#d1ffd1' : '#99ad99'; return; }
            if(is2nd && k === 'DEL') {
                let p = prompt("ACCESS KEY:"); if(p === "remmy21") document.getElementById('admin-panel').style.display = 'flex';
                is2nd = false; return;
            }
            if(is2nd && k === 'EXE') { document.getElementById('cloak').style.display = 'none'; document.getElementById('orange-core').style.display = 'flex'; updateStatusDots(); return; }
            if(k === 'DEL') inputStr = inputStr.length > 1 ? inputStr.slice(0, -1) : "0";
            if(k === 'EXE') try { inputStr = String(eval(inputStr.replace(/X/g, '*'))); } catch { inputStr = "ERR"; }
            document.getElementById('lcd').innerText = inputStr;
        }
        function ins(v) { inputStr = (inputStr === "0") ? v : inputStr + v; document.getElementById('lcd').innerText = inputStr; }
        function handleGlobalKeys(e) { if(e.key === 'Escape') location.reload(); }
        function showView(v) { ['launcher-view', 'settings-view'].forEach(i => document.getElementById(i).classList.add('hidden')); document.getElementById(v + '-view').classList.remove('hidden'); }
        function toggleLight(on) { if(on) document.body.classList.add('light-mode'); else document.body.classList.remove('light-mode'); }
        function closeApp() { document.getElementById('app-overlay').style.display = 'none'; document.getElementById('app-frame').src = ''; }
        function launch(u) { document.getElementById('app-frame').src = u; document.getElementById('app-overlay').style.display = 'flex'; }
        
        function toggleRain(on) {
            document.getElementById('orange-rain').style.display = on ? 'block' : 'none';
            if(on && document.getElementById('orange-rain').innerHTML === "") {
                for(let i=0; i<40; i++) {
                    let o = document.createElement('div'); o.className='falling-orange'; o.innerText='🍊';
                    o.style.left=Math.random()*100+'vw'; o.style.animationDuration=(Math.random()*2+1.5)+'s';
                    document.getElementById('orange-rain').appendChild(o);
                }
            }
        }
    </script>
</body>
</html>
